/* ═══════════════════════════════════════════════════════════════════
   MAP COMPONENT
   ═══════════════════════════════════════════════════════════════════ */
function CourseMap({marks,trackPoints,courseMarks,onMarkDrag,manoeuvres,startFinishLine,trackSegmentFC}){
  const mapContainer=useRef(null);
  const mapRef=useRef(null);
  const markersRef=useRef([]);
  const manMarkersRef=useRef([]);
  const [mapBearing,setMapBearing]=useState(0);
  const [mapLoaded,setMapLoaded]=useState(false);

  useEffect(()=>{
    if(!mapContainer.current||mapRef.current)return;
    mapboxgl.accessToken=CONFIG.MAPBOX_TOKEN;
    const map=new mapboxgl.Map({
      container:mapContainer.current,
      style:"mapbox://styles/mapbox/satellite-streets-v12",
      center:[-1.3050,50.8420],
      zoom:13,
    });
    mapRef.current=map;

    const syncBearing=()=>setMapBearing(map.getBearing());
    map.on("rotate",syncBearing);

    map.on("load",()=>{
      if(trackPoints&&trackPoints.length>1){
        const fc=trackSegmentFC&&trackSegmentFC.features?.length>=1?trackSegmentFC:buildTrackSegmentFeatureCollection(trackPoints,new Array(trackPoints.length).fill(false));
        map.addSource("track-segments",{type:"geojson",data:fc});
        map.addLayer({id:"track-line",type:"line",source:"track-segments",layout:{"line-join":"round","line-cap":"round"},paint:{"line-color":["match",["get","kind"],"rounding",C.trkRound,C.trk],"line-width":3,"line-opacity":0.88}});
        map.addSource("track-points",{type:"geojson",data:{type:"FeatureCollection",features:trackPoints.map(p=>({type:"Feature",geometry:{type:"Point",coordinates:[p.lon,p.lat]}}))}});
        map.addLayer({id:"track-points",type:"circle",source:"track-points",paint:{"circle-radius":1.8,"circle-color":"#d9fff7","circle-opacity":0.72}});
        const lats=trackPoints.map(p=>p.lat),lons=trackPoints.map(p=>p.lon);
        map.fitBounds([[Math.min(...lons)-0.005,Math.min(...lats)-0.003],[Math.max(...lons)+0.005,Math.max(...lats)+0.003]],{padding:40});
      }
      if(courseMarks&&courseMarks.length>1){
        map.addSource("course",{type:"geojson",data:{type:"Feature",geometry:{type:"LineString",coordinates:courseMarks.map(m=>[m.lon,m.lat])}}});
        map.addLayer({id:"course-line",type:"line",source:"course",paint:{"line-color":C.course,"line-width":2,"line-opacity":0.6,"line-dasharray":[4,3]}});
      }
      syncBearing();
      setMapLoaded(true);
    });

    return()=>{map.off("rotate",syncBearing);map.remove();mapRef.current=null;setMapLoaded(false)};
  },[]);

  useEffect(()=>{
    const map=mapRef.current;if(!map||!mapLoaded)return;
    markersRef.current.forEach(m=>m.remove());
    markersRef.current=[];
    if(!marks)return;
    Object.entries(marks).forEach(([name,mk])=>{
      const el=document.createElement("div");
      let border,fg,bg;
      if(mk.roundTack==="P"){border=C.port;fg="#fff";bg=`${C.port}38`;}
      else if(mk.roundTack==="S"){border=C.stbd;fg="#061018";bg=`${C.stbd}45`;}
      else{border=mk.fixed?C.blu:C.gld;fg=mk.fixed?C.blu:C.gld;bg="#111d33dd";}
      el.style.cssText=`width:28px;height:28px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;font-size:8px;font-weight:700;font-family:'JetBrains Mono',monospace;cursor:${mk.fixed?"default":"grab"};border:2px solid ${border};background:${bg};color:${fg};`;
      const ab=document.createElement("span");ab.style.fontSize="9px";ab.textContent=name.substring(0,3);el.appendChild(ab);
      if(mk.roundTack){const tb=document.createElement("span");tb.style.fontSize="7px";tb.style.opacity="0.95";tb.textContent=mk.roundTack;el.appendChild(tb);}
      const marker=new mapboxgl.Marker({element:el,draggable:!mk.fixed})
        .setLngLat([mk.lon,mk.lat])
        .setPopup(new mapboxgl.Popup({offset:12}).setHTML(`<strong>${name}</strong>${mk.roundTack?` <span style="color:#8899b0">(${mk.roundTack==="P"?"Port":"Stbd"})</span>`:""}${mk.fixed?"":" (drag to adjust)"}${mk.desc?`<br/><span style="color:#8899b0">${mk.desc}</span>`:""}`))
        .addTo(map);
      if(!mk.fixed){
        marker.on("dragend",()=>{
          const lngLat=marker.getLngLat();
          if(onMarkDrag)onMarkDrag(name,lngLat.lat,lngLat.lng);
        });
      }
      markersRef.current.push(marker);
    });
  },[marks,onMarkDrag,mapLoaded]);

  useEffect(()=>{
    const map=mapRef.current;if(!map||!mapLoaded)return;
    manMarkersRef.current.forEach(m=>m.remove());
    manMarkersRef.current=[];
    if(!manoeuvres)return;
    const add=(m,title,color)=>{
      const pointIdx=m.turnIdx??m.idx;
      const lat=m.lat!=null?m.lat:trackPoints?.[pointIdx]?.lat;
      const lon=m.lon!=null?m.lon:trackPoints?.[pointIdx]?.lon;
      if(lat==null||lon==null)return;
      const el=document.createElement("div");
      el.style.cssText=`display:flex;flex-direction:column;align-items:center;padding:4px 8px 5px;border-radius:8px;font-size:11px;font-weight:800;font-family:'JetBrains Mono',monospace;border:2px solid ${color};background:#0a101fcc;color:${color};box-shadow:0 2px 8px rgba(0,0,0,.45);pointer-events:none;line-height:1.15;`;
      const t1=document.createElement("div");t1.textContent=title;t1.style.whiteSpace="nowrap";
      el.appendChild(t1);
      manMarkersRef.current.push(new mapboxgl.Marker({element:el,anchor:"bottom"}).setLngLat([lon,lat]).addTo(map));
    };
    manoeuvres.tacks.forEach((m,i)=>{
      const base=manoeuvreBadgeBaseColor(m);
      const col=m.excludeFromStatsAndVMG?C.trkRound:base;
      add(m,m.excludeFromStatsAndVMG?`T${i+1}*`:`T${i+1}`,col);
    });
    manoeuvres.gybes.forEach((m,i)=>{
      const base=manoeuvreBadgeBaseColor(m);
      const col=m.excludeFromStatsAndVMG?C.trkRound:base;
      add(m,m.excludeFromStatsAndVMG?`G${i+1}*`:`G${i+1}`,col);
    });
  },[manoeuvres,trackPoints,mapLoaded]);

  useEffect(()=>{
    const map=mapRef.current;if(!map||!mapLoaded)return;
    const clearSf=()=>{
      try{
        if(map.getLayer("sf-line"))map.removeLayer("sf-line");
        if(map.getLayer("sf-line-glow"))map.removeLayer("sf-line-glow");
        if(map.getSource("sf-line"))map.removeSource("sf-line");
      }catch(_){}
    };
    const sf=startFinishLine;
    let coords=null;
    if(sf&&sf.mode==="ends"&&sf.endA&&sf.endB){
      const{lat:la,lon:loa}=sf.endA,{lat:lb,lon:lob}=sf.endB;
      if(Number.isFinite(la)&&Number.isFinite(loa)&&Number.isFinite(lb)&&Number.isFinite(lob))
        coords=[[loa,la],[lob,lb]];
    }else if(sf&&sf.lat!=null&&sf.lon!=null&&Number.isFinite(Number(sf.windFromDeg))){
      const wf=Number(sf.windFromDeg)%360;
      const half=Number(sf.halfLengthM)>20?Number(sf.halfLengthM):150;
      const a=destinationPoint(sf.lat,sf.lon,wf+90,half);
      const b=destinationPoint(sf.lat,sf.lon,wf-90,half);
      coords=[[a.lon,a.lat],[b.lon,b.lat]];
    }
    if(!coords||coords.some(c=>!Number.isFinite(c[0])||!Number.isFinite(c[1]))){
      clearSf();
      return;
    }
    const geo={type:"Feature",geometry:{type:"LineString",coordinates:coords}};
    const paintGlow={"line-color":"#00e5c5","line-width":10,"line-opacity":0.28,"line-blur":3};
    const paintLine={"line-color":"#ffffff","line-width":3.5,"line-opacity":1,"line-dasharray":[2,1.5]};
    let cancelled=false;
    const apply=()=>{
      if(cancelled)return;
      try{
        if(typeof map.isStyleLoaded==="function"&&!map.isStyleLoaded())return;
        if(map.getSource("sf-line")){
          map.getSource("sf-line").setData(geo);
          return;
        }
        map.addSource("sf-line",{type:"geojson",data:geo});
        map.addLayer({id:"sf-line-glow",type:"line",source:"sf-line",paint:paintGlow});
        map.addLayer({id:"sf-line",type:"line",source:"sf-line",paint:paintLine});
      }catch(err){console.warn("[CourseMap] start/finish line:",err);}
    };
    const run=()=>{if(!cancelled)apply();};
    if(typeof map.isStyleLoaded==="function"&&map.isStyleLoaded())requestAnimationFrame(run);
    else map.once("idle",run);
    return()=>{
      cancelled=true;
      try{map.off("idle",run);}catch(_){}
    };
  },[startFinishLine,mapLoaded]);

  useEffect(()=>{
    const map=mapRef.current;if(!map||!map.isStyleLoaded())return;
    if(trackPoints&&trackPoints.length>1){
      const fc=trackSegmentFC&&trackSegmentFC.features?.length>=1?trackSegmentFC:buildTrackSegmentFeatureCollection(trackPoints,new Array(trackPoints.length).fill(false));
      let tsrc=map.getSource("track-segments");
      if(tsrc)tsrc.setData(fc);
      else{
        map.addSource("track-segments",{type:"geojson",data:fc});
        if(!map.getLayer("track-line"))map.addLayer({id:"track-line",type:"line",source:"track-segments",layout:{"line-join":"round","line-cap":"round"},paint:{"line-color":["match",["get","kind"],"rounding",C.trkRound,C.trk],"line-width":3,"line-opacity":0.88}});
      }
      const psrc=map.getSource("track-points");
      if(psrc)psrc.setData({type:"FeatureCollection",features:trackPoints.map(p=>({type:"Feature",geometry:{type:"Point",coordinates:[p.lon,p.lat]}}))});
    }
    if(courseMarks&&courseMarks.length>1){
      const src=map.getSource("course");
      if(src)src.setData({type:"Feature",geometry:{type:"LineString",coordinates:courseMarks.map(m=>[m.lon,m.lat])}});
    }
  },[trackPoints,courseMarks,trackSegmentFC]);

  const roseSz=84;
  return(
    <div style={{position:"relative",width:"100%",height:"100%",borderRadius:12,overflow:"hidden"}}>
      <div ref={mapContainer} style={{position:"absolute",inset:0,width:"100%",height:"100%"}}/>
      <div style={{position:"absolute",top:10,right:10,width:roseSz,height:roseSz,pointerEvents:"none",zIndex:4,transform:`rotate(${-mapBearing}deg)`,transformOrigin:"50% 50%",transition:"transform 0.08s linear"}} aria-hidden>
        <svg width={roseSz} height={roseSz} viewBox="0 0 100 100" style={{display:"block",filter:"drop-shadow(0 1px 3px rgba(0,0,0,.5))"}}>
          <circle cx="50" cy="50" r="44" fill="#0a101fbb" stroke="#4a6a8a" strokeWidth="1.5"/>
          {[0,90,180,270].map(deg=>{
            const rad=(deg-90)*Math.PI/180,x1=50+38*Math.cos(rad),y1=50+38*Math.sin(rad),x2=50+44*Math.cos(rad),y2=50+44*Math.sin(rad);
            return(<line key={deg} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#8aa4c4" strokeWidth="1.2"/>);
          })}
          <text x="50" y="15" textAnchor="middle" fill="#e8edf5" fontSize="11" fontWeight="800" fontFamily="system-ui,sans-serif">N</text>
          <text x="88" y="54" textAnchor="middle" fill="#a8b8d0" fontSize="10" fontWeight="700" fontFamily="system-ui,sans-serif">E</text>
          <text x="50" y="92" textAnchor="middle" fill="#a8b8d0" fontSize="10" fontWeight="700" fontFamily="system-ui,sans-serif">S</text>
          <text x="12" y="54" textAnchor="middle" fill="#a8b8d0" fontSize="10" fontWeight="700" fontFamily="system-ui,sans-serif">W</text>
          <polygon points="50,22 46,34 54,34" fill="#4a9eff"/>
        </svg>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════════════════════════════ */
function App(){
  const [view,setView]=useState("home");
  /** Worker session: user + Strava link + short-lived Supabase JWT (not persisted). */
  const [session,setSession]=useState(null);
  const [authEmail,setAuthEmail]=useState("");
  const [authPassword,setAuthPassword]=useState("");
  const [authErr,setAuthErr]=useState("");
  const [authBusy,setAuthBusy]=useState(false);
  const [showRegister,setShowRegister]=useState(false);
  const [sAth,setSAth]=useState(null);
  const [acts,setActs]=useState([]);
  const [loadingActs,setLoadingActs]=useState(false);
  /** activity_id string → full Supabase analyses row (for labels + rename). */
  const [savedByActId,setSavedByActId]=useState({});
  const [compareMode,setCompareMode]=useState(false);
  const [comparePick,setComparePick]=useState([]);
  const [compareIds,setCompareIds]=useState(null);
  const [compareRows,setCompareRows]=useState([null,null]);
  const [renameActId,setRenameActId]=useState(null);
  const [renameDraft,setRenameDraft]=useState("");
  const [renameBusy,setRenameBusy]=useState(false);
  const [savedSummaryId,setSavedSummaryId]=useState(null);
  const [savedSummaryRow,setSavedSummaryRow]=useState(null);
  const [rawPoints,setRawPoints]=useState(null);
  const [actName,setActName]=useState("");
  const [analysis,setAnalysis]=useState(null);
  const [windOvr,setWindOvr]=useState(null);
  const [processing,setProcessing]=useState(false);
  const [tab,setTab]=useState("overview");
  const [courseLetter,setCourseLetter]=useState("");
  const [laps,setLaps]=useState(1);
  const [markOverrides,setMarkOverrides]=useState({});
  const [setupSaveBusy,setSetupSaveBusy]=useState(false);
  const [setupSaveMsg,setSetupSaveMsg]=useState(null);
  const [actId,setActId]=useState(null);
  const [actDate,setActDate]=useState(null);
  const [cropStartText,setCropStartText]=useState("00:00:00");
  const [cropDurationText,setCropDurationText]=useState("");
  const [raceStartText,setRaceStartText]=useState(DEFAULT_RACE_START_TEXT);
  const [sfLineEndAText,setSfLineEndAText]=useState(`${DEFAULT_SF_LINE_ENDS.endA.lat}, ${DEFAULT_SF_LINE_ENDS.endA.lon}`);
  const [sfLineEndBText,setSfLineEndBText]=useState(`${DEFAULT_SF_LINE_ENDS.endB.lat}, ${DEFAULT_SF_LINE_ENDS.endB.lon}`);
  const [detSettings,setDetSettings]=useState(DETECTION_DEFAULTS);
  const [gpsToBowM,setGpsToBowM]=useState(()=>{
    try{
      const s=localStorage.getItem(LS_GPS_TO_BOW_M_KEY);
      if(s!=null){const n=parseFloat(s);if(Number.isFinite(n)&&n>=0&&n<=25)return n;}
    }catch(_){}
    return DEFAULT_GPS_TO_BOW_M;
  });
  const [windwardMarkName,setWindwardMarkName]=useState("");
  const [timelineZoom,setTimelineZoom]=useState(1);
  const [timelineScroll,setTimelineScroll]=useState(0);
  const fileRef=useRef(null);
  const fileRefSavedSummary=useRef(null);

  useEffect(()=>{
    try{localStorage.setItem(LS_GPS_TO_BOW_M_KEY,String(gpsToBowM));}catch(_){}
  },[gpsToBowM]);

  const applyWorkerSession=useCallback((d)=>{
    if(!d||!d.ok||!d.supabase_access_token)return false;
    supabaseUserJwt=d.supabase_access_token;
    setSession({
      user:d.user,
      strava:d.strava||{linked:false,athlete:null},
      supabase_access_token:d.supabase_access_token,
    });
    if(d.strava?.athlete){
      const at=d.strava.athlete;
      setSAth({id:at.id,firstname:at.firstname||"",lastname:at.lastname||""});
    }else setSAth(null);
    return true;
  },[]);

  const trackMeta=useMemo(()=>{
    if(!rawPoints||rawPoints.length<2)return null;
    const s=[...rawPoints].sort((a,b)=>a.time-b.time);
    const t0=s[0].time,t1=s[s.length-1].time;
    return{t0,t1,spanSec:t1-t0,n:s.length};
  },[rawPoints]);

  const cropStartSecParsed=useMemo(()=>{
    if(!trackMeta)return 0;
    const p=parseHMS(cropStartText);
    const sec=p==null?0:p;
    return Math.max(0,Math.min(sec,trackMeta.spanSec));
  },[cropStartText,trackMeta]);

  const cropDurationSecParsed=useMemo(()=>{
    const t=cropDurationText.trim();
    if(t==="")return null;
    const p=parseHMS(t);
    if(p==null||p<=0)return null;
    return p;
  },[cropDurationText]);

  const croppedPoints=useMemo(()=>{
    if(!rawPoints||rawPoints.length<2)return rawPoints;
    return cropTrackPoints(rawPoints,cropStartSecParsed,cropDurationSecParsed);
  },[rawPoints,cropStartSecParsed,cropDurationSecParsed]);

  const croppedMeta=useMemo(()=>{
    if(!croppedPoints||croppedPoints.length<2)return null;
    const s=[...croppedPoints].sort((a,b)=>a.time-b.time);
    return{durSec:s[s.length-1].time-s[0].time,n:s.length};
  },[croppedPoints]);

  useEffect(()=>{
    setCropStartText("00:00:00");
    setCropDurationText("");
  },[rawPoints]);

  // Restore session from HttpOnly cookie; if Strava returned ?code=, exchange only after /session succeeds
  // (avoids racing POST /strava/exchange before the browser attaches the cross-site session cookie).
  useEffect(()=>{
    let cancelled=false;
    (async()=>{
      try{
        const p=new URLSearchParams(window.location.search);
        const code=p.get("code");
        const d=await apiGetSession();
        if(cancelled)return;
        if(d.ok&&d.supabase_access_token)applyWorkerSession(d);
        if(!code)return;
        if(!d.ok||!d.supabase_access_token){
          alert("Sign in to SailStats first, then use “Link Strava”.");
          window.history.replaceState({},"",window.location.pathname);
          return;
        }
        window.history.replaceState({},"",window.location.pathname);
        const ex=await exchangeStravaLinked(code);
        if(cancelled)return;
        if(applyWorkerSession(ex))setView("activities");
        else{
          if(ex.detail||ex.hint){
            const d=typeof ex.detail==="object"&&ex.detail!==null?JSON.stringify(ex.detail,null,2):String(ex.detail||"");
            console.error("Strava link error:",ex.error,d,ex.hint?`\n${ex.hint}`:"");
          }
          const pgMsg=(ex.detail&&ex.detail.message)||(ex.detail&&ex.detail.details)||(ex.detail&&ex.detail.hint)||(ex.detail&&ex.detail.error_description)||ex.hint||"";
          let msg=ex.error==="sign_in_first"?"Sign in to SailStats first, then use “Link Strava”."
            :ex.error==="strava_linked_other_account"?(ex.detail&&ex.detail.message)||"This Strava account is linked to another SailStats login."
            :ex.error==="invalid_strava_id"?"Strava returned an unexpected athlete id. Try “Link Strava” again; if it persists, check the console."
            :ex.error==="invalid_strava_tokens"?"Strava did not return usable tokens. Try “Link Strava” again."
            :ex.error==="save_user_failed"?(pgMsg?`Could not save Strava link: ${pgMsg}`:"Could not save your Strava link (see console for details).")
            :(ex.error||"Strava link failed");
          alert(msg);
        }
      }catch(e){console.error(e);alert("Strava link failed")}
    })();
    return()=>{cancelled=true};
  },[applyWorkerSession]);

  const loadActs=useCallback(async()=>{
    if(!session?.strava?.linked)return;
    setLoadingActs(true);
    try{
      const a=await fetchActs(1);
      if(Array.isArray(a))setActs(a);
      else if(a&&a.message)console.warn("Activities:",a);
    }catch(e){console.error(e)}
    setLoadingActs(false);
  },[session]);

  const refreshSavedAnalyses=useCallback(async()=>{
    const sid=session?.strava?.athlete?.id ?? sAth?.id;
    if(sid==null)return;
    try{
      const sess=await apiGetSession();
      if(sess?.ok&&sess.supabase_access_token)supabaseUserJwt=sess.supabase_access_token;
    }catch(_){}
    try{
      const rows=await loadAnalyses(sid);
      const m={};
      if(Array.isArray(rows)){
        for(const r of rows){
          if(r&&r.activity_id!=null)m[String(r.activity_id)]=r;
        }
      }
      setSavedByActId(m);
    }catch(e){console.warn("loadAnalyses:",e)}
  },[session,sAth]);

  useEffect(()=>{
    if(session?.strava?.linked&&view==="activities"&&acts.length===0)loadActs();
  },[session,view,loadActs,acts.length]);

  useEffect(()=>{
    if(view==="activities"&&session?.strava?.linked)refreshSavedAnalyses();
  },[view,session?.strava?.linked,refreshSavedAnalyses]);

  useEffect(()=>{
    if(!compareMode)setComparePick([]);
  },[compareMode]);

  useEffect(()=>{
    if(view!=="compare"||!compareIds||compareIds.length!==2){
      setCompareRows([null,null]);
      return;
    }
    let cancelled=false;
    (async()=>{
      try{
        const sess=await apiGetSession();
        if(sess?.ok&&sess.supabase_access_token)supabaseUserJwt=sess.supabase_access_token;
      }catch(_){}
      const sid=session?.strava?.athlete?.id ?? sAth?.id;
      if(sid==null){if(!cancelled)setCompareRows([null,null]);return;}
      const [a,b]=compareIds;
      const [r0,r1]=await Promise.all([loadAnalysisRow(sid,a),loadAnalysisRow(sid,b)]);
      if(!cancelled)setCompareRows([r0,r1]);
    })();
    return()=>{cancelled=true};
  },[view,compareIds,session,sAth]);

  const activitiesListMerged=useMemo(()=>mergeActivitiesWithSaved(acts,savedByActId),[acts,savedByActId]);

  useEffect(()=>{
    if(view!=="saved-summary"||!savedSummaryId){
      setSavedSummaryRow(null);
      return;
    }
    let cancelled=false;
    (async()=>{
      try{
        const sess=await apiGetSession();
        if(sess?.ok&&sess.supabase_access_token)supabaseUserJwt=sess.supabase_access_token;
      }catch(_){}
      const sid=session?.strava?.athlete?.id ?? sAth?.id;
      if(sid==null){if(!cancelled)setSavedSummaryRow(null);return;}
      const r=await loadAnalysisRow(sid,savedSummaryId);
      if(!cancelled)setSavedSummaryRow(r);
    })();
    return()=>{cancelled=true};
  },[view,savedSummaryId,session,sAth]);

  const toggleComparePick=useCallback((id)=>{
    const s=String(id);
    setComparePick(p=>{
      if(p.includes(s))return p.filter(x=>x!==s);
      if(p.length<2)return[...p,s];
      return[p[0],s];
    });
  },[]);

  const openCompareSelected=useCallback(()=>{
    if(comparePick.length!==2)return;
    setCompareIds([comparePick[0],comparePick[1]]);
    setView("compare");
    setCompareMode(false);
    setComparePick([]);
  },[comparePick]);

  const submitRename=useCallback(async(act)=>{
    const sid=session?.strava?.athlete?.id ?? sAth?.id;
    if(sid==null)return;
    setRenameBusy(true);
    try{
      const sess=await apiGetSession();
      if(sess?.ok&&sess.supabase_access_token)supabaseUserJwt=sess.supabase_access_token;
      const res=await renameActivityName(sid,act.id,renameDraft);
      if(res.ok){
        const trimmed=renameDraft.trim();
        setSavedByActId(prev=>{
          const k=String(act.id);
          const base=prev[k]||{activity_id:k,strava_id:Number(sid)};
          return{...prev,[k]:{...base,activity_name:trimmed||null}};
        });
        setRenameActId(null);
      }else alert("Could not rename. Save an analysis for this activity first (run analysis from course setup).");
    }catch(e){console.error(e);alert("Rename failed.");}
    setRenameBusy(false);
  },[session,sAth,renameDraft]);

  const loadStravaActivity=useCallback(async(act, nextView = "course-input")=>{
    if(!session?.strava?.linked)return;
    setProcessing(true);setSetupSaveMsg(null);
    const preSaved=savedByActId[String(act.id)];
    setActName((preSaved?.activity_name&&String(preSaved.activity_name).trim())||act.name);
    setActId(String(act.id));setActDate(act.start_date||act.start_date_local||"");
    const startRef=act.start_date||act.start_date_local;
    if(!startRef){alert("Activity has no start time.");setProcessing(false);return;}
    const startMs=new Date(startRef).getTime();
    if(!Number.isFinite(startMs)){alert("Invalid activity start time.");setProcessing(false);return;}
    try{
      const streams=await fetchStreams(act.id);
      if(streams.latlng&&streams.time){
        const pts=streams.time.data.map((t,i)=>({time:startMs/1000+t,lat:streams.latlng.data[i][0],lon:streams.latlng.data[i][1]}));
        setRawPoints(pts);
        setAnalysis(null);
        setDetSettings(DETECTION_DEFAULTS);
        setCourseLetter("");setLaps(1);setMarkOverrides({});setWindOvr(null);setWindwardMarkName("");
        setCropStartText("00:00:00");setCropDurationText("");
        setSfLineEndAText(`${DEFAULT_SF_LINE_ENDS.endA.lat}, ${DEFAULT_SF_LINE_ENDS.endA.lon}`);
        setSfLineEndBText(`${DEFAULT_SF_LINE_ENDS.endB.lat}, ${DEFAULT_SF_LINE_ENDS.endB.lon}`);
        setRaceStartText(DEFAULT_RACE_START_TEXT);
        const sid=session?.strava?.athlete?.id ?? sAth?.id;
        if(sid!=null){
          const row=await loadAnalysisRow(sid,String(act.id));
          if(row){
            if(row.activity_name&&String(row.activity_name).trim())setActName(String(row.activity_name).trim());
            if(row.course_letter)setCourseLetter(String(row.course_letter));
            if(row.laps!=null)setLaps(Math.max(1,parseInt(row.laps,10)||1));
            if(row.mark_overrides&&typeof row.mark_overrides==="object")setMarkOverrides(row.mark_overrides);
            if(row.wind_direction!=null&&Number.isFinite(Number(row.wind_direction)))setWindOvr(Number(row.wind_direction));
            applyCourseSetupCropFromRow(row.course_setup,setCropStartText,setCropDurationText);
            applySfLineEndsFromRow(row.course_setup,setSfLineEndAText,setSfLineEndBText);
            applyWindwardMarkFromRow(row.course_setup||{},setWindwardMarkName);
            const maybeSnap=parseAnalysisSnapshotField(row.analysis_snapshot);
            if(maybeSnap&&maybeSnap.detSettings&&typeof maybeSnap.detSettings==="object")
              setDetSettings({...DETECTION_DEFAULTS,...maybeSnap.detSettings});
          }
        }
        setView(nextView);
      }else{alert("No GPS stream for this activity.");}
    }catch(e){console.error(e);alert("Failed to load activity")}
    setProcessing(false);
  },[session,sAth,savedByActId]);

  const openStravaSetup=useCallback((act)=>loadStravaActivity(act,"course-setup"),[loadStravaActivity]);

  // Handle file upload
  const handleFile=useCallback(async(file)=>{
    setProcessing(true);setActName(file.name.replace(/\.(gpx|fit)$/i,""));
    try{
      let pts;
      if(file.name.toLowerCase().endsWith(".fit")){pts=parseFIT(await file.arrayBuffer())}
      else{pts=parseGPX(await file.text())}
      if(pts.length<20){alert("Not enough GPS points");setProcessing(false);return}
      const t0=pts[0].time;
      setActId(`file-${Date.now()}`);
      setActDate(new Date(t0>1e12?t0:t0*1000).toISOString());
      setRawPoints(pts);setCourseLetter("");setLaps(1);setMarkOverrides({});setWindOvr(null);setWindwardMarkName("");
      setSfLineEndAText(`${DEFAULT_SF_LINE_ENDS.endA.lat}, ${DEFAULT_SF_LINE_ENDS.endA.lon}`);
      setSfLineEndBText(`${DEFAULT_SF_LINE_ENDS.endB.lat}, ${DEFAULT_SF_LINE_ENDS.endB.lon}`);
      setRaceStartText(DEFAULT_RACE_START_TEXT);
      setView("course-input");
    }catch(e){console.error(e);alert("Failed to parse: "+e.message)}
    setProcessing(false);
  },[]);

  // Get effective mark positions for selected course
  const effectiveMarks=useMemo(()=>{
    if(!courseLetter||!WSC_COURSES[courseLetter])return{};
    const course=WSC_COURSES[courseLetter];
    const rowsInOrder=[...(course.marksPreamble||[]),...(course.marks||[])].map(parseMarkSpec).filter(r=>r.name);
    const tackFirst={};
    rowsInOrder.forEach(r=>{ if(!Object.prototype.hasOwnProperty.call(tackFirst,r.name)) tackFirst[r.name]=r.tack; });
    const uniqueNames=[...new Set(rowsInOrder.map(r=>r.name))];
    const marks={};
    uniqueNames.forEach(name=>{
      const base=WSC_MARKS[name];
      if(!base)return;
      const ovr=markOverrides[name];
      marks[name]={
        lat:ovr?ovr.lat:base.lat,
        lon:ovr?ovr.lon:base.lon,
        fixed:false,
        desc:base.desc||"",
        name,
        roundTack:tackFirst[name]||null,
      };
    });
    return marks;
  },[courseLetter,markOverrides]);

  const windTuning=useMemo(()=>{
    const n=windwardMarkName&&String(windwardMarkName).trim();
    if(!n)return null;
    const m=effectiveMarks[n];
    if(!m||m.lat==null||m.lon==null)return null;
    return{windward:{lat:Number(m.lat),lon:Number(m.lon)}};
  },[windwardMarkName,effectiveMarks]);

  const customSfEnds=useMemo(()=>{
    const a=parseLatLonPair(sfLineEndAText),b=parseLatLonPair(sfLineEndBText);
    if(!a||!b)return null;
    return{endA:a,endB:b};
  },[sfLineEndAText,sfLineEndBText]);

  const sfLineEnds=useMemo(()=>{
    if(customSfEnds)return customSfEnds;
    return DEFAULT_SF_LINE_ENDS;
  },[customSfEnds]);

  /** WSC committee line: custom A–B, else mark + perpendicular line on map. */
  const mapMarksWithStart=useMemo(()=>{
    if(!sfLineEnds)return effectiveMarks;
    return{
      ...effectiveMarks,
      SFA:{lat:sfLineEnds.endA.lat,lon:sfLineEnds.endA.lon,fixed:false,desc:"Committee line end A (drag)",name:"SFA"},
      SFB:{lat:sfLineEnds.endB.lat,lon:sfLineEnds.endB.lon,fixed:false,desc:"Committee line end B (drag)",name:"SFB"},
    };
  },[effectiveMarks,sfLineEnds]);

  /** Distance from track to committee line (segment if custom, else mark point). */
  const distToStartLine=useMemo(()=>{
    if(!croppedPoints||croppedPoints.length<2)return null;
    if(!sfLineEnds)return null;
    return distanceAlongTrackToSegment(croppedPoints,sfLineEnds.endA.lat,sfLineEnds.endA.lon,sfLineEnds.endB.lat,sfLineEnds.endB.lon);
  },[croppedPoints,sfLineEnds]);

  const raceStartSecParsed=useMemo(()=>{
    const p=parseHMS(raceStartText);
    return p==null?0:Math.max(0,p);
  },[raceStartText]);

  // Per-lap mark sequence (coordinates + tack); preamble handled separately
  const courseMarkSeq=useMemo(()=>{
    if(!courseLetter||!WSC_COURSES[courseLetter])return[];
    return (WSC_COURSES[courseLetter].marks||[]).map(row=>{
      const {name,tack}=parseMarkSpec(row);
      const m=effectiveMarks[name];
      return m?{name,lat:m.lat,lon:m.lon,tack}:null;
    }).filter(Boolean);
  },[courseLetter,effectiveMarks]);

  const coursePreambleSeq=useMemo(()=>{
    if(!courseLetter||!WSC_COURSES[courseLetter])return null;
    const pre=WSC_COURSES[courseLetter].marksPreamble;
    if(!pre||!pre.length)return null;
    const arr=pre.map(row=>{
      const {name,tack}=parseMarkSpec(row);
      const m=effectiveMarks[name];
      return m?{name,lat:m.lat,lon:m.lon,tack}:null;
    }).filter(Boolean);
    return arr.length?arr:null;
  },[courseLetter,effectiveMarks]);

  const courseMapLine=useMemo(()=>{
    if(!courseLetter||!WSC_COURSES[courseLetter])return[];
    return expandCourseMarks(coursePreambleSeq,courseMarkSeq,laps);
  },[courseLetter,coursePreambleSeq,courseMarkSeq,laps]);

  const markOrderLap1=useMemo(()=>expandCourseMarks(coursePreambleSeq,courseMarkSeq,1),[coursePreambleSeq,courseMarkSeq]);

  const windwardMarkOptions=useMemo(()=>{
    const seen=new Set();
    const out=[];
    for(const pt of markOrderLap1){
      if(!pt?.name||seen.has(pt.name))continue;
      seen.add(pt.name);
      out.push(pt.name);
    }
    return out;
  },[markOrderLap1]);

  useEffect(()=>{
    if(!windwardMarkName)return;
    if(!windwardMarkOptions.includes(windwardMarkName))setWindwardMarkName("");
  },[windwardMarkOptions,windwardMarkName]);

  /** Full-track analysis used for start/finish and auto-crop detection. */
  const fullTrackAnalysis=useMemo(()=>{
    if(!rawPoints||rawPoints.length<20)return null;
    const markArr=courseMarkSeq.length>0?courseMarkSeq:null;
    return runAnalysis(rawPoints,windOvr,markArr,laps,coursePreambleSeq,detSettings,sfLineEnds,windTuning,gpsToBowM);
  },[rawPoints,windOvr,courseMarkSeq,coursePreambleSeq,laps,detSettings,sfLineEnds,windTuning,gpsToBowM]);

  /** Cropped analysis used for displayed manoeuvres/statistics. */
  const setupMapAnalysis=useMemo(()=>{
    if(!croppedPoints||croppedPoints.length<20)return null;
    const markArr=courseMarkSeq.length>0?courseMarkSeq:null;
    return runAnalysis(croppedPoints,windOvr,markArr,laps,coursePreambleSeq,detSettings,sfLineEnds,windTuning,gpsToBowM);
  },[croppedPoints,windOvr,courseMarkSeq,coursePreambleSeq,laps,detSettings,sfLineEnds,windTuning,gpsToBowM]);

  const startFinishStats=useMemo(()=>{
    if(!rawPoints||rawPoints.length<2||!sfLineEnds||!fullTrackAnalysis)return null;
    const pts=fullTrackAnalysis.points||rawPoints;
    const startIdx=nearestPointIndexByClockTime(pts,raceStartSecParsed);
    const startPt=startIdx>=0?pts[startIdx]:null;
    const bow=startPt?gpsPositionToBow(pts,startIdx,Number(gpsToBowM)||0):null;
    const refLat=bow?.lat??startPt?.lat,refLon=bow?.lon??startPt?.lon;
    const startDist=refLat!=null?distPointToSegmentM(refLat,refLon,sfLineEnds.endA.lat,sfLineEnds.endA.lon,sfLineEnds.endB.lat,sfLineEnds.endB.lon):null;
    let signedStartDist=null,startOnCourseSide=null;
    const firstMarkSpec=WSC_COURSES[courseLetter]?.marks?.[0];
    const firstMarkName=Array.isArray(firstMarkSpec)?firstMarkSpec[0]:firstMarkSpec;
    const firstMark=firstMarkName?effectiveMarks[firstMarkName]:null;
    if(refLat!=null&&refLon!=null&&firstMark&&Number.isFinite(startDist)){
      signedStartDist=signedDistanceToCommitteeLineM(refLat,refLon,sfLineEnds.endA,sfLineEnds.endB,firstMark.lat,firstMark.lon);
      startOnCourseSide=signedStartDist<0;
    }
    const legs=fullTrackAnalysis.legs||[];
    const startLeg=legs.find(l=>l.from==="START")||null;
    const finishLeg=[...legs].reverse().find(l=>l.to==="FINISH")||null;
    let startCross=null,finishCross=null;
    if(startLeg&&startLeg.startIdx!=null&&startLeg.endIdx!=null){
      const pick=closestIndexToLine(pts,sfLineEnds.endA,sfLineEnds.endB,startLeg.startIdx,startLeg.endIdx);
      if(pick.idx>=0&&pts[pick.idx])startCross={time:pts[pick.idx].time,idx:pick.idx,dist:pick.dist};
    }
    if(finishLeg&&finishLeg.startIdx!=null&&finishLeg.endIdx!=null){
      const pick=closestIndexToLine(pts,sfLineEnds.endA,sfLineEnds.endB,finishLeg.startIdx,finishLeg.endIdx);
      if(pick.idx>=0&&pts[pick.idx])finishCross={time:pts[pick.idx].time,idx:pick.idx,dist:pick.dist};
    }
    return{startDist,signedStartDist,startOnCourseSide,startCross,finishCross,startPointTime:startPt?.time||null};
  },[rawPoints,sfLineEnds,raceStartSecParsed,courseLetter,effectiveMarks,fullTrackAnalysis,gpsToBowM]);

  useEffect(()=>{
    if(!rawPoints||rawPoints.length<2||!startFinishStats)return;
    const t0=rawPoints[0].time;
    const startRef=startFinishStats.startPointTime;
    if(!Number.isFinite(startRef))return;
    const cropStartAbs=Math.max(t0,startRef-15);
    const cropStartSec=Math.max(0,Math.round(cropStartAbs-t0));
    const finishT=startFinishStats.finishCross?.time;
    const cropDurSec=Number.isFinite(finishT)&&finishT>cropStartAbs?Math.round(finishT-cropStartAbs):null;
    const nextStart=formatHMS(cropStartSec);
    const nextDur=cropDurSec!=null?formatHMS(cropDurSec):"";
    if(cropStartText!==nextStart)setCropStartText(nextStart);
    if(cropDurationText!==nextDur)setCropDurationText(nextDur);
  },[rawPoints,startFinishStats,cropStartText,cropDurationText]);

  // Run analysis with current settings
  const doAnalysis=useCallback(async()=>{
    if(!rawPoints||!croppedPoints||croppedPoints.length<20){if(rawPoints)alert("Track too short after crop — widen the time window or reset crop.");return;}
    setProcessing(true);
    const markArr=courseMarkSeq.length>0?courseMarkSeq:null;
    const result=runAnalysis(croppedPoints,windOvr,markArr,laps,coursePreambleSeq,detSettings,sfLineEnds,windTuning,gpsToBowM);
    if(!result){
      setProcessing(false);
      alert("Analysis could not run — need at least 20 GPS points in the cropped track. Widen the crop or check the file.");
      return;
    }
    setAnalysis(result);
    if(windOvr===null)setWindOvr(result.windDir);
    setTab("overview");
    setView("analysis");
    const sid = session?.strava?.athlete?.id ?? sAth?.id;
    if (sid != null && result) {
      try {
        await saveAnalysis(sid, actId, actName, actDate, result, {
          courseLetter,
          laps,
          markOverrides,
          cropStartText,
          cropDurationText,
          cropStartSec: cropStartSecParsed,
          cropDurationSec: cropDurationSecParsed,
          sfLineEndAText,
          sfLineEndBText,
          windwardMark: windwardMarkName,
        });
      } catch (e) { console.warn("Save failed:", e); }
      refreshSavedAnalyses();
    }
    setProcessing(false);
  },[
    rawPoints,
    croppedPoints,
    windOvr,
    courseMarkSeq,
    coursePreambleSeq,
    laps,
    session,
    sAth,
    actId,
    actName,
    actDate,
    courseLetter,
    markOverrides,
    cropStartText,
    cropDurationText,
    cropStartSecParsed,
    cropDurationSecParsed,
    sfLineEndAText,
    sfLineEndBText,
    detSettings,
    sfLineEnds,
    windTuning,
    windwardMarkName,
    refreshSavedAnalyses,
    gpsToBowM,
  ]);

  const doAnalysisRef=useRef(doAnalysis);
  doAnalysisRef.current=doAnalysis;

  const saveCourseSetupOnly = useCallback(async () => {

    markOverrides,
    windOvr,
    cropStartText,

    sfLineEndAText,

  const openAnalysisFromSavedRow=useCallback(async (rowIn)=>{
    if(!rowIn?.activity_id){
      alert("Invalid saved activity.");
      return false;
    }
    const sid=session?.strava?.athlete?.id ?? sAth?.id;
    let row=rowIn;

          snap=parseAnalysisSnapshotField(row.analysis_snapshot);

    }
    if(!snap){
      alert("Full analysis is not stored for this activity yet. Run Supabase migration (analysis_snapshot column) if needed, then open the GPX/FIT from Upload and run analysis once more to save charts and map.");
      return false;
    }
    const pts=snap.points;
    if(!Array.isArray(pts)||pts.length<2){
      alert("Saved analysis is missing track points. Upload the file again and run analysis.");
      return false;
    }
    setActId(String(row.activity_id));
    setActName(row.activity_name&&String(row.activity_name).trim()||"Uploaded track");
    setActDate(row.activity_date||row.updated_at||"");
    setCourseLetter(row.course_letter?String(row.course_letter):"");
    setLaps(row.laps!=null?Math.max(1,parseInt(row.laps,10)||1):1);
    setMarkOverrides(row.mark_overrides&&typeof row.mark_overrides==="object"?row.mark_overrides:{});
    if(row.wind_direction!=null&&Number.isFinite(Number(row.wind_direction)))setWindOvr(Number(row.wind_direction));
    else setWindOvr(snap.windDir!=null?Number(snap.windDir):null);
    applySfLineEndsFromRow(row.course_setup||{},setSfLineEndAText,setSfLineEndBText);
    applyWindwardMarkFromRow(row.course_setup||{},setWindwardMarkName);
    if(snap.detSettings&&typeof snap.detSettings==="object")setDetSettings({...DETECTION_DEFAULTS,...snap.detSettings});

    /* croppedPoints is useMemo from raw + crop. useEffect on rawPoints resets crop to 0 — re-apply saved crop after that. */
    setTimeout(()=>{
      applyCourseSetupCropFromRow(row.course_setup||{},setCropStartText,setCropDurationText);
    },0);
    setAnalysis(snap);
    setTab("overview");
    setView("analysis");
    setSavedSummaryId(null);
    return true;
  },[session,sAth]);

  /** Map + detection: hydrated from snapshot if present, else Strava streams for numeric activity id. */
  const openCourseSetupFromSavedRow=useCallback(async (rowIn)=>{

          snap=parseAnalysisSnapshotField(row.analysis_snapshot);

      }catch(e){ console.warn("loadAnalysisRow for setup:",e); }

    if(snap&&Array.isArray(snap.points)&&snap.points.length>=2){
      setActId(aid);
      setActName(row.activity_name&&String(row.activity_name).trim()||"Uploaded track");
      setActDate(row.activity_date||row.updated_at||"");
      setCourseLetter(row.course_letter?String(row.course_letter):"");
      setLaps(row.laps!=null?Math.max(1,parseInt(row.laps,10)||1):1);
      setMarkOverrides(row.mark_overrides&&typeof row.mark_overrides==="object"?row.mark_overrides:{});
      if(row.wind_direction!=null&&Number.isFinite(Number(row.wind_direction)))setWindOvr(Number(row.wind_direction));
      else setWindOvr(snap.windDir!=null?Number(snap.windDir):null);
      applySfLineEndsFromRow(row.course_setup||{},setSfLineEndAText,setSfLineEndBText);
      applyWindwardMarkFromRow(row.course_setup||{},setWindwardMarkName);
      if(snap.detSettings&&typeof snap.detSettings==="object")setDetSettings({...DETECTION_DEFAULTS,...snap.detSettings});
      else setDetSettings(DETECTION_DEFAULTS);
      setRawPoints(snap.points);
      setTimeout(()=>{ applyCourseSetupCropFromRow(row.course_setup||{},setCropStartText,setCropDurationText); },0);
      setAnalysis(null);
      setTab("overview");
      setView("course-setup");
      setSavedSummaryId(null);
      return true;
    }
    if(/^\d+$/.test(aid)){
      if(!session?.strava?.linked){
        alert("Link Strava to open map setup for this activity.");
        return false;
      }
      await openStravaSetup({id:Number(aid),name:row.activity_name||`#${aid}`,start_date:row.activity_date,start_date_local:row.activity_date});
      return true;
    }
    alert("No stored track for this entry. Re-upload the GPX or FIT, then run analysis once to save a track snapshot for offline setup.");
    return false;
  },[session,sAth,openStravaSetup]);

  const deleteActivityRow=useCallback(async (act, hasSaved)=>{
    const sid=session?.strava?.athlete?.id ?? sAth?.id;
    if(sid==null){
      alert("Sign in to delete saved data.");
      return;
    }
    if(!hasSaved){
      alert("There is no saved analysis to delete for this track.");
      return;
    }
    if(!window.confirm("Delete this track’s saved analysis from SailStats? This cannot be undone."))return;
    try{
      const sess=await apiGetSession();
      if(sess?.ok&&sess.supabase_access_token)supabaseUserJwt=sess.supabase_access_token;
    }catch(_){}
    const res=await deleteAnalysisRow(sid, String(act.id));
    if(res.ok){
      setSavedByActId((prev)=>{ const n={...prev}; delete n[String(act.id)]; return n; });
      refreshSavedAnalyses();
    }else{
      const msg=res.data&&res.data.message?String(res.data.message):"";
      alert(msg||"Could not delete. Check the console for details.");
    }
  },[session,sAth,refreshSavedAnalyses]);

  const viewAnalysisFromList=useCallback(async (act, saved, isUploadOnly)=>{
    if(isUploadOnly){
      if(saved&&await openAnalysisFromSavedRow(saved))return;
      setSavedSummaryId(String(act.id));
      setView("saved-summary");
      return;
    }
    await loadStravaActivity(act,"course-input");
  },[openAnalysisFromSavedRow,loadStravaActivity]);

  const openSetupFromList=useCallback(async (act, saved, isUploadOnly)=>{
    if(isUploadOnly){
      if(!saved){
        alert("No saved data for this upload.");
        return;
      }
      await openCourseSetupFromSavedRow(saved);
      return;
    }
    await openStravaSetup(act);
  },[openCourseSetupFromSavedRow,openStravaSetup]);

  // Re-run when wind changes
  const curAnalysis=useMemo(()=>{
    if(!analysis||!croppedPoints)return analysis;
    if(croppedPoints.length<20)return analysis;
    const windChg=windOvr!==null&&windOvr!==analysis.windDir;
    const bowChg=Number(gpsToBowM)!==Number(analysis.gpsToBowM??DEFAULT_GPS_TO_BOW_M);
    if(windChg||bowChg){
      const markArr=courseMarkSeq.length>0?courseMarkSeq:null;
      const recalc=runAnalysis(croppedPoints,windOvr,markArr,laps,coursePreambleSeq,detSettings,sfLineEnds,windTuning,gpsToBowM);
      if(recalc!=null)return recalc;
    }
    return analysis;
  },[analysis,windOvr,croppedPoints,courseMarkSeq,coursePreambleSeq,laps,detSettings,sfLineEnds,windTuning,gpsToBowM]);

  /** Shared X domain for stacked speed/wind charts (zoom + scroll without mutating analysis). */
  const timelineDomain=useMemo(()=>{
    if(!curAnalysis?.speedTL?.length)return null;
    const tl=curAnalysis.speedTL;
    const tMin=Math.min(...tl.map(d=>d.time));
    const tMax=Math.max(...tl.map(d=>d.time));
    const span=Math.max(1,tMax-tMin);
    const win=Math.max(20,span/Math.max(1,timelineZoom));
    const maxScroll=Math.max(0,span-win);
    const start=tMin+maxScroll*timelineScroll;
    const end=Math.min(tMax,start+win);
    return[start,end];
  },[curAnalysis,timelineZoom,timelineScroll]);

  useEffect(()=>{
    setTimelineZoom(1);
    setTimelineScroll(0);
  },[actId]);

  const effWind=windOvr!==null?windOvr:(view==="course-setup"||view==="course-input"?(setupMapAnalysis?.windDir??analysis?.windDir??0):(curAnalysis?.windDir??0));

  const courseMapStartFinish=useMemo(()=>{
    if(!sfLineEnds)return null;
    return{mode:"ends",endA:sfLineEnds.endA,endB:sfLineEnds.endB};
  },[sfLineEnds]);

  // Handle mark drag
  const onMarkDrag=useCallback((name,lat,lng)=>{
    if(name==="SFA"){
      setSfLineEndAText(`${lat.toFixed(6)}, ${lng.toFixed(6)}`);

      return;
    }
    setMarkOverrides(prev=>({...prev,[name]:{lat,lon:lng}}));
  },[]);

  const hdr={display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px",borderBottom:`1px solid ${C.bdr}`,background:`${C.bg}ee`,backdropFilter:"blur(12px)",position:"sticky",top:0,zIndex:100};
  const btn=(bg,fg,bdr)=>({background:bg,color:fg,border:bdr?`1px solid ${bdr}`:"none",borderRadius:8,padding:"10px 18px",fontSize:14,fontWeight:600,cursor:"pointer"});

  const signIn=useCallback(async()=>{
    setAuthErr("");setAuthBusy(true);
    try{
      const d=await apiSignIn(authEmail.trim(),authPassword);
      if(applyWorkerSession(d)){
        if(d.strava?.linked)setView("activities");

      }else setAuthErr(typeof d.detail==="object"?JSON.stringify(d.detail):String(d.error||d.message||"Sign in failed"));

    finally{setAuthBusy(false)}
  },[authEmail,authPassword,applyWorkerSession]);

  const signUp=useCallback(async()=>{

    try{
      const d=await apiSignUp(authEmail.trim(),authPassword);
      if(d.needs_confirmation){setAuthErr("");alert(d.message||"Check your email to confirm, then sign in.");setShowRegister(false);return;}
      if(applyWorkerSession(d))setView("home");
      else setAuthErr(String(d.error||"Sign up failed"));
    }catch(e){setAuthErr(String(e.message||e))}
    finally{setAuthBusy(false)}
  },[authEmail,authPassword,applyWorkerSession]);

  const signOutAll=useCallback(async()=>{
    try{await apiLogout()}catch(e){console.warn(e)}
    supabaseUserJwt=null;
    setSession(null);
    setSAth(null);
    setActs([]);

  /* ─── HOME ─── */
  if(view==="home"){
    return(<div style={{background:C.bg,minHeight:"100vh"}}>
      <div style={{maxWidth:480,margin:"0 auto",padding:"70px 20px",textAlign:"center"}}>

          {session?.user?<>

                <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg>

            <input type="email" autoComplete="username" value={authEmail} onChange={e=>setAuthEmail(e.target.value)} placeholder="you@example.com" style={{width:"100%",marginBottom:10,padding:"10px 12px",borderRadius:8,border:`1px solid ${C.bdr}`,background:C.bg,color:C.txt,fontSize:14}}/>
            <label style={{fontSize:10,color:C.txM,display:"block",marginBottom:4}}>Password</label>
            <input type="password" autoComplete={showRegister?"new-password":"current-password"} value={authPassword} onChange={e=>setAuthPassword(e.target.value)} placeholder="••••••••" style={{width:"100%",marginBottom:10,padding:"10px 12px",borderRadius:8,border:`1px solid ${C.bdr}`,background:C.bg,color:C.txt,fontSize:14}}/>
            {authErr&&<div style={{fontSize:12,color:C.wrn,marginBottom:10}}>{authErr}</div>}
