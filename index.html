          {[["WSC Courses","2026/27 letters, marks & GPS (Course Selector data)"],["Tack Scoring","Quality score 0-100 with speed profile"],["Leg Analysis","Split by mark roundings with VMG"],["Drag Marks","Adjust laid mark positions on the map"]].map(([t,d])=>(
            <div key={t} style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bdr}`}}>
              <div style={{fontSize:12,fontWeight:600,color:C.txt,marginBottom:3}}>{t}</div>
              <div style={{fontSize:10,color:C.txM,lineHeight:1.5}}>{d}</div>
            </div>
          ))}
        </div>
      </div>
    </div>);
  }

  /* ─── ACTIVITIES ─── */
  if(view==="activities"){
    return(<div style={{background:C.bg,minHeight:"100vh",paddingBottom:compareMode?72:0}}>
      <div style={hdr}>
        <button onClick={signOutAll} style={{background:"none",border:"none",color:C.txM,fontSize:12}}>Sign Out</button>
        <div style={{fontSize:15,fontWeight:700,color:C.acc}}>SailStats</div>
        <div style={{fontSize:11,color:C.txM}}>{sAth?.firstname||session?.user?.email||""}</div>
      </div>
      <div style={{maxWidth:560,margin:"0 auto",padding:"20px 14px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
          <div style={{fontSize:18,fontWeight:700}}>Your Activities</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            <button type="button" onClick={()=>setCompareMode(c=>!c)} style={{...btn(compareMode?`${C.acc}25`:"transparent",compareMode?C.acc:C.txM,C.bdr),padding:"7px 12px",fontSize:11}}>{compareMode?"Cancel compare":"Compare"}</button>
            <button type="button" onClick={()=>fileRef.current?.click()} style={{...btn(`${C.acc}18`,C.acc,`${C.acc}44`),padding:"7px 12px",fontSize:11}}>+ Upload File</button>
          </div>
          <input ref={fileRef} type="file" accept=".gpx,.fit" style={{display:"none"}} onChange={e=>{if(e.target.files[0])handleFile(e.target.files[0])}}/>
        </div>
        {compareMode&&<div style={{fontSize:10,color:C.txD,marginBottom:12,lineHeight:1.5}}>Select two activities, then <strong style={{color:C.txt}}>Compare selected</strong>. Uses the last saved analysis (course + stats) from Supabase for each.</div>}
        {session?.strava?.linked&&<div style={{fontSize:10,color:C.txD,marginBottom:10,lineHeight:1.5}}>From Strava we import <strong style={{color:C.txt}}>Sail</strong> and <strong style={{color:C.txt}}>Windsurf</strong> activities only.</div>}
        {loadingActs&&<div style={{color:C.txM,padding:30,textAlign:"center"}}>Loading...</div>}
        {processing&&<div style={{color:C.acc,padding:30,textAlign:"center"}}>Processing...</div>}
        {activitiesListMerged.some(a=>a.__fromSupabaseOnly)&&<div style={{fontSize:10,color:C.txD,marginBottom:10,lineHeight:1.5}}><strong style={{color:C.txt}}>Uploads</strong> (GPX/FIT) appear here after you run analysis — GPS stays on your device; use the buttons below or <strong>Compare</strong>.</div>}
        {!loadingActs && !processing && session?.strava?.linked && activitiesListMerged.length===0 &&<div style={{color:C.txM,fontSize:12,padding:"16px 0",lineHeight:1.5}}>No <strong style={{color:C.txt}}>Sail</strong> or <strong style={{color:C.txt}}>Windsurf</strong> activities in your recent Strava list, and no saved uploads yet. Upload a GPX/FIT or record a Sail/Windsurf activity in Strava.</div>}
        {activitiesListMerged.map(act=>{
          const sidStr=String(act.id);
          const saved=act.__fromSupabaseOnly?act.__savedRow:savedByActId[sidStr];
          const displayName=(saved?.activity_name&&String(saved.activity_name).trim())||act.name;
          const hasSaved=!!saved;
          const picked=comparePick.includes(sidStr);
          const rowKey=act.__fromSupabaseOnly?`sb-${sidStr}`:sidStr;
          const isUpload=!!act.__fromSupabaseOnly;
          const onRowStripClick=()=>{ if(compareMode)toggleComparePick(act.id); };
          return(
            <div key={rowKey} style={{display:"flex",alignItems:"stretch",gap:8,marginBottom:6}}>
              {compareMode&&<label style={{display:"flex",alignItems:"center",paddingLeft:4,cursor:"pointer"}}>
                <input type="checkbox" checked={picked} onChange={()=>toggleComparePick(act.id)} style={{width:16,height:16,accentColor:C.acc}}/>
              </label>}
              <div style={{flex:1,minWidth:0,background:C.card,borderRadius:10,border:`1px solid ${picked?C.acc:C.bdr}`,overflow:"hidden",transition:"border-color 0.15s"}}>
                {String(renameActId)===String(act.id)?(
                  <div style={{padding:"10px 12px",display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}}>
                    <input value={renameDraft} onChange={e=>setRenameDraft(e.target.value)} placeholder="Display name" autoFocus style={{flex:1,minWidth:140,padding:"8px 10px",borderRadius:8,border:`1px solid ${C.bdr}`,background:C.bg,color:C.txt,fontSize:13}}/>
                    <button type="button" disabled={renameBusy} onClick={()=>submitRename(act)} style={{...btn(`${C.acc}22`,C.acc,C.acc),padding:"8px 14px",fontSize:11}}>{renameBusy?"…":"Save"}</button>
                    <button type="button" onClick={()=>{setRenameActId(null);}} style={{...btn("transparent",C.txM,C.bdr),padding:"8px 12px",fontSize:11}}>Cancel</button>
                  </div>
                ):(
                  <div>
                    <div
                      role={compareMode?"button":undefined}
                      onClick={onRowStripClick}
                      onKeyDown={compareMode?(e)=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();toggleComparePick(act.id);} }:undefined}
                      tabIndex={compareMode?0:-1}
                      style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px 8px 14px",width:"100%",background:"transparent",border:"none",textAlign:"left",cursor:compareMode?"pointer":"default",minWidth:0}}
                    >
                      <div style={{width:34,height:34,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,background:`${C.blu}22`,flexShrink:0}}>
                        {isUpload?"📁":(act.type?.includes("Sail")?"⛵":act.type?.includes("Wind")?"🏄":act.type?.includes("Ride")?"🚴":"📍")}
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:600,color:C.txt,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{displayName}</div>
                        <div style={{fontSize:10,color:C.txM,marginTop:2}}>
                          {isUpload?formatCompareRowSubtitle(saved,null):formatCompareRowSubtitle(saved,act)}
                          {act.elapsed_time!=null&&Number.isFinite(act.elapsed_time)?` · ${fT(act.elapsed_time)}`:""}
                          {act.distance!=null&&Number.isFinite(act.distance)?` · ${m2nm(act.distance).toFixed(1)}nm`:""}
                          {hasSaved?<span style={{color:C.acc,marginLeft:6}}>· saved</span>:""}
                          {isUpload?<span style={{color:C.txD,marginLeft:6}}>· file / no Strava</span>:""}
                        </div>
                      </div>
                    </div>
                    {!compareMode&&(
                      <div style={{display:"flex",flexWrap:"wrap",gap:8,padding:"4px 12px 12px 14px",alignItems:"center"}}>
                        <button type="button" disabled={!hasSaved} onClick={()=>deleteActivityRow(act,hasSaved)} title={hasSaved?"Delete saved analysis from SailStats":"No saved data to delete"} style={{...btn("transparent",hasSaved?C.wrn:C.txD,hasSaved?C.wrn:C.bdr),padding:"6px 12px",fontSize:11,opacity:hasSaved?1:0.4,cursor:hasSaved?"pointer":"not-allowed"}}>Delete</button>
                        <button type="button" onClick={()=>openSetupFromList(act,saved,isUpload)} style={{...btn("transparent",C.acc,C.acc),padding:"6px 12px",fontSize:11,borderWidth:1}}>Setup</button>
                        <button type="button" onClick={()=>viewAnalysisFromList(act,saved,isUpload)} style={{...btn(`${C.acc}20`,C.acc,C.acc),padding:"6px 12px",fontSize:11}}>View analysis</button>
                      </div>
                    )}
                  </div>
                )}
              </div>
              {!compareMode&&hasSaved&&String(renameActId)!==String(act.id)&&(
                <button type="button" title="Rename in list" onClick={e=>{e.stopPropagation();setRenameActId(String(act.id));setRenameDraft(displayName);}} style={{...btn("transparent",C.txM,C.bdr),padding:"0 12px",fontSize:14,borderRadius:10,alignSelf:"stretch"}}>✎</button>
              )}
            </div>
          );
        })}
      </div>
      {compareMode&&comparePick.length===2&&(
        <div style={{position:"fixed",left:0,right:0,bottom:0,padding:"12px 16px",background:`${C.card}f2`,borderTop:`1px solid ${C.bdr}`,backdropFilter:"blur(8px)",zIndex:200,display:"flex",justifyContent:"center",gap:12}}>
          <button type="button" onClick={openCompareSelected} style={{...btn(C.acc,"#0a1628"),padding:"12px 24px",fontSize:13,fontWeight:700}}>Compare selected</button>
          <button type="button" onClick={()=>setComparePick([])} style={{...btn("transparent",C.txM,C.bdr),padding:"12px 16px",fontSize:12}}>Clear</button>
        </div>
      )}
    </div>);
  }

  /* ─── SAVED SUMMARY (upload / no Strava stream) ─── */
  if(view==="saved-summary"){
    const r=savedSummaryRow;
    const title=(r?.activity_name&&String(r.activity_name).trim())||(savedSummaryId&&savedSummaryId.startsWith("file-")?"Uploaded track":`#${savedSummaryId}`);
    const s=r?.stats;
    const leg=r?.leg_summary;
    const mv=meanNumeric((leg||[]).map(l=>l.avgVMG));
    const tack=r?.tack_scores,gyb=r?.gybe_scores;
    const avgTk=(arr)=>{const q=(arr||[]).filter(t=>!t.excluded&&Number.isFinite(t.q));return q.length?Math.round(q.reduce((a,t)=>a+t.q,0)/q.length):null;};
    const avgGy=(arr)=>{const q=(arr||[]).filter(g=>!g.excluded&&Number.isFinite(g.q));return q.length?Math.round(q.reduce((a,g)=>a+g.q,0)/q.length):null;};
    const atk=avgTk(tack),agy=avgGy(gyb);
    const dispAtk=atk??(s?.avgTackQuality!=null?Math.round(s.avgTackQuality):null);
    const dispGy=agy??(s?.avgGybeQuality!=null?Math.round(s.avgGybeQuality):null);
    const fmt=(v,fn)=>v==null||!Number.isFinite(v)?"—":fn(v);
    const one=(k,v)=>(<tr key={k} style={{borderBottom:`1px solid ${C.bdr}`}}><td style={{padding:"10px 10px",color:C.txM,fontSize:12}}>{k}</td><td style={{padding:"10px 8px",color:C.txt,fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>{v}</td></tr>);
    return(<div style={{background:C.bg,minHeight:"100vh"}}>
      <div style={hdr}>
        <button type="button" onClick={()=>{setView("activities");setSavedSummaryId(null);}} style={{background:"none",border:"none",color:C.txM,fontSize:13}}>← Activities</button>
        <div style={{fontSize:14,fontWeight:600,color:C.txt}}>Saved analysis</div>
        <div style={{width:72}}/>
      </div>
      <div style={{maxWidth:560,margin:"0 auto",padding:"20px 14px 40px"}}>
        <div style={{fontSize:16,fontWeight:700,color:C.txt,marginBottom:8}}>{title}</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:14,alignItems:"center"}}>
          {r&&<button type="button" onClick={async()=>{await openAnalysisFromSavedRow(r);}} style={{...btn(C.acc,"#0a1628"),padding:"10px 18px",fontSize:13}}>Open full analysis</button>}
          <button type="button" onClick={()=>fileRefSavedSummary.current?.click()} style={{...btn("transparent",C.acc,C.acc),padding:"10px 18px",fontSize:12,border:`1px solid ${C.acc}`}}>Upload GPX/FIT again</button>
          <input ref={fileRefSavedSummary} type="file" accept=".gpx,.fit" style={{display:"none"}} onChange={e=>{if(e.target.files[0])handleFile(e.target.files[0])}}/>
        </div>
        <div style={{fontSize:11,color:C.txD,marginBottom:16,lineHeight:1.55}}>Re-opening charts and map needs a stored analysis snapshot (saved automatically for file uploads after you run analysis). To change course setup from scratch, upload the same file from the home screen.</div>
        {!r&&<div style={{color:C.txM,padding:20}}>Loading…</div>}
        {r&&<div style={{overflowX:"auto",border:`1px solid ${C.bdr}`,borderRadius:12,background:C.card}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{borderBottom:`1px solid ${C.bdr}`}}><th style={{textAlign:"left",padding:"12px 10px",fontSize:10,color:C.txM,textTransform:"uppercase",letterSpacing:1}}>Metric</th><th style={{textAlign:"left",padding:"12px 8px",fontSize:11,color:C.acc}}>Value</th></tr></thead>
            <tbody>
              {one("Date",formatCompareRowSubtitle(r,null))}
              {one("Course",r.course_letter||"—")}
              {one("Laps",r.laps!=null?String(r.laps):"—")}
              {one("Wind °",r.wind_direction!=null&&Number.isFinite(Number(r.wind_direction))?`${Math.round(Number(r.wind_direction))}`:"—")}
              {one("Distance (nm)",s?m2nm(s.totalDist).toFixed(2):"—")}
              {one("Duration",s?fT(s.duration):"—")}
              {one("Max speed (kts)",fmt(s?.maxSpeed,v=>v.toFixed(1)))}
              {one("Avg speed (kts)",fmt(s?.avgSpeed,v=>v.toFixed(1)))}
              {one("Tacks (racing)",s!=null?`${s.tackCount}`:"—")}
              {one("Gybes (racing)",s!=null?`${s.gybeCount}`:"—")}
              {one("Avg tack %",dispAtk!=null?`${dispAtk}`:"—")}
              {one("Avg gybe %",dispGy!=null?`${dispGy}`:"—")}
              {one("Legs (n)",leg?.length!=null?`${leg.length}`:"—")}
              {one("Mean leg VMG",mv!=null?mv.toFixed(2):"—")}
              {one("Wind shift (°)",fmt(s?.windShiftRange,v=>v.toFixed(1)))}
            </tbody>
          </table>
        </div>}
      </div>
    </div>);
  }

  /* ─── COMPARE (saved analyses) ─── */
  if(view==="compare"){
    const [r0,r1]=compareRows;
    const id0=compareIds?.[0],id1=compareIds?.[1];
    const strava0=acts.find(a=>String(a.id)===id0);
    const strava1=acts.find(a=>String(a.id)===id1);
    const title0=(r0?.activity_name&&String(r0.activity_name).trim())||strava0?.name||`#${id0}`;
    const title1=(r1?.activity_name&&String(r1.activity_name).trim())||strava1?.name||`#${id1}`;
    const s0=r0?.stats,s1=r1?.stats;
    const leg0=r0?.leg_summary,leg1=r1?.leg_summary;
    const th2={textAlign:"left",padding:"8px 6px",fontSize:10,color:C.txM,textTransform:"uppercase",letterSpacing:0.5};
    const thTrack=(col)=>({textAlign:"right",padding:"8px 6px",fontSize:10,color:col,maxWidth:100});
    const tdL={padding:"6px 6px",fontSize:12,color:C.txM};
    const tdN={padding:"6px 6px",fontSize:12,color:C.txt,fontFamily:"'JetBrains Mono',monospace",textAlign:"right",verticalAlign:"top"};
    const fmtF=(v,d=1)=>v==null||!Number.isFinite(v)?"—":Number(v).toFixed(d);
    const fmtPDeg=(v)=>v==null||!Number.isFinite(v)?"—":`${Number(v).toFixed(1)}°`;
    const wind0=r0?.wind_direction!=null&&Number.isFinite(Number(r0.wind_direction))?Math.round(Number(r0.wind_direction)):"—";
    const w1fix=r1?.wind_direction!=null&&Number.isFinite(Number(r1.wind_direction))?Math.round(Number(r1.wind_direction)):"—";
    const rowSpd=(t,pfx)=>{
      if(!t||!t[pfx]||!t[pfx].n)return"—";
      const o=t[pfx];
      return`${fmtF(o.avgSpeed,2)}${o.speedStd!=null&&Number.isFinite(o.speedStd)?` (σ ${fmtF(o.speedStd,2)})`:""}`;
    };
    const rowCog=(o)=>{
      if(!o||!o.n||o.avgCourse==null||!Number.isFinite(o.avgCourse))return"—";
      return`${fmtF(o.avgCourse,1)}°${o.courseStd!=null&&Number.isFinite(o.courseStd)?` (σ ${fmtF(o.courseStd,1)}°)`:""}`;
    };
    const TackTypeBlock=({name,ts0,ts1})=>{
      const hasData=ts0||ts1;
      if(!hasData)return(
        <div style={{fontSize:11,color:C.txD,padding:10}}>No {name} data — re-run analysis to store tack × leg-type splits.</div>
      );
      return(<div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:400}}>
          <thead>
            <tr style={{borderBottom:`1px solid ${C.bdr}`}}>
              <th style={th2}>{name}</th>
              <th style={thTrack(C.acc)}>{title0}</th>
              <th style={thTrack(C.gld)}>{title1}</th>
            </tr>
          </thead>
          <tbody>
            <tr style={{borderBottom:`1px solid ${C.bdr}`}}><td colSpan={3} style={{...tdL,fontSize:10,color:C.port,fontWeight:700,paddingTop:8}}>Port tack</td></tr>
            <tr style={{borderBottom:`1px solid ${C.bdr}`}}>
              <td style={tdL}>Avg speed (var)</td>
              <td style={tdN}>{rowSpd(ts0,"port")}</td>
              <td style={tdN}>{rowSpd(ts1,"port")}</td>
            </tr>
            <tr style={{borderBottom:`1px solid ${C.bdr}`}}>
              <td style={tdL}>Avg VMG (kts)</td>
              <td style={tdN}>{ts0?.port?.avgVMG!=null?fmtF(ts0.port.avgVMG,2):"—"}</td>
              <td style={tdN}>{ts1?.port?.avgVMG!=null?fmtF(ts1.port.avgVMG,2):"—"}</td>
            </tr>
            <tr style={{borderBottom:`1px solid ${C.bdr}`}}>
              <td style={tdL}>Mean COG (var)</td>
              <td style={tdN}>{rowCog(ts0?.port)}</td>
              <td style={tdN}>{rowCog(ts1?.port)}</td>
            </tr>
            <tr style={{borderBottom:`1px solid ${C.bdr}`}}>
              <td style={tdL}>Mean TWA (TWA var)</td>
              <td style={tdN}>{ts0?.port?.twaFromWind!=null?`${fmtF(ts0.port.twaFromWind,1)}${ts0.port.twaStd!=null?` (σ ${fmtF(ts0.port.twaStd,1)})`:""}`:"—"}</td>
              <td style={tdN}>{ts1?.port?.twaFromWind!=null?`${fmtF(ts1.port.twaFromWind,1)}${ts1.port.twaStd!=null?` (σ ${fmtF(ts1.port.twaStd,1)})`:""}`:"—"}</td>
            </tr>
            <tr style={{borderBottom:`1px solid ${C.bdr}`}}><td colSpan={3} style={{...tdL,fontSize:10,color:C.stbd,fontWeight:700,paddingTop:6}}>Starboard tack</td></tr>
            <tr style={{borderBottom:`1px solid ${C.bdr}`}}>
              <td style={tdL}>Avg speed (var)</td>
              <td style={tdN}>{rowSpd(ts0,"stbd")}</td>
              <td style={tdN}>{rowSpd(ts1,"stbd")}</td>
            </tr>
            <tr style={{borderBottom:`1px solid ${C.bdr}`}}>
              <td style={tdL}>Avg VMG (kts)</td>
              <td style={tdN}>{ts0?.stbd?.avgVMG!=null?fmtF(ts0.stbd.avgVMG,2):"—"}</td>
              <td style={tdN}>{ts1?.stbd?.avgVMG!=null?fmtF(ts1.stbd.avgVMG,2):"—"}</td>
            </tr>
            <tr style={{borderBottom:`1px solid ${C.bdr}`}}>
              <td style={tdL}>Mean COG (var)</td>
              <td style={tdN}>{rowCog(ts0?.stbd)}</td>
              <td style={tdN}>{rowCog(ts1?.stbd)}</td>
            </tr>
            <tr style={{borderBottom:`1px solid ${C.bdr}`}}>
              <td style={tdL}>Mean TWA (TWA var)</td>
              <td style={tdN}>{ts0?.stbd?.twaFromWind!=null?`${fmtF(ts0.stbd.twaFromWind,1)}${ts0.stbd.twaStd!=null?` (σ ${fmtF(ts0.stbd.twaStd,1)})`:""}`:"—"}</td>
              <td style={tdN}>{ts1?.stbd?.twaFromWind!=null?`${fmtF(ts1.stbd.twaFromWind,1)}${ts1.stbd.twaStd!=null?` (σ ${fmtF(ts1.stbd.twaStd,1)})`:""}`:"—"}</td>
            </tr>
            <tr style={{borderBottom:`1px solid ${C.bdr}`}}>
              <td style={tdL}>P↔S mean TWA difference</td>
              <td style={tdN}>{fmtPDeg(ts0?.p2sTwaDiff)}</td>
              <td style={tdN}>{fmtPDeg(ts1?.p2sTwaDiff)}</td>
            </tr>
            <tr style={{borderBottom:`1px solid ${C.bdr}`}}>
              <td style={tdL}>Port % / Stbd % (samples)</td>
              <td style={tdN}>{ts0?.portSamplePct!=null?`${ts0.portSamplePct.toFixed(0)}% / ${(ts0.stbdSamplePct??0).toFixed(0)}%`:"—"}</td>
              <td style={tdN}>{ts1?.portSamplePct!=null?`${ts1.portSamplePct.toFixed(0)}% / ${(ts1.stbdSamplePct??0).toFixed(0)}%`:"—"}</td>
            </tr>
          </tbody>
        </table>
      </div>);
    };
    const t0s=s0?.tackStatsByLegType;
    const t1s=s1?.tackStatsByLegType;
    const nLeg=Math.max(leg0?.length||0,leg1?.length||0);
    const lab0=title0.length>20?`${title0.slice(0,18)}…`:title0;
    const lab1=title1.length>20?`${title1.slice(0,18)}…`:title1;
    const exportCompare=()=>{
      if(!r0||!r1){
        alert("Two saved activities are required to export a comparison.");
        return;
      }
      const sub0=formatCompareRowSubtitle(r0,strava0);
      const sub1=formatCompareRowSubtitle(r1,strava1);
      const html=buildComparePrintHtml({
        title0,title1,sub0,sub1,
        r0,r1,
        s0,s1,
        leg0,leg1,
        t0s,t1s,
      });
      openPrintableCompareDocument(html);
    };
    return(<div style={{background:C.bg,minHeight:"100vh"}}>
      <div style={hdr}>
        <button type="button" onClick={()=>{setView("activities");setCompareIds(null);}} style={{background:"none",border:"none",color:C.txM,fontSize:13}}>← Activities</button>
        <div style={{fontSize:14,fontWeight:600,color:C.txt}}>Compare</div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <button type="button" disabled={!r0||!r1} onClick={exportCompare} style={{...btn("transparent",!r0||!r1?C.txD:C.acc,C.bdr),padding:"6px 12px",fontSize:12,fontWeight:600,display:"inline-flex",alignItems:"center",gap:4,opacity:!r0||!r1?0.5:1,cursor:!r0||!r1?"not-allowed":"pointer"}} title="Open a print-ready page — in the print dialog use Save as PDF (e.g. Chrome)">Export PDF / print</button>
        </div>
      </div>
      <div style={{maxWidth:900,margin:"0 auto",padding:"20px 14px 40px"}}>
        <p style={{fontSize:11,color:C.txD,marginBottom:16,lineHeight:1.55}}>Data from the last analysis saved in Supabase for each activity. Re-run <strong style={{color:C.txt}}>Analyse</strong> on an activity to refresh its stored metrics and leg splits. <strong style={{color:C.txt}}>Export PDF / print</strong> opens a report tab and the print dialog — use <strong style={{color:C.txt}}>Save as PDF</strong> in that dialog. Allow pop-ups for <strong style={{color:C.txt}}>this page’s address</strong> (e.g. <code style={{color:C.txt}}>*.github.io</code> for GitHub Pages), not only <code style={{color:C.txt}}>github.com</code>. If pop-ups are blocked, export falls back to printing from an in-page frame.</p>

        <div style={{fontSize:12,fontWeight:700,color:C.txt,marginBottom:8,letterSpacing:0.5}}>1 · Overall performance</div>
        <div style={{border:`1px solid ${C.bdr}`,borderRadius:12,background:C.card,marginBottom:20,overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr style={{borderBottom:`1px solid ${C.bdr}`}}>
                <th style={th2}>Metric</th>
                <th style={thTrack(C.acc)}>{title0}</th>
                <th style={thTrack(C.gld)}>{title1}</th>
              </tr>
            </thead>
            <tbody>
              <tr style={{borderBottom:`1px solid ${C.bdr}`}}>
                <td style={tdL}>Elapsed time</td>
                <td style={tdN}>{s0&&Number.isFinite(s0.duration)?fT(s0.duration):"—"}</td>
                <td style={tdN}>{s1&&Number.isFinite(s1.duration)?fT(s1.duration):"—"}</td>
              </tr>
              <tr style={{borderBottom:`1px solid ${C.bdr}`}}>
                <td style={tdL}>Total distance (nm)</td>
                <td style={tdN}>{s0&&Number.isFinite(s0.totalDist)?m2nm(s0.totalDist).toFixed(2):"—"}</td>
                <td style={tdN}>{s1&&Number.isFinite(s1.totalDist)?m2nm(s1.totalDist).toFixed(2):"—"}</td>
              </tr>
              <tr style={{borderBottom:`1px solid ${C.bdr}`}}>
                <td style={tdL}>Tacks (racing)</td>
                <td style={tdN}>{s0?.tackCount!=null?String(s0.tackCount):"—"}</td>
                <td style={tdN}>{s1?.tackCount!=null?String(s1.tackCount):"—"}</td>
              </tr>
              <tr style={{borderBottom:`1px solid ${C.bdr}`}}>
                <td style={tdL}>Gybes (racing)</td>
                <td style={tdN}>{s0?.gybeCount!=null?String(s0.gybeCount):"—"}</td>
                <td style={tdN}>{s1?.gybeCount!=null?String(s1.gybeCount):"—"}</td>
              </tr>
              <tr>
                <td style={tdL}>Derived wind FROM (°)</td>
                <td style={tdN}>{wind0}</td>
                <td style={tdN}>{w1fix}</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div style={{fontSize:12,fontWeight:700,color:C.txt,marginBottom:8,letterSpacing:0.5}}>2 · Upwind performance (by tack)</div>
        <div style={{border:`1px solid ${C.bdr}`,borderRadius:12,background:C.card,marginBottom:20}}>
          <TackTypeBlock name="Upwind" ts0={t0s?.upwind} ts1={t1s?.upwind}/>
        </div>

        <div style={{fontSize:12,fontWeight:700,color:C.txt,marginBottom:8,letterSpacing:0.5}}>3 · Reach performance (by tack)</div>
        <div style={{border:`1px solid ${C.bdr}`,borderRadius:12,background:C.card,marginBottom:20}}>
          <TackTypeBlock name="Reach" ts0={t0s?.reach} ts1={t1s?.reach}/>
        </div>

        <div style={{fontSize:12,fontWeight:700,color:C.txt,marginBottom:8,letterSpacing:0.5}}>4 · Downwind performance (by tack)</div>
        <div style={{border:`1px solid ${C.bdr}`,borderRadius:12,background:C.card,marginBottom:20}}>
          <TackTypeBlock name="Downwind" ts0={t0s?.downwind} ts1={t1s?.downwind}/>
        </div>

        <div style={{fontSize:12,fontWeight:700,color:C.txt,marginBottom:8,letterSpacing:0.5}}>5 · Performance by leg</div>
        <p style={{fontSize:10,color:C.txD,margin:"0 0 10px",lineHeight:1.5}}>Each <strong style={{color:C.txt}}>leg</strong> = track from the <strong style={{color:C.txt}}>outbound</strong> gate at the <em>from</em> mark (line ⊥ to that leg&rsquo;s chord) to the <strong style={{color:C.txt}}>inbound</strong> gate at the <em>to</em> mark. <strong style={{color:C.txt}}>Distance from line</strong> (START leg only): signed distance from the committee line to the <strong style={{color:C.txt}}>bow</strong> (GPS + offset); negative and highlighted if on the course side of the line. <strong style={{color:C.txt}}>Rnd</strong> = in–out mark path (m) at the <em>from</em> mark. <strong style={{color:C.txt}}>Dist</strong> = leg along-track (nm) — re-run analysis to refresh.</p>
        <div style={{border:`1px solid ${C.bdr}`,borderRadius:12,background:C.card,overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",minWidth:820}}>
            <thead>
              <tr style={{borderBottom:`1px solid ${C.bdr}`}}>
                <th rowSpan={2} style={th2}>Leg</th>
                <th rowSpan={2} style={th2}>From → To</th>
                <th rowSpan={2} style={th2}>Type</th>
                <th colSpan={5} style={{...thTrack(C.acc),textAlign:"center",fontWeight:700}}>{lab0}</th>
                <th colSpan={5} style={{...thTrack(C.gld),textAlign:"center",fontWeight:700}}>{lab1}</th>
                <th rowSpan={2} style={th2}>Time gain/loss</th>
              </tr>
              <tr style={{borderBottom:`1px solid ${C.bdr}`}}>
                <th style={th2}>VMG</th>
                <th style={th2}>Eff%</th>
                <th style={th2}>Rnd / line (m)</th>
                <th style={th2}>Track (nm)</th>
                <th style={th2}>Time</th>
                <th style={th2}>VMG</th>
                <th style={th2}>Eff%</th>
                <th style={th2}>Rnd / line (m)</th>
                <th style={th2}>Track (nm)</th>
                <th style={th2}>Time</th>
              </tr>
            </thead>
            <tbody>
              {Array.from({length:nLeg},(_,i)=>{
                const l0=leg0&&leg0[i],l1=leg1&&leg1[i];
                const t0l=l0?.duration, t1l=l1?.duration;
                const d0m=l0!=null?l0.distanceM??l0.distance:undefined;
                const d1m=l1!=null?l1.distanceM??l1.distance:undefined;
                const r0m=l0?.roundingM, r1m=l1?.roundingM, r0s=l0?.roundingStraightM, r1s=l1?.roundingStraightM;
                const fmtRndVal=(m,s)=>m!=null&&Number.isFinite(m)&&m>0.05?`${String(Math.round(m))}`+(s!=null&&Number.isFinite(s)&&s>0.05?` (st ${String(Math.round(s))})`:""):"—";
                const preLegOrRnd=(l)=>{if(l&&l.startLineDistanceM!=null&&Number.isFinite(l.startLineDistanceM)){const v=Math.round(l.startLineDistanceM);return(<>Distance from line <span style={{color:v<0?C.wrn:C.acc,fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}>{v}m</span></>);}return fmtRndVal(l?.roundingM,l?.roundingStraightM);};
                let deltaS="—";
                if(t0l!=null&&t1l!=null&&Number.isFinite(t0l)&&Number.isFinite(t1l)){
                  const d=t1l-t0l;
                  if(Math.abs(d)<0.5)deltaS="0s";
                  else if(d>0)deltaS=`+${d.toFixed(0)}s (${title1} slower)`;
                  else deltaS=`${d.toFixed(0)}s (${title1} faster)`;
                }
                return(
                  <tr key={i} style={{borderBottom:`1px solid ${C.bdr}`}}>
                    <td style={tdN}>{(l0&&l0.legNo)||(l1&&l1.legNo)||i+1}</td>
                    <td style={tdL}>{(l0&&`${l0.from} → ${l0.to}`)||(l1&&`${l1.from} → ${l1.to}`)||"—"}</td>
                    <td style={tdL}>{(l0&&l0.type)||(l1&&l1.type)||"—"}</td>
                    <td style={tdN}>{l0&&l0.avgVMG!=null?fmtF(l0.avgVMG,2):"—"}</td>
                    <td style={tdN}>{l0&&l0.efficiency!=null?fmtF(l0.efficiency,0):"—"}</td>
                    <td style={tdN}>{preLegOrRnd(l0)}</td>
                    <td style={tdN}>{d0m!=null&&Number.isFinite(d0m)?m2nm(d0m).toFixed(2):"—"}</td>
                    <td style={tdN}>{l0&&l0.duration!=null?fT(l0.duration):"—"}</td>
                    <td style={tdN}>{l1&&l1.avgVMG!=null?fmtF(l1.avgVMG,2):"—"}</td>
                    <td style={tdN}>{l1&&l1.efficiency!=null?fmtF(l1.efficiency,0):"—"}</td>
                    <td style={tdN}>{preLegOrRnd(l1)}</td>
                    <td style={tdN}>{d1m!=null&&Number.isFinite(d1m)?m2nm(d1m).toFixed(2):"—"}</td>
                    <td style={tdN}>{l1&&l1.duration!=null?fT(l1.duration):"—"}</td>
                    <td style={{...tdL,fontSize:11}}>{deltaS}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {nLeg===0&&<div style={{padding:16,fontSize:12,color:C.txM}}>No leg breakdown — set course and analysis, and ensure the track crosses all mark gates (no closest-point fallback). Re-run analysis.</div>}
        </div>
        {(!r0||!r1)&&<div style={{marginTop:14,fontSize:12,color:C.wrn}}>One or both activities have no saved analysis yet. Open each, set course, and run analysis.</div>}
      </div>
    </div>);
  }

  /* ─── COURSE INPUT (form before map) ─── */
  if(view==="course-input"){
    return(<div style={{background:C.bg,minHeight:"100vh"}}>
      <div style={hdr}>
        <button type="button" onClick={()=>session?.strava?.linked?setView("activities"):setView("home")} style={{background:"none",border:"none",color:C.txM,fontSize:13}}>← Back</button>
        <div style={{fontSize:14,fontWeight:600,color:C.txt}}>{actName}</div>
        <div style={{width:40}}/>
      </div>
      <div style={{maxWidth:700,margin:"0 auto",padding:"20px 14px"}}>
        <div style={{fontSize:18,fontWeight:700,marginBottom:6}}>Course & wind</div>
        <p style={{fontSize:12,color:C.txM,margin:"0 0 16px",lineHeight:1.55}}>Choose the course, laps, start time, optional windward mark, and rough wind. Then open the map to move marks, committee line, and run analysis.</p>

        {trackMeta&&<div style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bdr}`,marginBottom:16}}>
          <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Track</div>
          <div style={{fontSize:12,color:C.txM,lineHeight:1.5}}>
            Duration: <strong style={{color:C.txt}}>{formatHMS(trackMeta.spanSec)}</strong> ({trackMeta.n} pts)
            {croppedMeta&&<span> · After auto-crop: <strong style={{color:C.acc}}>{formatHMS(croppedMeta.durSec)}</strong> ({croppedMeta.n} pts)</span>}
          </div>
        </div>}

        <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
          <div style={{flex:2,minWidth:180}}>
            <label style={{fontSize:11,color:C.txM,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:1}}>Course</label>
            <select value={courseLetter} onChange={e=>setCourseLetter(e.target.value)} style={{width:"100%",padding:"10px 12px",background:C.card,color:C.txt,border:`1px solid ${C.bdr}`,borderRadius:8,fontSize:14,fontFamily:"'Outfit',sans-serif"}}>
              <option value="">— Select course —</option>
              {Object.entries(WSC_COURSES).map(([k,v])=><option key={k} value={k}>{v.name}</option>)}
            </select>
          </div>
          <div style={{flex:1,minWidth:80}}>
            <label style={{fontSize:11,color:C.txM,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:1}}>Laps</label>
            <select value={laps} onChange={e=>setLaps(parseInt(e.target.value,10))} style={{width:"100%",padding:"10px 12px",background:C.card,color:C.txt,border:`1px solid ${C.bdr}`,borderRadius:8,fontSize:14,fontFamily:"'Outfit',sans-serif"}}>
              {[1,2,3,4,5].map(n=><option key={n} value={n}>{n}</option>)}
            </select>
          </div>
          <div style={{flex:1,minWidth:140}}>
            <label style={{fontSize:11,color:C.txM,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:1}}>Start time</label>
            <input
              type="text"
              value={raceStartText}
              onChange={e=>setRaceStartText(e.target.value)}
              onBlur={()=>{
                const p=parseHMS(raceStartText);
                setRaceStartText(formatHMS(p==null?0:p));
              }}
              placeholder="00:00:00"
              style={{width:"100%",padding:"10px 12px",background:C.card,color:C.txt,border:`1px solid ${C.bdr}`,borderRadius:8,fontSize:14,fontFamily:"'JetBrains Mono',monospace"}}
            />
          </div>
        </div>

        <div style={{marginBottom:16}}>
          <label style={{fontSize:11,color:C.txM,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:1}}>Windward mark (optional)</label>
          <select
            value={windwardMarkName}
            onChange={e=>setWindwardMarkName(e.target.value)}
            disabled={!courseLetter}
            style={{width:"100%",maxWidth:400,padding:"10px 12px",background:C.card,color:C.txt,border:`1px solid ${C.bdr}`,borderRadius:8,fontSize:14,fontFamily:"'Outfit',sans-serif",opacity:courseLetter?1:0.5}}
          >
            <option value="">— None —</option>
            {windwardMarkOptions.map(n=><option key={n} value={n}>{n}</option>)}
          </select>
          <p style={{fontSize:10,color:C.txD,margin:"6px 0 0",maxWidth:520,lineHeight:1.5}}>The wind estimate favours track segments and manoeuvres that head toward this mark (upwind leg). List is lap 1 marks in order. Pick a mark only if it matches the day’s course.</p>
        </div>

        <div style={{maxWidth:360,marginBottom:20}}>
          <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Rough wind (FROM ° · meteorological)</div>
          <WindRose
            wd={effWind}
            onChange={setWindOvr}
            compact
            hint={setupMapAnalysis?.windEst?`Auto ${setupMapAnalysis.windEst.dir}° (${(setupMapAnalysis.windEst.conf*100).toFixed(0)}% conf)${windTuning&&windTuning.windward?" · windward-weighted":""} — dial overrides`:"Set rough wind if known, or leave for auto (track-based)"}
          />
        </div>

        <div style={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:10,padding:14,marginBottom:20}}>
          <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>User / GPS</div>
          <label style={{fontSize:12,color:C.txt,display:"block",marginBottom:6}}>Antenna to bow (m)</label>
          <input
            type="number"
            min={0}
            max={25}
            step={0.1}
            value={gpsToBowM}
            onChange={e=>{const n=parseFloat(e.target.value);if(Number.isFinite(n)&&n>=0&&n<=25)setGpsToBowM(n);}}
            style={{width:120,padding:"8px 10px",background:C.bg,color:C.txt,border:`1px solid ${C.bdr}`,borderRadius:8,fontSize:14,fontFamily:"'JetBrains Mono',monospace"}}
          />
          <p style={{fontSize:10,color:C.txD,margin:"8px 0 0",lineHeight:1.5}}>Forward distance from GPS tracker to the bow, along COG, for committee-line distance and start leg. Default 2&nbsp;m. Saved in this browser. Changing it re-runs the wind-aware analysis on the next calculation.</p>
        </div>

        <button type="button" onClick={()=>setView("course-setup")} style={{...btn(C.acc,"#0a1628"),width:"100%",padding:"14px",fontSize:16,fontWeight:700,borderRadius:10}}>
          Continue to setup
        </button>
      </div>
    </div>);
  }

  /* ─── COURSE SETUP (map) ─── */
  if(view==="course-setup"){
    return(<div style={{background:C.bg,minHeight:"100vh"}}>
      <div style={hdr}>
        <button type="button" onClick={()=>setView("course-input")} style={{background:"none",border:"none",color:C.txM,fontSize:13}}>← Course & wind</button>
        <div style={{fontSize:14,fontWeight:600,color:C.txt}}>{actName}</div>
        <div style={{width:40}}/>
      </div>
      <div style={{maxWidth:700,margin:"0 auto",padding:"20px 14px"}}>
        <div style={{fontSize:18,fontWeight:700,marginBottom:8}}>Setup</div>
        <div style={{display:"flex",flexWrap:"wrap",alignItems:"center",gap:10,marginBottom:16,fontSize:12,color:C.txM,background:C.card,border:`1px solid ${C.bdr}`,borderRadius:10,padding:"10px 14px"}}>
          <span>Course: <strong style={{color:C.txt}}>{courseLetter||"—"}</strong></span>
          <span>·</span>
          <span>{laps} lap{laps===1?"":"s"}</span>
          <span>·</span>
          <span>Start {raceStartText||"—"}</span>
          {windwardMarkName?<>
            <span>·</span>
            <span>Windward <strong style={{color:C.acc}}>{windwardMarkName}</strong></span>
          </>:null}
          <span>·</span>
          <span style={{display:"inline-flex",alignItems:"center",gap:6}}>GPS→bow
            <input
              type="number"
              min={0}
              max={25}
              step={0.1}
              value={gpsToBowM}
              onChange={e=>{const n=parseFloat(e.target.value);if(Number.isFinite(n)&&n>=0&&n<=25)setGpsToBowM(n);}}
              style={{width:56,padding:"4px 6px",background:C.bg,color:C.txt,border:`1px solid ${C.bdr}`,borderRadius:6,fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}
            />m
          </span>
          <button type="button" onClick={()=>setView("course-input")} style={{...btn("transparent",C.acc,C.acc),padding:"4px 10px",fontSize:11,marginLeft:"auto"}}>Edit</button>
        </div>

        {trackMeta&&<div style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bdr}`,marginBottom:16}}>
          <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Track crop (auto)</div>
          <div style={{fontSize:12,color:C.txM,lineHeight:1.5}}>
            Full recording: <strong style={{color:C.txt}}>{formatHMS(trackMeta.spanSec)}</strong> ({trackMeta.n} pts)
            {croppedMeta&&<span> · Auto-cropped: <strong style={{color:C.acc}}>{formatHMS(croppedMeta.durSec)}</strong> ({croppedMeta.n} pts)</span>}
          </div>
          <div style={{fontSize:10,color:C.txD,marginTop:8,lineHeight:1.5}}>
            Auto window = <strong style={{color:C.txM}}>start time nearest track point − 15s</strong> through <strong style={{color:C.txM}}>detected finish time</strong> (closest line point on final Mark → FINISH leg). No manual crop controls.
          </div>
        </div>}

        {/* Map + wind dial (wind FROM °, meteorological) */}
        <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:16,alignItems:"stretch",minHeight:380}}>
          <div style={{flex:2,minWidth:280,minHeight:380,borderRadius:12,overflow:"hidden",border:`1px solid ${C.bdr}`}}>
            <CourseMap
              marks={mapMarksWithStart}
              trackPoints={croppedPoints}
              courseMarks={courseMapLine}
              onMarkDrag={onMarkDrag}
              manoeuvres={setupMapAnalysis?{tacks:setupMapAnalysis.tacks,gybes:setupMapAnalysis.gybes}:null}
              startFinishLine={courseMapStartFinish}
              trackSegmentFC={setupMapAnalysis?.trackSegmentFC||null}
            />
            <div style={{fontSize:10,color:C.txD,marginTop:8,lineHeight:1.45}}><span style={{color:C.trk}}>■</span> Normal track · <span style={{color:C.trkRound}}>■</span> Mark rounding (see Manoeuvres for rules) · All course marks draggable on map</div>
          </div>
          <div style={{flex:1,minWidth:200,maxWidth:320,minHeight:380}}>
            <WindRose
              wd={effWind}
              onChange={setWindOvr}
              compact
              hint={setupMapAnalysis?.windEst?`Auto ${setupMapAnalysis.windEst.dir}° (${(setupMapAnalysis.windEst.conf*100).toFixed(0)}% conf)${windTuning&&windTuning.windward?" · uses windward mark":""} — slider overrides`:"Slider sets wind FROM · tacks/gybes update on map"}
            />
          </div>
        </div>
        <div style={{background:C.card,borderRadius:10,padding:"12px 14px",border:`1px solid ${C.bdr}`,marginBottom:16}}>
          <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Start / Finish line (drag SFA/SFB on map)</div>
          {sfLineEnds&&<div style={{fontSize:10,color:C.txD,lineHeight:1.55}}>
            Start reference: <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.txt}}>{formatHMS(raceStartSecParsed)}</span> after first GPS point<br/>
            Track point time nearest start time: <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.txt}}>{startFinishStats?.startPointTime?formatWallClock(startFinishStats.startPointTime):"—"}</span><br/>
            Distance from line at start time: <span style={{fontFamily:"'JetBrains Mono',monospace",color:(startFinishStats?.startOnCourseSide===true?C.port:startFinishStats?.startOnCourseSide===false?C.stbd:C.acc)}}>{Number.isFinite(startFinishStats?.signedStartDist)?`${Math.round(startFinishStats.signedStartDist)} m`:(Number.isFinite(startFinishStats?.startDist)?`${Math.round(startFinishStats.startDist)} m`:"—")}</span><br/>
            Start crossing (closest point on START → Mark 1 leg): <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.acc}}>{startFinishStats?.startCross?`${formatWallClock(startFinishStats.startCross.time)||"—"}`:"Start leg not found"}</span><br/>
            Finish time (closest point on final Mark → FINISH leg): <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.acc}}>{startFinishStats?.finishCross?`${formatWallClock(startFinishStats.finishCross.time)||"—"}`:"Finish leg not found"}</span>
          </div>}
        </div>

        <div style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bdr}`,marginBottom:16}}>
          <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Tack / Gybe detection</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:10}}>

              const cfg=detSettings[type];
