/* ═══════════════════════════════════════════════════════════════════
   MAP COMPONENT
   ═══════════════════════════════════════════════════════════════════ */
function CourseMap({marks,trackPoints,courseMarks,onMarkDrag,manoeuvres,startFinishLine}){
  const mapContainer=useRef(null);
  const mapRef=useRef(null);
  const markersRef=useRef([]);
  const manMarkersRef=useRef([]);
  const [mapBearing,setMapBearing]=useState(0);
  const [mapLoaded,setMapLoaded]=useState(false);

  useEffect(()=>{
    if(!mapContainer.current||mapRef.current)return;
    mapboxgl.accessToken=CONFIG.MAPBOX_TOKEN;
    const map=new mapboxgl.Map({
      container:mapContainer.current,
      style:"mapbox://styles/mapbox/satellite-streets-v12",
      center:[-1.3050,50.8420],
      zoom:13,
    });
    mapRef.current=map;

    const syncBearing=()=>setMapBearing(map.getBearing());
    map.on("rotate",syncBearing);

    map.on("load",()=>{
      if(trackPoints&&trackPoints.length>1){
        map.addSource("track",{type:"geojson",data:{type:"Feature",geometry:{type:"LineString",coordinates:trackPoints.map(p=>[p.lon,p.lat])}}});
        map.addLayer({id:"track-line",type:"line",source:"track",paint:{"line-color":C.trk,"line-width":3,"line-opacity":0.8}});
        const lats=trackPoints.map(p=>p.lat),lons=trackPoints.map(p=>p.lon);
        map.fitBounds([[Math.min(...lons)-0.005,Math.min(...lats)-0.003],[Math.max(...lons)+0.005,Math.max(...lats)+0.003]],{padding:40});
      }
      if(courseMarks&&courseMarks.length>1){
        map.addSource("course",{type:"geojson",data:{type:"Feature",geometry:{type:"LineString",coordinates:courseMarks.map(m=>[m.lon,m.lat])}}});
        map.addLayer({id:"course-line",type:"line",source:"course",paint:{"line-color":C.course,"line-width":2,"line-opacity":0.6,"line-dasharray":[4,3]}});
      }
      syncBearing();
      setMapLoaded(true);
    });

    return()=>{map.off("rotate",syncBearing);map.remove();mapRef.current=null;setMapLoaded(false)};
  },[]);

  useEffect(()=>{
    const map=mapRef.current;if(!map||!mapLoaded)return;
    markersRef.current.forEach(m=>m.remove());
    markersRef.current=[];
    if(!marks)return;
    Object.entries(marks).forEach(([name,mk])=>{
      const el=document.createElement("div");
      let border,fg,bg;
      if(mk.roundTack==="P"){border=C.port;fg="#fff";bg=`${C.port}38`;}
      else if(mk.roundTack==="S"){border=C.stbd;fg="#061018";bg=`${C.stbd}45`;}
      else{border=mk.fixed?C.blu:C.gld;fg=mk.fixed?C.blu:C.gld;bg="#111d33dd";}
      el.style.cssText=`width:28px;height:28px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;font-size:8px;font-weight:700;font-family:'JetBrains Mono',monospace;cursor:${mk.fixed?"default":"grab"};border:2px solid ${border};background:${bg};color:${fg};`;
      const ab=document.createElement("span");ab.style.fontSize="9px";ab.textContent=name.substring(0,3);el.appendChild(ab);
      if(mk.roundTack){const tb=document.createElement("span");tb.style.fontSize="7px";tb.style.opacity="0.95";tb.textContent=mk.roundTack;el.appendChild(tb);}
      const marker=new mapboxgl.Marker({element:el,draggable:!mk.fixed})
        .setLngLat([mk.lon,mk.lat])
        .setPopup(new mapboxgl.Popup({offset:12}).setHTML(`<strong>${name}</strong>${mk.roundTack?` <span style="color:#8899b0">(${mk.roundTack==="P"?"Port":"Stbd"})</span>`:""}${mk.fixed?"":" (drag to adjust)"}${mk.desc?`<br/><span style="color:#8899b0">${mk.desc}</span>`:""}`))
        .addTo(map);
      if(!mk.fixed){
        marker.on("dragend",()=>{
          const lngLat=marker.getLngLat();
          if(onMarkDrag)onMarkDrag(name,lngLat.lat,lngLat.lng);
        });
      }
      markersRef.current.push(marker);
    });
  },[marks,onMarkDrag,mapLoaded]);

  useEffect(()=>{
    const map=mapRef.current;if(!map||!mapLoaded)return;
    manMarkersRef.current.forEach(m=>m.remove());
    manMarkersRef.current=[];
    if(!manoeuvres)return;
    const add=(m,title,color)=>{
      const pointIdx=m.turnIdx??m.idx;
      const lat=m.lat!=null?m.lat:trackPoints?.[pointIdx]?.lat;
      const lon=m.lon!=null?m.lon:trackPoints?.[pointIdx]?.lon;
      if(lat==null||lon==null)return;
      const el=document.createElement("div");
      el.style.cssText=`display:flex;flex-direction:column;align-items:center;padding:4px 8px 5px;border-radius:8px;font-size:11px;font-weight:800;font-family:'JetBrains Mono',monospace;border:2px solid ${color};background:#0a101fcc;color:${color};box-shadow:0 2px 8px rgba(0,0,0,.45);pointer-events:none;line-height:1.15;`;
      const t1=document.createElement("div");t1.textContent=title;t1.style.whiteSpace="nowrap";
      el.appendChild(t1);
      manMarkersRef.current.push(new mapboxgl.Marker({element:el,anchor:"bottom"}).setLngLat([lon,lat]).addTo(map));
    };
    manoeuvres.tacks.forEach((m,i)=>{
      const col=m.crossing==="P→S"?C.port:m.crossing==="S→P"?C.stbd:C.tack;
      add(m,`T${i+1}`,col);
    });
    manoeuvres.gybes.forEach((m,i)=>{
      const col=m.crossing==="P→S"?C.port:m.crossing==="S→P"?C.stbd:C.gybe;
      add(m,`G${i+1}`,col);
    });
  },[manoeuvres,trackPoints,mapLoaded]);

  useEffect(()=>{
    const map=mapRef.current;if(!map||!mapLoaded)return;
    const clearSf=()=>{
      try{
        if(map.getLayer("sf-line"))map.removeLayer("sf-line");
        if(map.getLayer("sf-line-glow"))map.removeLayer("sf-line-glow");
        if(map.getSource("sf-line"))map.removeSource("sf-line");
      }catch(_){}
    };
    const sf=startFinishLine;
    let coords=null;
    if(sf&&sf.mode==="ends"&&sf.endA&&sf.endB){
      const{lat:la,lon:loa}=sf.endA,{lat:lb,lon:lob}=sf.endB;
      if(Number.isFinite(la)&&Number.isFinite(loa)&&Number.isFinite(lb)&&Number.isFinite(lob))
        coords=[[loa,la],[lob,lb]];
    }else if(sf&&sf.lat!=null&&sf.lon!=null&&Number.isFinite(Number(sf.windFromDeg))){
      const wf=Number(sf.windFromDeg)%360;
      const half=Number(sf.halfLengthM)>20?Number(sf.halfLengthM):150;
      const a=destinationPoint(sf.lat,sf.lon,wf+90,half);
      const b=destinationPoint(sf.lat,sf.lon,wf-90,half);
      coords=[[a.lon,a.lat],[b.lon,b.lat]];
    }
    if(!coords||coords.some(c=>!Number.isFinite(c[0])||!Number.isFinite(c[1]))){
      clearSf();
      return;
    }
    const geo={type:"Feature",geometry:{type:"LineString",coordinates:coords}};
    const paintGlow={"line-color":"#00e5c5","line-width":10,"line-opacity":0.28,"line-blur":3};
    const paintLine={"line-color":"#ffffff","line-width":3.5,"line-opacity":1,"line-dasharray":[2,1.5]};
    let cancelled=false;
    const apply=()=>{
      if(cancelled)return;
      try{
        if(typeof map.isStyleLoaded==="function"&&!map.isStyleLoaded())return;
        if(map.getSource("sf-line")){
          map.getSource("sf-line").setData(geo);
          return;
        }
        map.addSource("sf-line",{type:"geojson",data:geo});
        map.addLayer({id:"sf-line-glow",type:"line",source:"sf-line",paint:paintGlow});
        map.addLayer({id:"sf-line",type:"line",source:"sf-line",paint:paintLine});
      }catch(err){console.warn("[CourseMap] start/finish line:",err);}
    };
    const run=()=>{if(!cancelled)apply();};
    if(typeof map.isStyleLoaded==="function"&&map.isStyleLoaded())requestAnimationFrame(run);
    else map.once("idle",run);
    return()=>{
      cancelled=true;
      try{map.off("idle",run);}catch(_){}
    };
  },[startFinishLine,mapLoaded]);

  useEffect(()=>{
    const map=mapRef.current;if(!map||!map.isStyleLoaded())return;
    if(trackPoints&&trackPoints.length>1){
      const src=map.getSource("track");
      if(src)src.setData({type:"Feature",geometry:{type:"LineString",coordinates:trackPoints.map(p=>[p.lon,p.lat])}});
    }
    if(courseMarks&&courseMarks.length>1){
      const src=map.getSource("course");
      if(src)src.setData({type:"Feature",geometry:{type:"LineString",coordinates:courseMarks.map(m=>[m.lon,m.lat])}});
    }
  },[trackPoints,courseMarks]);

  const roseSz=84;
  return(
    <div style={{position:"relative",width:"100%",height:"100%",borderRadius:12,overflow:"hidden"}}>
      <div ref={mapContainer} style={{position:"absolute",inset:0,width:"100%",height:"100%"}}/>
      <div style={{position:"absolute",top:10,right:10,width:roseSz,height:roseSz,pointerEvents:"none",zIndex:4,transform:`rotate(${-mapBearing}deg)`,transformOrigin:"50% 50%",transition:"transform 0.08s linear"}} aria-hidden>
        <svg width={roseSz} height={roseSz} viewBox="0 0 100 100" style={{display:"block",filter:"drop-shadow(0 1px 3px rgba(0,0,0,.5))"}}>
          <circle cx="50" cy="50" r="44" fill="#0a101fbb" stroke="#4a6a8a" strokeWidth="1.5"/>
          {[0,90,180,270].map(deg=>{
            const rad=(deg-90)*Math.PI/180,x1=50+38*Math.cos(rad),y1=50+38*Math.sin(rad),x2=50+44*Math.cos(rad),y2=50+44*Math.sin(rad);
            return(<line key={deg} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#8aa4c4" strokeWidth="1.2"/>);
          })}
          <text x="50" y="15" textAnchor="middle" fill="#e8edf5" fontSize="11" fontWeight="800" fontFamily="system-ui,sans-serif">N</text>
          <text x="88" y="54" textAnchor="middle" fill="#a8b8d0" fontSize="10" fontWeight="700" fontFamily="system-ui,sans-serif">E</text>
          <text x="50" y="92" textAnchor="middle" fill="#a8b8d0" fontSize="10" fontWeight="700" fontFamily="system-ui,sans-serif">S</text>
          <text x="12" y="54" textAnchor="middle" fill="#a8b8d0" fontSize="10" fontWeight="700" fontFamily="system-ui,sans-serif">W</text>
          <polygon points="50,22 46,34 54,34" fill="#4a9eff"/>
        </svg>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════════════════════════════ */
function App(){
  const [view,setView]=useState("home");
  /** Worker session: user + Strava link + short-lived Supabase JWT (not persisted). */
  const [session,setSession]=useState(null);
  const [authEmail,setAuthEmail]=useState("");
  const [authPassword,setAuthPassword]=useState("");
  const [authErr,setAuthErr]=useState("");
  const [authBusy,setAuthBusy]=useState(false);
  const [showRegister,setShowRegister]=useState(false);
  const [sAth,setSAth]=useState(null);
  const [acts,setActs]=useState([]);
  const [loadingActs,setLoadingActs]=useState(false);
  const [rawPoints,setRawPoints]=useState(null);
  const [actName,setActName]=useState("");
  const [analysis,setAnalysis]=useState(null);
  const [windOvr,setWindOvr]=useState(null);
  const [processing,setProcessing]=useState(false);
  const [tab,setTab]=useState("overview");
  const [courseLetter,setCourseLetter]=useState("");
  const [laps,setLaps]=useState(1);
  const [markOverrides,setMarkOverrides]=useState({});
  const [setupSaveBusy,setSetupSaveBusy]=useState(false);
  const [setupSaveMsg,setSetupSaveMsg]=useState(null);
  const [actId,setActId]=useState(null);
  const [actDate,setActDate]=useState(null);
  const [cropStartText,setCropStartText]=useState("00:00:00");
  const [cropDurationText,setCropDurationText]=useState("");
  const [raceStartText,setRaceStartText]=useState("00:00:00");
  const [sfLineEndAText,setSfLineEndAText]=useState(`${DEFAULT_SF_LINE_ENDS.endA.lat}, ${DEFAULT_SF_LINE_ENDS.endA.lon}`);
  const [sfLineEndBText,setSfLineEndBText]=useState(`${DEFAULT_SF_LINE_ENDS.endB.lat}, ${DEFAULT_SF_LINE_ENDS.endB.lon}`);
  const [detSettings,setDetSettings]=useState(DETECTION_DEFAULTS);
  const [timelineZoom,setTimelineZoom]=useState(1);
  const [timelineScroll,setTimelineScroll]=useState(0);
  const fileRef=useRef(null);

  const applyWorkerSession=useCallback((d)=>{
    if(!d||!d.ok||!d.supabase_access_token)return false;
    supabaseUserJwt=d.supabase_access_token;
    setSession({
      user:d.user,
      strava:d.strava||{linked:false,athlete:null},
      supabase_access_token:d.supabase_access_token,
    });
    if(d.strava?.athlete){
      const at=d.strava.athlete;
      setSAth({id:at.id,firstname:at.firstname||"",lastname:at.lastname||""});
    }else setSAth(null);
    return true;
  },[]);

  const trackMeta=useMemo(()=>{
    if(!rawPoints||rawPoints.length<2)return null;
    const s=[...rawPoints].sort((a,b)=>a.time-b.time);
    const t0=s[0].time,t1=s[s.length-1].time;
    return{t0,t1,spanSec:t1-t0,n:s.length};
  },[rawPoints]);

  const cropStartSecParsed=useMemo(()=>{
    if(!trackMeta)return 0;
    const p=parseHMS(cropStartText);
    const sec=p==null?0:p;
    return Math.max(0,Math.min(sec,trackMeta.spanSec));
  },[cropStartText,trackMeta]);

  const cropDurationSecParsed=useMemo(()=>{
    const t=cropDurationText.trim();
    if(t==="")return null;
    const p=parseHMS(t);
    if(p==null||p<=0)return null;
    return p;
  },[cropDurationText]);

  const croppedPoints=useMemo(()=>{
    if(!rawPoints||rawPoints.length<2)return rawPoints;
    return cropTrackPoints(rawPoints,cropStartSecParsed,cropDurationSecParsed);
  },[rawPoints,cropStartSecParsed,cropDurationSecParsed]);

  const croppedMeta=useMemo(()=>{
    if(!croppedPoints||croppedPoints.length<2)return null;
    const s=[...croppedPoints].sort((a,b)=>a.time-b.time);
    return{durSec:s[s.length-1].time-s[0].time,n:s.length};
  },[croppedPoints]);

  /** Max duration (seconds) from current start to end of recording. */
  const cropDurMaxSec=useMemo(()=>{
    if(!trackMeta)return 0;
    return Math.max(0,trackMeta.spanSec-cropStartSecParsed);
  },[trackMeta,cropStartSecParsed]);

  /** Effective duration for − / +: empty field = full remaining (to end). */
  const cropDurStepSec=useMemo(()=>{
    const maxD=cropDurMaxSec;
    if(maxD<=0)return 0;
    const t=cropDurationText.trim();
    if(t==="")return maxD;
    const p=parseHMS(t);
    if(p==null||p<=0)return maxD;
    return Math.max(1,Math.min(maxD,p));
  },[cropDurationText,cropDurMaxSec]);

  useEffect(()=>{
    setCropStartText("00:00:00");
    if(!rawPoints||rawPoints.length<2){
      setCropDurationText("");
      return;
    }
    const s=[...rawPoints].sort((a,b)=>a.time-b.time);
    const span=s[s.length-1].time-s[0].time;
    setCropDurationText(formatHMS(span));
  },[rawPoints]);

  // Restore session from HttpOnly cookie; if Strava returned ?code=, exchange only after /session succeeds
  // (avoids racing POST /strava/exchange before the browser attaches the cross-site session cookie).
  useEffect(()=>{
    let cancelled=false;
    (async()=>{
      try{
        const p=new URLSearchParams(window.location.search);
        const code=p.get("code");
        const d=await apiGetSession();
        if(cancelled)return;
        if(d.ok&&d.supabase_access_token)applyWorkerSession(d);
        if(!code)return;
        if(!d.ok||!d.supabase_access_token){
          alert("Sign in to SailStats first, then use “Link Strava”.");
          window.history.replaceState({},"",window.location.pathname);
          return;
        }
        window.history.replaceState({},"",window.location.pathname);
        const ex=await exchangeStravaLinked(code);
        if(cancelled)return;
        if(applyWorkerSession(ex))setView("activities");
        else{
          if(ex.detail||ex.hint){
            const d=typeof ex.detail==="object"&&ex.detail!==null?JSON.stringify(ex.detail,null,2):String(ex.detail||"");
            console.error("Strava link error:",ex.error,d,ex.hint?`\n${ex.hint}`:"");
          }
          const pgMsg=(ex.detail&&ex.detail.message)||(ex.detail&&ex.detail.details)||(ex.detail&&ex.detail.hint)||(ex.detail&&ex.detail.error_description)||ex.hint||"";
          let msg=ex.error==="sign_in_first"?"Sign in to SailStats first, then use “Link Strava”."
            :ex.error==="strava_linked_other_account"?(ex.detail&&ex.detail.message)||"This Strava account is linked to another SailStats login."
            :ex.error==="invalid_strava_id"?"Strava returned an unexpected athlete id. Try “Link Strava” again; if it persists, check the console."
            :ex.error==="invalid_strava_tokens"?"Strava did not return usable tokens. Try “Link Strava” again."
            :ex.error==="save_user_failed"?(pgMsg?`Could not save Strava link: ${pgMsg}`:"Could not save your Strava link (see console for details).")
            :(ex.error||"Strava link failed");
          alert(msg);
        }
      }catch(e){console.error(e);alert("Strava link failed")}
    })();
    return()=>{cancelled=true};
  },[applyWorkerSession]);

  const loadActs=useCallback(async()=>{
    if(!session?.strava?.linked)return;
    setLoadingActs(true);
    try{
      const a=await fetchActs(1);
      if(Array.isArray(a))setActs(a);
      else if(a&&a.message)console.warn("Activities:",a);
    }catch(e){console.error(e)}
    setLoadingActs(false);
  },[session]);

  useEffect(()=>{
    if(session?.strava?.linked&&view==="activities"&&acts.length===0)loadActs();
  },[session,view,loadActs,acts.length]);

  const analyseStrava=useCallback(async(act)=>{
    if(!session?.strava?.linked)return;
    setProcessing(true);setSetupSaveMsg(null);setActName(act.name);setActId(String(act.id));setActDate(act.start_date||act.start_date_local||"");
    try{
      const streams=await fetchStreams(act.id);
      if(streams.latlng&&streams.time){
        const pts=streams.time.data.map((t,i)=>({time:new Date(act.start_date).getTime()/1000+t,lat:streams.latlng.data[i][0],lon:streams.latlng.data[i][1]}));
        setRawPoints(pts);
        setCourseLetter("");setLaps(1);setMarkOverrides({});setWindOvr(null);
        setCropStartText("00:00:00");setCropDurationText("");
        setSfLineEndAText(`${DEFAULT_SF_LINE_ENDS.endA.lat}, ${DEFAULT_SF_LINE_ENDS.endA.lon}`);
        setSfLineEndBText(`${DEFAULT_SF_LINE_ENDS.endB.lat}, ${DEFAULT_SF_LINE_ENDS.endB.lon}`);
        setRaceStartText("00:00:00");
        const sid=session?.strava?.athlete?.id ?? sAth?.id;
        if(sid!=null){
          const row=await loadAnalysisRow(sid,String(act.id));
          if(row){
            if(row.course_letter)setCourseLetter(String(row.course_letter));
            if(row.laps!=null)setLaps(Math.max(1,parseInt(row.laps,10)||1));
            if(row.mark_overrides&&typeof row.mark_overrides==="object")setMarkOverrides(row.mark_overrides);
            if(row.wind_direction!=null&&Number.isFinite(Number(row.wind_direction)))setWindOvr(Number(row.wind_direction));
            applyCourseSetupCropFromRow(row.course_setup,setCropStartText,setCropDurationText);
            applySfLineEndsFromRow(row.course_setup,setSfLineEndAText,setSfLineEndBText);
          }
        }
        setView("course-setup");
      }
    }catch(e){console.error(e);alert("Failed to load activity")}
    setProcessing(false);
  },[session,sAth]);

  // Handle file upload
  const handleFile=useCallback(async(file)=>{
    setProcessing(true);setActName(file.name.replace(/\.(gpx|fit)$/i,""));
    try{
      let pts;
      if(file.name.toLowerCase().endsWith(".fit")){pts=parseFIT(await file.arrayBuffer())}
      else{pts=parseGPX(await file.text())}
      if(pts.length<20){alert("Not enough GPS points");setProcessing(false);return}
      const t0=pts[0].time;
      setActId(`file-${Date.now()}`);
      setActDate(new Date(t0>1e12?t0:t0*1000).toISOString());
      setRawPoints(pts);setCourseLetter("");setLaps(1);setMarkOverrides({});setWindOvr(null);
      setSfLineEndAText(`${DEFAULT_SF_LINE_ENDS.endA.lat}, ${DEFAULT_SF_LINE_ENDS.endA.lon}`);
      setSfLineEndBText(`${DEFAULT_SF_LINE_ENDS.endB.lat}, ${DEFAULT_SF_LINE_ENDS.endB.lon}`);
      setRaceStartText("00:00:00");
      setView("course-setup");
    }catch(e){console.error(e);alert("Failed to parse: "+e.message)}
    setProcessing(false);
  },[]);

  // Get effective mark positions for selected course
  const effectiveMarks=useMemo(()=>{
    if(!courseLetter||!WSC_COURSES[courseLetter])return{};
    const course=WSC_COURSES[courseLetter];
    const rowsInOrder=[...(course.marksPreamble||[]),...(course.marks||[])].map(parseMarkSpec).filter(r=>r.name);
    const tackFirst={};
    rowsInOrder.forEach(r=>{ if(!Object.prototype.hasOwnProperty.call(tackFirst,r.name)) tackFirst[r.name]=r.tack; });
    const uniqueNames=[...new Set(rowsInOrder.map(r=>r.name))];
    const marks={};
    uniqueNames.forEach(name=>{
      const base=WSC_MARKS[name];
      if(!base)return;
      const ovr=markOverrides[name];
      marks[name]={
        lat:ovr?ovr.lat:base.lat,
        lon:ovr?ovr.lon:base.lon,
        fixed:base.fixed,
        desc:base.desc||"",
        name,
        roundTack:tackFirst[name]||null,
      };
    });
    return marks;
  },[courseLetter,markOverrides]);

  const customSfEnds=useMemo(()=>{
    const a=parseLatLonPair(sfLineEndAText),b=parseLatLonPair(sfLineEndBText);
    if(!a||!b)return null;
    return{endA:a,endB:b};
  },[sfLineEndAText,sfLineEndBText]);

  const sfLineEnds=useMemo(()=>{
    if(customSfEnds)return customSfEnds;
    return DEFAULT_SF_LINE_ENDS;
  },[customSfEnds]);

  /** WSC committee line: custom A–B, else mark + perpendicular line on map. */
  const mapMarksWithStart=useMemo(()=>{
    if(!sfLineEnds)return effectiveMarks;
    return{
      ...effectiveMarks,
      SFA:{lat:sfLineEnds.endA.lat,lon:sfLineEnds.endA.lon,fixed:false,desc:"Committee line end A (drag)",name:"SFA"},
      SFB:{lat:sfLineEnds.endB.lat,lon:sfLineEnds.endB.lon,fixed:false,desc:"Committee line end B (drag)",name:"SFB"},
    };
  },[effectiveMarks,sfLineEnds]);

  /** Distance from track to committee line (segment if custom, else mark point). */
  const distToStartLine=useMemo(()=>{
    if(!croppedPoints||croppedPoints.length<2)return null;
    if(!sfLineEnds)return null;
    return distanceAlongTrackToSegment(croppedPoints,sfLineEnds.endA.lat,sfLineEnds.endA.lon,sfLineEnds.endB.lat,sfLineEnds.endB.lon);
  },[croppedPoints,sfLineEnds]);

  const raceStartSecParsed=useMemo(()=>{
    const p=parseHMS(raceStartText);
    return p==null?0:Math.max(0,p);
  },[raceStartText]);

  // Per-lap mark sequence (coordinates + tack); preamble handled separately
  const courseMarkSeq=useMemo(()=>{
    if(!courseLetter||!WSC_COURSES[courseLetter])return[];
    return (WSC_COURSES[courseLetter].marks||[]).map(row=>{
      const {name,tack}=parseMarkSpec(row);
      const m=effectiveMarks[name];
      return m?{name,lat:m.lat,lon:m.lon,tack}:null;
    }).filter(Boolean);
  },[courseLetter,effectiveMarks]);

  const coursePreambleSeq=useMemo(()=>{
    if(!courseLetter||!WSC_COURSES[courseLetter])return null;
    const pre=WSC_COURSES[courseLetter].marksPreamble;
    if(!pre||!pre.length)return null;
    const arr=pre.map(row=>{
      const {name,tack}=parseMarkSpec(row);
      const m=effectiveMarks[name];
      return m?{name,lat:m.lat,lon:m.lon,tack}:null;
    }).filter(Boolean);
    return arr.length?arr:null;
  },[courseLetter,effectiveMarks]);

  const courseMapLine=useMemo(()=>{
    if(!courseLetter||!WSC_COURSES[courseLetter])return[];
    return expandCourseMarks(coursePreambleSeq,courseMarkSeq,laps);
  },[courseLetter,coursePreambleSeq,courseMarkSeq,laps]);

  const markOrderLap1=useMemo(()=>expandCourseMarks(coursePreambleSeq,courseMarkSeq,1),[coursePreambleSeq,courseMarkSeq]);

  /** Live tack/gybe positions for course-setup map (same engine as full analysis). */
  const setupMapAnalysis=useMemo(()=>{
    if(!croppedPoints||croppedPoints.length<20)return null;
    const markArr=courseMarkSeq.length>0?courseMarkSeq:null;
    return runAnalysis(croppedPoints,windOvr,markArr,laps,coursePreambleSeq,detSettings,sfLineEnds);
  },[croppedPoints,windOvr,courseMarkSeq,coursePreambleSeq,laps,detSettings,sfLineEnds]);

  const startFinishStats=useMemo(()=>{
    if(!croppedPoints||croppedPoints.length<2||!sfLineEnds||!setupMapAnalysis)return null;
    const pts=setupMapAnalysis.points||croppedPoints;
    const startIdx=nearestPointIndexByClockTime(pts,raceStartSecParsed);
    const startPt=startIdx>=0?pts[startIdx]:null;
    const startDist=startPt?distPointToSegmentM(startPt.lat,startPt.lon,sfLineEnds.endA.lat,sfLineEnds.endA.lon,sfLineEnds.endB.lat,sfLineEnds.endB.lon):null;
    let signedStartDist=null,startOnCourseSide=null;
    const firstMarkSpec=WSC_COURSES[courseLetter]?.marks?.[0];
    const firstMarkName=Array.isArray(firstMarkSpec)?firstMarkSpec[0]:firstMarkSpec;
    const firstMark=firstMarkName?effectiveMarks[firstMarkName]:null;
    if(startPt&&firstMark&&Number.isFinite(startDist)){
      const markSide=lineSideValue(firstMark.lat,firstMark.lon,sfLineEnds.endA.lat,sfLineEnds.endA.lon,sfLineEnds.endB.lat,sfLineEnds.endB.lon);
      const boatSide=lineSideValue(startPt.lat,startPt.lon,sfLineEnds.endA.lat,sfLineEnds.endA.lon,sfLineEnds.endB.lat,sfLineEnds.endB.lon);
      startOnCourseSide=markSide===0?false:(markSide*boatSide>=0);
      signedStartDist=startOnCourseSide?-startDist:startDist;
    }
    const legs=setupMapAnalysis.legs||[];
    const startLeg=legs.find(l=>l.from==="START")||null;
    const finishLeg=[...legs].reverse().find(l=>l.to==="FINISH")||null;
    let startCross=null,finishCross=null;
    if(startLeg&&startLeg.startIdx!=null&&startLeg.endIdx!=null){
      const pick=closestIndexToLine(pts,sfLineEnds.endA,sfLineEnds.endB,startLeg.startIdx,startLeg.endIdx);
      if(pick.idx>=0&&pts[pick.idx])startCross={time:pts[pick.idx].time,idx:pick.idx,dist:pick.dist};
    }
    if(finishLeg&&finishLeg.startIdx!=null&&finishLeg.endIdx!=null){
      const pick=closestIndexToLine(pts,sfLineEnds.endA,sfLineEnds.endB,finishLeg.startIdx,finishLeg.endIdx);
      if(pick.idx>=0&&pts[pick.idx])finishCross={time:pts[pick.idx].time,idx:pick.idx,dist:pick.dist};
    }

            </select>
          </div>
          <div style={{flex:1,minWidth:140}}>
            <label style={{fontSize:11,color:C.txM,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:1}}>Start Time</label>
            <input
              type="text"
              value={raceStartText}
              onChange={e=>setRaceStartText(e.target.value)}
              onBlur={()=>{
                const p=parseHMS(raceStartText);
                setRaceStartText(formatHMS(p==null?0:p));
              }}
              placeholder="00:00:00"
              style={{width:"100%",padding:"10px 12px",background:C.card,color:C.txt,border:`1px solid ${C.bdr}`,borderRadius:8,fontSize:14,fontFamily:"'JetBrains Mono',monospace"}}
            />
          </div>
        </div>

        {/* Map + wind dial (wind FROM °, meteorological) */}
        <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:16,alignItems:"stretch",minHeight:380}}>
          <div style={{flex:2,minWidth:280,minHeight:380,borderRadius:12,overflow:"hidden",border:`1px solid ${C.bdr}`}}>
            <CourseMap
              marks={mapMarksWithStart}
              trackPoints={croppedPoints}
              courseMarks={courseMapLine}
              onMarkDrag={onMarkDrag}
              manoeuvres={setupMapAnalysis?{tacks:setupMapAnalysis.tacks,gybes:setupMapAnalysis.gybes}:null}
              startFinishLine={courseMapStartFinish}
            />
          </div>
          <div style={{flex:1,minWidth:200,maxWidth:320,minHeight:380}}>
            <WindRose
              wd={effWind}
              onChange={setWindOvr}
              compact
              hint={setupMapAnalysis?.windEst?`Auto ${setupMapAnalysis.windEst.dir}° (${(setupMapAnalysis.windEst.conf*100).toFixed(0)}% conf) — slider overrides`:"Slider sets wind FROM · tacks/gybes update on map"}
            />
          </div>
        </div>
        <div style={{background:C.card,borderRadius:10,padding:"12px 14px",border:`1px solid ${C.bdr}`,marginBottom:16}}>
          <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Start / Finish line (drag SFA/SFB on map)</div>
          {sfLineEnds&&<div style={{fontSize:10,color:C.txD,lineHeight:1.55}}>
            Start reference: <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.txt}}>{formatHMS(raceStartSecParsed)}</span> after first GPS point<br/>
            Track point time nearest start time: <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.txt}}>{startFinishStats?.startPointTime?formatWallClock(startFinishStats.startPointTime):"—"}</span><br/>
            Distance from line at start time: <span style={{fontFamily:"'JetBrains Mono',monospace",color:(startFinishStats?.startOnCourseSide===true?C.port:startFinishStats?.startOnCourseSide===false?C.stbd:C.acc)}}>{Number.isFinite(startFinishStats?.signedStartDist)?`${Math.round(startFinishStats.signedStartDist)} m`:(Number.isFinite(startFinishStats?.startDist)?`${Math.round(startFinishStats.startDist)} m`:"—")}</span><br/>
            Start crossing (closest point on START → Mark 1 leg): <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.acc}}>{startFinishStats?.startCross?`${formatWallClock(startFinishStats.startCross.time)||"—"}`:"Start leg not found"}</span><br/>
            Finish time (closest point on final Mark → FINISH leg): <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.acc}}>{startFinishStats?.finishCross?`${formatWallClock(startFinishStats.finishCross.time)||"—"}`:"Finish leg not found"}</span>
          </div>}
        </div>

        <div style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bdr}`,marginBottom:16}}>
          <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Tack / Gybe detection</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:10}}>
            {["tack","gybe"].map(type=>{
              const cfg=detSettings[type];
              const col=type==="tack"?C.tack:C.gybe;
              return(<div key={type} style={{border:`1px solid ${C.bdr}`,borderRadius:8,padding:10}}>
                <div style={{fontSize:12,fontWeight:700,color:col,textTransform:"capitalize",marginBottom:8}}>{type}</div>
                {[["Min turn (deg)","minTurn",20,240,1],["Max turn (deg)","maxTurn",40,280,1],["Min speed (kts)","minSpeed",0.2,8,0.1],["Spacing (sec)","cooldownSec",1,20,1]].map(([label,key,min,max,step])=>(
                  <div key={key} style={{marginBottom:6}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.txM,marginBottom:2}}><span>{label}</span><span style={{color:C.txt,fontFamily:"'JetBrains Mono',monospace"}}>{cfg[key]}</span></div>
                    <input
                      type="range"
                      min={min}
                      max={max}
                      step={step}
                      value={cfg[key]}
                      onChange={e=>{
                        const value=step===1?parseInt(e.target.value,10):parseFloat(e.target.value);
                        setDetSettings(prev=>({...prev,[type]:{...prev[type],[key]:value}}));
                      }}
                      style={{width:"100%"}}
                    />
                  </div>
                ))}
              </div>);
            })}
          </div>
          <div style={{display:"flex",justifyContent:"flex-end",marginTop:8}}>
            <button onClick={()=>setDetSettings(DETECTION_DEFAULTS)} style={{...btn("transparent",C.txM,C.bdr),padding:"7px 10px",fontSize:11}}>
              Reset defaults
            </button>
          </div>
          <div style={{fontSize:10,color:C.txD,marginTop:6}}>Defaults: Tack min turn 60°, Gybe min turn 45°. Tack spacing default is 4s to capture close tacks.</div>
        </div>

        {croppedPoints&&croppedPoints.length>=2&&distToStartLine&&<div style={{fontSize:10,color:C.txD,lineHeight:1.5,padding:"8px 10px",background:`${C.bg}aa`,borderRadius:8,border:`1px solid ${C.bdr}`,marginBottom:16}}>
          White dashed line = SFA→SFB. Closest approach on track: <strong style={{fontFamily:"'JetBrains Mono',monospace",color:C.acc}}>{Math.round(distToStartLine.distToMarkM)} m</strong> · along track: <strong style={{fontFamily:"'JetBrains Mono',monospace",color:C.acc}}>{m2nm(distToStartLine.alongM).toFixed(2)} nm</strong>.
        </div>}

        {/* Mark legend — port (P) red, starboard (S) green */}
        {courseLetter&&<div style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bdr}`,marginBottom:16}}>
          <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Rounding order (lap 1)</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5,alignItems:"center",marginBottom:10}}>
            {markOrderLap1.length===0&&<span style={{fontSize:11,color:C.txM}}>—</span>}
            {markOrderLap1.map((pt,i)=>{
              const st=pt.tack==="P"?{bg:`${C.port}22`,br:C.port,fg:C.port}:pt.tack==="S"?{bg:`${C.stbd}20`,br:C.stbd,fg:C.stbd}:{bg:`${C.blu}14`,br:C.blu,fg:C.txM};
              return(<span key={`${pt.name}-${i}-${pt.lap}`} style={{display:"inline-flex",alignItems:"center",gap:4}}>
                {i>0&&<span style={{color:C.txD,fontSize:11}}>→</span>}
                <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"3px 8px",borderRadius:6,background:st.bg,border:`1px solid ${st.br}55`,color:st.fg,fontSize:11,fontWeight:600}}>
                  {pt.name}<span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,opacity:0.95}}>{pt.tack||"—"}</span>
                </span>
              </span>);
            })}
            {laps>1&&<span style={{fontSize:10,color:C.txM,marginLeft:4}}>· then lap ×{laps}</span>}
          </div>
          <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Marks on map</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {Object.entries(effectiveMarks).map(([name,mk])=>{
              const st=mk.roundTack==="P"?{bg:`${C.port}22`,br:C.port,fg:C.port}:mk.roundTack==="S"?{bg:`${C.stbd}20`,br:C.stbd,fg:C.stbd}:{bg:`${mk.fixed?C.blu:C.gld}15`,br:mk.fixed?C.blu:C.gld,fg:mk.fixed?C.blu:C.gld};
              return(
              <div key={name} style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:6,background:st.bg,border:`1px solid ${st.br}44`}}>
                <div style={{width:6,height:6,borderRadius:3,background:st.br}}/>
                <span style={{fontSize:11,color:st.fg,fontWeight:600}}>{name}</span>
                {mk.roundTack&&<span style={{fontSize:9,fontFamily:"'JetBrains Mono',monospace",color:st.fg}}>{mk.roundTack}</span>}
                {!mk.fixed&&<span style={{fontSize:9,color:C.txD}}>drag</span>}
              </div>);
            })}
          </div>
          {WSC_COURSES[courseLetter]&&(()=>{
            const c=WSC_COURSES[courseLetter];
            const pre=(c.marksPreamble||[]).map(formatCourseRow).join(" → ");
            const body=(c.marks||[]).map(formatCourseRow).join(" → ");
            const seq=pre?`${pre} → ${body}`:body;
            return(<div style={{fontSize:11,color:C.txM,marginTop:8}}>
              Full sequence: {seq||"—"}{laps>1?` · lap ×${laps}`:""}
            </div>);
          })()}
        </div>}

        {/* Analyse button */}
        <div style={{display:"flex",gap:10}}>
          <button onClick={doAnalysis} style={{...btn(C.acc,"#0a1628"),flex:1,padding:"14px",fontSize:16,fontWeight:700,borderRadius:10}}>
            {processing?"Analysing...":"Analyse Track"+(courseLetter?` (Course ${courseLetter})`:" (no course)")}
          </button>
          {courseLetter&&<button onClick={()=>{setCourseLetter("");doAnalysis()}} style={{...btn("transparent",C.txM,C.bdr),padding:"14px 18px",fontSize:13}}>
            Skip Course
          </button>}
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:12,alignItems:"center",marginTop:14}}>
          <button
            type="button"
            disabled={
              setupSaveBusy ||
              !(session?.strava?.athlete?.id ?? sAth?.id) ||
              String(actId || "").startsWith("file-")
            }
            onClick={saveCourseSetupOnly}
            style={{
              ...btn("transparent", C.acc, C.acc),
              padding: "10px 16px",
              fontSize: 13,
              opacity:
                setupSaveBusy || !(session?.strava?.athlete?.id ?? sAth?.id) || String(actId || "").startsWith("file-")
                  ? 0.45
                  : 1,
            }}
          >
            {setupSaveBusy ? "Saving…" : "Save course setup"}
          </button>
          {setupSaveMsg && <span style={{ fontSize: 12, color: C.acc }}>{setupSaveMsg}</span>}
          <span style={{ fontSize: 11, color: C.txD, lineHeight: 1.45, maxWidth: 420 }}>
            Saves course, crop, mark positions & wind for this activity (no full analysis required). Reloads when you open the activity again.
          </span>
        </div>
      </div>
    </div>);
  }

  /* ─── ANALYSIS ─── */
  if(view==="analysis"&&curAnalysis){
    const a=curAnalysis;
    const tabs=["overview","manoeuvres","legs","speed"];

    return(<div style={{background:C.bg,minHeight:"100vh"}}>
      <div style={hdr}>
        <button onClick={()=>setView("course-setup")} style={{background:"none",border:"none",color:C.txM,fontSize:13}}>← Course</button>
        <div style={{fontSize:13,fontWeight:600,color:C.txt,maxWidth:"50%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{actName}{courseLetter?` · Course ${courseLetter}`:""}{laps>1?` · ${laps}L`:""}</div>
        <div style={{width:40}}/>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:0,padding:"0 14px",borderBottom:`1px solid ${C.bdr}`,overflowX:"auto"}}>
        {tabs.map(t=><button key={t} onClick={()=>setTab(t)} style={{background:"none",border:"none",padding:"11px 16px",color:tab===t?C.acc:C.txM,fontWeight:tab===t?700:400,fontSize:12,textTransform:"capitalize",borderBottom:tab===t?`2px solid ${C.acc}`:"2px solid transparent",whiteSpace:"nowrap"}}>{t}</button>)}
      </div>

      <div style={{maxWidth:700,margin:"0 auto",padding:"16px 14px"}}>

        {/* OVERVIEW */}
        {tab==="overview"&&<>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
            <Stat label="Distance" value={m2nm(a.stats.totalDist).toFixed(2)} unit="nm" icon="📏"/>
            <Stat label="Duration" value={fT(a.stats.duration)} icon="⏱"/>
            <Stat label="Max Speed" value={a.stats.maxSpeed.toFixed(1)} unit="kts" color={C.gld} icon="⚡"/>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
            <Stat label="Avg Speed" value={a.stats.avgSpeed.toFixed(1)} unit="kts" color={C.blu} icon="〰"/>
            <Stat label="Tacks" value={a.stats.tackCount} color={C.tack} icon="↗"/>
            <Stat label="Gybes" value={a.stats.gybeCount} color={C.gybe} icon="↘"/>
          </div>
          <div style={{fontSize:11,color:C.txM,marginBottom:12}}>
            {a.stats.reactiveTacks||0} reactive · {a.stats.proactiveTacks||0} proactive · {a.stats.tacticalTacks||0} tactical
            {a.windStats?.range!=null&&<span style={{marginLeft:10}}>· wind range {a.windStats.range.toFixed(1)}° ({a.windStats.trend})</span>}
          </div>

          <div style={{background:C.card,borderRadius:12,padding:16,border:`1px solid ${C.bdr}`,marginBottom:16}}>
            <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Speed + wind timeline</div>
            {timelineDomain&&<div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",marginBottom:10}}>
              <span style={{fontSize:10,color:C.txM,textTransform:"uppercase",letterSpacing:0.8}}>Zoom</span>
              {[1,2,4,8].map(z=><button key={`z-${z}`} type="button" onClick={()=>{setTimelineZoom(z);if(z===1)setTimelineScroll(0);}} style={{...btn(timelineZoom===z?`${C.acc}25`:"transparent",timelineZoom===z?C.acc:C.txM,C.bdr),padding:"4px 8px",fontSize:10}}>{z}x</button>)}
              {timelineZoom>1&&<input type="range" min="0" max="1000" value={Math.round(timelineScroll*1000)} onChange={e=>setTimelineScroll(Math.max(0,Math.min(1,Number(e.target.value)/1000)))} style={{flex:1,minWidth:140}}/>}
            </div>}
            <ResponsiveContainer width="100%" height={180}>
              {(()=>{
                const tl=(a.speedTL||[]).map(d=>({...d,wind:windAtTime(a.windTrace||[],(a.points?.[0]?.time||0)+d.time,a.windDir)}));
                const mx=a.maxSpeedMark;
                const deco=buildTimelineDecorations(a);
                const yDataMax=tl.length?Math.max(...tl.map(d=>d.speed),mx?.speed||0):0;
                const yRaw=mx?Math.max(yDataMax*1.08,mx.speed*1.12):yDataMax*1.02||1;
                const yHi=Math.max(12,Math.ceil((Number.isFinite(yRaw)?yRaw:12)/4)*4);
                const yTicks=[0,yHi/4,yHi/2,(3*yHi)/4,yHi].map(v=>Math.round(v*1e6)/1e6);
                const fmtSpdTick=(v)=>{const x=Number(v);if(!Number.isFinite(x))return"";const r=Math.round(x);return Math.abs(x-r)<1e-5?String(r):x.toFixed(1);};
                const xDomain=timelineDomain||["dataMin","dataMax"];
                return(
                  <AreaChart key={`sp-${xDomain[0]}-${xDomain[1]}`} data={tl} margin={{top:24,right:8,left:0,bottom:0}}>
                    <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.acc} stopOpacity={0.3}/><stop offset="100%" stopColor={C.acc} stopOpacity={0}/></linearGradient></defs>
                    {deco.legBands.map((b,i)=><ReferenceArea key={`lb-sp-${i}`} yAxisId="speed" x1={b.x1} x2={b.x2} fill={b.fill} ifOverflow="extendDomain"/>)}
                    <CartesianGrid strokeDasharray="3 3" stroke={C.bdr}/>
                    <XAxis dataKey="time" type="number" allowDataOverflow tick={{fill:C.txD,fontSize:9}} tickFormatter={v=>fT(v)} stroke={C.bdr} domain={xDomain}/>
                    <YAxis yAxisId="speed" tick={{fill:C.txD,fontSize:9}} stroke={C.bdr} domain={[0,yHi]} ticks={yTicks} tickFormatter={fmtSpdTick}/>
                    <YAxis yAxisId="wind" hide domain={["dataMin-20","dataMax+20"]}/>
                    <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:8,fontSize:11}} labelFormatter={v=>fT(v)} formatter={(v,n)=>[n==="speed"?`${Number(v).toFixed(2)} kts`:`${Math.round(v)}°`,n==="speed"?"Speed":"Wind"]}/>
                    <Area yAxisId="speed" type="monotone" dataKey="speed" stroke={C.acc} fill="url(#sg)" strokeWidth={1.5} dot={false} isAnimationActive={false}/>
                    <Line yAxisId="wind" type="monotone" dataKey="wind" stroke={C.gld} strokeWidth={1.4} dot={false} strokeDasharray="5 4" isAnimationActive={false}/>
                    {deco.markers.map((m,i)=><ReferenceLine key={`mk-sp-${i}`} yAxisId="speed" x={m.x} stroke={m.color} strokeWidth={1.2} strokeDasharray="3 3" ifOverflow="extendDomain"/>)}
                    {deco.markers.map((m,i)=><ReferenceDot key={`lbl-sp-${i}`} yAxisId="speed" x={m.x} y={yHi*0.965} r={0} isFront label={{value:m.label,position:"insideTop",fill:m.color,fontSize:9,fontWeight:700}}/>)}
                    {mx&&tl.length>0&&(function(){
                      const yCap=Math.max(...tl.map(d=>d.speed),mx.speed)*1.12;
                      return(<>
                        <ReferenceLine yAxisId="speed" segment={[{x:mx.time,y:yCap},{x:mx.time,y:mx.speed}]} stroke={PEAK_MARK_ORANGE} strokeWidth={2} strokeDasharray="5 5" ifOverflow="visible"/>
                        <ReferenceDot yAxisId="speed" x={mx.time} y={mx.speed} r={6.5} fill="#ffb84a" stroke="#fff" strokeWidth={2} isFront/>
                        <ReferenceDot yAxisId="speed" x={mx.time} y={yCap} r={0} fill="none" stroke="none" isFront shape={PeakLightningRefShape}/>
                      </>);
                    })()}
                  </AreaChart>
                );
              })()}
            </ResponsiveContainer>
            <ResponsiveContainer width="100%" height={110}>
              {(()=>{
                const wtRaw=(a.windTrace||[]).map(w=>({
                  time:w.time-(a.points?.[0]?.time||0),
                  windDir:w.windDir,
                  std:w.std||8,
                  confidence:w.confidence||"low",
                  interpolated:w.interpolated,
                }));
                const windMid=circularMode(wtRaw.map(w=>w.windDir).filter(Number.isFinite),5)??a.windDir;
                const offsets=wtRaw.map(w=>adiff(windMid,w.windDir));
                const minOffset=offsets.length?Math.min(...offsets):0;
                const maxOffset=offsets.length?Math.max(...offsets):0;
                let yMin=minOffset<0?minOffset*1.1:minOffset*0.9;
                let yMax=maxOffset>0?maxOffset*1.1:maxOffset*0.9;
                if(!Number.isFinite(yMin)||!Number.isFinite(yMax)||(Math.abs(yMax-yMin)<0.5)){
                  yMin=-1;yMax=1;
                }
                if(yMin===yMax){yMin-=1;yMax+=1;}
                const wt=wtRaw.map(w=>{
                  const plot=adiff(windMid,w.windDir);
                  const absTime=(a.points?.[0]?.time||0)+w.time;
                  const legType=legTypeAtAbsTime(a,absTime);
                  const isUpwind=legType==="upwind";
                  const solid=isUpwind&&!w.interpolated;
                  const dotted=!solid;
                  return{
                    ...w,
                    windPlot:plot,
                    windKnownRed:solid&&plot<=0?plot:null,
                    windKnownGreen:solid&&plot>0?plot:null,
                    windEstRed:dotted&&plot<=0?plot:null,
                    windEstGreen:dotted&&plot>0?plot:null,
                    windDotted:dotted?plot:null,
                  };
                });
                const deco=buildTimelineDecorations(a);
                const xDomainWind=timelineDomain||["dataMin","dataMax"];
                return(
                  <LineChart key={`wd-${xDomainWind[0]}-${xDomainWind[1]}`} data={wt} margin={{top:2,right:8,left:0,bottom:0}}>
                    {deco.legBands.map((b,i)=><ReferenceArea key={`lb-wd-${i}`} x1={b.x1} x2={b.x2} fill={b.fill} ifOverflow="extendDomain"/>)}
                    <ReferenceArea y1={yMin} y2={0} fill={`${C.port}22`} ifOverflow="extendDomain"/>
                    <ReferenceArea y1={0} y2={yMax} fill={`${C.stbd}22`} ifOverflow="extendDomain"/>
                    <CartesianGrid strokeDasharray="3 3" stroke={C.bdr}/>
                    <XAxis dataKey="time" type="number" allowDataOverflow tick={{fill:C.txD,fontSize:9}} tickFormatter={v=>fT(v)} stroke={C.bdr} domain={xDomainWind}/>
                    <YAxis reversed tick={{fill:C.txD,fontSize:9}} stroke={C.bdr} domain={[yMin,yMax]} tickFormatter={v=>`${v>0?"+":""}${Math.round(v)}°`}/>
                    <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:8,fontSize:11}} labelFormatter={v=>fT(v)} formatter={(v,n,p)=>{if(n==="std")return[`±${Number(v).toFixed(1)}°`,"Spread"];const raw=p?.payload?.windDir;return[`${Math.round(raw??(windMid+Number(v)))}°`,"Wind"];}}/>
                    <ReferenceLine y={0} stroke={C.txD} strokeDasharray="4 4" label={{value:`Mode ${Math.round(windMid)}°`,position:"right",fill:C.txD,fontSize:9}}/>
                    <Line type="monotone" dataKey="windKnownRed" stroke={C.port} strokeWidth={2} dot={false} isAnimationActive={false}/>
                    <Line type="monotone" dataKey="windKnownGreen" stroke={C.stbd} strokeWidth={2} dot={false} isAnimationActive={false}/>
                    <Line type="monotone" dataKey="windDotted" stroke={C.gld} strokeWidth={2} strokeDasharray="6 4" dot={false} isAnimationActive={false}/>
                    {deco.markers.map((m,i)=><ReferenceLine key={`mk-wd-${i}`} x={m.x} stroke={m.color} strokeWidth={1.2} strokeDasharray="3 3" ifOverflow="extendDomain"/>)}
                  </LineChart>
                );
              })()}
            </ResponsiveContainer>
            {a.maxSpeedMark&&<div style={{marginTop:12,fontSize:12,color:C.txt,lineHeight:1.55,padding:"10px 12px",background:`${C.bg}aa`,borderRadius:8,border:`1px solid ${C.bdr}`}}>
              <strong style={{color:C.gld,fontFamily:"'JetBrains Mono',monospace"}}>Max Speed {a.maxSpeedMark.speed} kts</strong>
              {a.maxSpeedMark.leg?<>
                <span style={{color:C.txM}}> · </span>{a.maxSpeedMark.legTypeLabel} leg<span style={{color:C.txM}}> · </span>{a.maxSpeedMark.leg.from} → {a.maxSpeedMark.leg.to}
                <span style={{color:C.txM}}> · </span>TWA {Math.round(a.maxSpeedMark.twaSample)}° true
                <span style={{color:C.txM}}> · </span>{a.maxSpeedMark.lapLabel}
              </>:<>
                <span style={{color:C.txM}}> · </span>TWA {Math.round(a.maxSpeedMark.twaSample)}° true
                <span style={{color:C.txD,fontSize:11}}> (outside mark-based legs)</span>
              </>}
            </div>}
          </div>

          <div style={{background:C.card,borderRadius:12,padding:16,border:`1px solid ${C.bdr}`,marginBottom:16}}>
            <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Tack split (time on each tack)</div>
            <div style={{display:"flex",gap:3,height:24,borderRadius:6,overflow:"hidden",marginBottom:10}}>
              <div style={{background:C.port,flex:a.portS||1,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#fff"}}>Port</div>
              <div style={{background:C.stbd,flex:a.stbdS||1,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#000"}}>Stbd</div>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.txM}}>
              <span>{Math.round(a.portS/(a.portS+a.stbdS||1)*100)}%</span>
              <span>{Math.round(a.stbdS/(a.portS+a.stbdS||1)*100)}%</span>
            </div>
            <div style={{marginTop:12,fontSize:12,color:C.txt}}>
              Wind from: <strong style={{fontFamily:"'JetBrains Mono',monospace",color:C.acc}}>{effWind}°</strong>
              <span style={{color:C.txD,fontSize:10,marginLeft:8}}>Set on Course &amp; map</span>
            </div>
            {a.windEst&&<div style={{marginTop:8,fontSize:10,color:C.txD,lineHeight:1.6}}>
              Auto estimate: {a.windEst.dir}° ({(a.windEst.conf*100).toFixed(0)}% conf)
            </div>}
            <div style={{marginTop:8,fontSize:10,color:C.txD,lineHeight:1.6}}>
              Leg VMG mode: <span style={{color:C.txt}}>{a.vmgMode==="magnitude"?"Magnitude (manoeuvres present)":"Targeted signed (no manoeuvres found)"}</span>
            </div>
          </div>

          {(()=>{
            const uw=a.upwindByTack||{port:{},stbd:{}};
            const row=(title,col,u)=>{
              const mono={fontFamily:"'JetBrains Mono',monospace"};
              const v=(x,d)=>x==null||!Number.isFinite(x)?"—":(d!=null?x.toFixed(d):Math.round(x));
              return(<div key={title} style={{background:`${col}10`,border:`1px solid ${col}44`,borderRadius:10,padding:12}}>
                <div style={{fontSize:11,fontWeight:700,color:col,marginBottom:10}}>{title}</div>
                {!u.n?<div style={{fontSize:11,color:C.txM}}>No upwind samples on this tack.</div>:<>
                  <div style={{fontSize:10,color:C.txM,lineHeight:1.9}}>
                    Speed (avg)<br/><span style={{...mono,color:C.txt,fontSize:14}}>{v(u.avgSpeed,1)} kts</span></div>
                  <div style={{fontSize:10,color:C.txM,lineHeight:1.9,marginTop:8}}>
                    Speed variability<br/><span style={{...mono,color:C.txt,fontSize:14}}>{v(u.speedStd,2)} kts σ</span></div>
                  <div style={{fontSize:10,color:C.txM,lineHeight:1.9,marginTop:8}}>
                    VMG (avg)<br/><span style={{...mono,color:C.txt,fontSize:14}}>{v(u.avgVMG,2)} kts</span></div>
                  <div style={{fontSize:10,color:C.txM,lineHeight:1.9,marginTop:8}}>
                    Angle from wind (mean COG ± vs wind from)<br/><span style={{...mono,color:C.txt,fontSize:12,lineHeight:1.35,display:"block",marginTop:4}}>{u.windRelLabel||"—"}</span></div>
                  <div style={{fontSize:10,color:C.txM,lineHeight:1.9,marginTop:8}}>
                    Course variability (COG σ)<br/><span style={{...mono,color:C.txt,fontSize:14}}>{v(u.courseStd,1)}°</span></div>
                  <div style={{fontSize:9,color:C.txD,marginTop:8}}>{u.n} GPS samples · upwind legs only</div>
                </>}
              </div>);
            };
            return(<div style={{background:C.card,borderRadius:12,padding:16,border:`1px solid ${C.bdr}`}}>
              <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Upwind · port vs starboard</div>
              <div style={{fontSize:10,color:C.txD,lineHeight:1.45,marginBottom:12}}>GPS samples on <strong style={{color:C.txt}}>upwind</strong> legs (mark-based course), split by tack vs wind from <strong style={{fontFamily:"'JetBrains Mono',monospace",color:C.acc}}>{effWind}°</strong>. VMG = |speed×cos(TWA)| vs wind. Angle line: mean COG with signed offset from wind (±°) and acute TWA. COG σ = circular spread (°).</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {row("Upwind · port tack",C.port,uw.port)}
                {row("Upwind · starboard tack",C.stbd,uw.stbd)}
              </div>
            </div>);
          })()}
        </>}

        {/* MANOEUVRES */}
        {tab==="manoeuvres"&&<>
          <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
            <Stat label="Avg Tack" color={C.tack} value={a.tacks.filter(t=>Number.isFinite(t.q)).length?Math.round(a.tacks.filter(t=>Number.isFinite(t.q)).reduce((s,t)=>s+t.q,0)/a.tacks.filter(t=>Number.isFinite(t.q)).length):"—"} unit="%"/>
            <Stat label="Avg Gybe" color={C.gybe} value={a.gybes.length?Math.round(a.gybes.reduce((s,g)=>s+g.q,0)/a.gybes.length):"—"} unit="% vs ref"/>
          </div>
          {a.tackGroups?.length>0&&<div style={{background:C.card,borderRadius:12,padding:14,border:`1px solid ${C.bdr}`,marginBottom:14}}>
            <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Tack groups</div>
            {a.tackGroups.map((g,i)=><div key={`tg-${i}`} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",borderRadius:8,background:`${C.bg}99`,border:`1px solid ${C.bdr}`,marginBottom:6,fontSize:11}}>
              <span>Group {i+1} · {g.manoeuvres.length} manoeuvre{g.manoeuvres.length===1?"":"s"} · {g.classification||"tactical"}</span>
              <span style={{fontFamily:"'JetBrains Mono',monospace",color:C.acc}}>{Number.isFinite(g.quality)?`${g.quality}%`:"—"}</span>
            </div>)}
          </div>}
          {(()=>{
            const tPS=a.tacks.filter(t=>t.crossing==="P→S"),tSP=a.tacks.filter(t=>t.crossing==="S→P");
            const gPS=a.gybes.filter(g=>g.crossing==="P→S"),gSP=a.gybes.filter(g=>g.crossing==="S→P");
            const cell=(label,val,col)=>(
              <div key={label} style={{background:`${col}10`,border:`1px solid ${col}44`,borderRadius:8,padding:"8px 10px",minWidth:0}}>
                <div style={{fontSize:9,color:C.txM,textTransform:"uppercase",letterSpacing:0.6,marginBottom:3}}>{label}</div>
                <div style={{fontSize:18,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:col}}>{val==null?"—":`${val}°`}</div>
              </div>
            );
            return(
              <div style={{background:C.card,borderRadius:12,padding:14,border:`1px solid ${C.bdr}`,marginBottom:14}}>
                <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Average turn angle (COG change)</div>
                <div style={{fontSize:10,color:C.txD,marginBottom:10,lineHeight:1.45}}>Mean heading change across the detection window. P→S = port tack → starboard tack; S→P = starboard → port.</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(108px, 1fr))",gap:8}}>
                  {cell("All tacks",avgManAngle(a.tacks),C.tack)}
                  {cell("Tacks P→S",avgManAngle(tPS),C.port)}
                  {cell("Tacks S→P",avgManAngle(tSP),C.stbd)}
                  {cell("All gybes",avgManAngle(a.gybes),C.gybe)}
                  {cell("Gybes P→S",avgManAngle(gPS),C.port)}
                  {cell("Gybes S→P",avgManAngle(gSP),C.stbd)}
                </div>
              </div>
            );
          })()}

          {a.tacks.length>0&&<div style={{background:C.card,borderRadius:12,padding:16,border:`1px solid ${C.bdr}`,marginBottom:14}}>
            <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Tack quality</div>
            <div style={{fontSize:9,color:C.txD,marginBottom:10,lineHeight:1.55}}>
              Score = <strong style={{color:C.txt}}>reference |VMG| ÷ mean |VMG| during the turn × 100%</strong> (reference = average of mean |VMG| in the <strong>10 s before</strong> the turn and <strong>10 s after</strong>; during = mean |VMG| over the detected turn length). <strong>&gt;100%</strong> means you held more |VMG| through the tack than that reference. Bars: <span style={{color:C.port,fontWeight:700}}>red</span> = started on port tack, <span style={{color:C.stbd,fontWeight:700}}>green</span> = started on starboard.
            </div>
            <div style={{fontSize:9,color:C.txM,marginBottom:8,lineHeight:1.45}}>
              <span style={{color:C.port,fontWeight:700}}>■</span> P→S (port → starboard)&nbsp;&nbsp;
              <span style={{color:C.stbd,fontWeight:700}}>■</span> S→P (starboard → port)
            </div>
            <ResponsiveContainer width="100%" height={110}>
              <BarChart data={a.tacks.map((t,i)=>({n:`T${i+1}`,q:t.q,crossing:t.crossing||"—",ch:Math.round(Number(t.ch)||0),sideBef:t.sideBef}))}>
                <CartesianGrid strokeDasharray="3 3" stroke={C.bdr}/>
                <XAxis dataKey="n" tick={{fill:C.txM,fontSize:9}} stroke={C.bdr}/>
                <YAxis domain={[0,"auto"]} tick={{fill:C.txD,fontSize:9}} stroke={C.bdr}/>
                <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:8,fontSize:11}} formatter={(v)=>[`${v}% vs ref`,"Score"]} labelFormatter={(lab,pl)=>{const p=pl&&pl[0]&&pl[0].payload;return p?`${p.n} · ${p.crossing} · tack angle ${p.ch}°`:lab;}}/>
                <Bar dataKey="q" name="quality" radius={[4,4,0,0]}>{a.tacks.map((t,i)=><Cell key={`tk${i}`} fill={manBarFillByStartTack(t.sideBef)}/>)}</Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>}
          {a.gybes.length>0&&<div style={{background:C.card,borderRadius:12,padding:16,border:`1px solid ${C.bdr}`,marginBottom:14}}>
            <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Gybe quality</div>
            <div style={{fontSize:9,color:C.txD,marginBottom:10,lineHeight:1.55}}>
              Same score as tacks (|VMG| vs wind, 10 s before / after, mean during gybe). Bars: <span style={{color:C.port,fontWeight:700}}>red</span> = port tack before gybe, <span style={{color:C.stbd,fontWeight:700}}>green</span> = starboard tack before gybe.
            </div>
            <div style={{fontSize:9,color:C.txM,marginBottom:8,lineHeight:1.45}}>
              <span style={{color:C.port,fontWeight:700}}>■</span> P→S&nbsp;&nbsp;
              <span style={{color:C.stbd,fontWeight:700}}>■</span> S→P
            </div>
            <ResponsiveContainer width="100%" height={110}>
              <BarChart data={a.gybes.map((g,i)=>({n:`G${i+1}`,q:g.q,crossing:g.crossing||"—",ch:Math.round(Number(g.ch)||0),sideBef:g.sideBef}))}>
                <CartesianGrid strokeDasharray="3 3" stroke={C.bdr}/>
                <XAxis dataKey="n" tick={{fill:C.txM,fontSize:9}} stroke={C.bdr}/>
                <YAxis domain={[0,"auto"]} tick={{fill:C.txD,fontSize:9}} stroke={C.bdr}/>
                <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:8,fontSize:11}} formatter={(v)=>[`${v}% vs ref`,"Score"]} labelFormatter={(lab,pl)=>{const p=pl&&pl[0]&&pl[0].payload;return p?`${p.n} · ${p.crossing} · gybe angle ${p.ch}°`:lab;}}/>
                <Bar dataKey="q" name="quality" radius={[4,4,0,0]}>{a.gybes.map((g,i)=><Cell key={`gy${i}`} fill={manBarFillByStartTack(g.sideBef)}/>)}</Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>}

          {a.tacks.length>0&&<><div style={{fontSize:13,fontWeight:700,color:C.tack,marginBottom:6}}>Tacks ({a.tacks.length})</div>{a.tacks.map((t,i)=><ManCard key={`t${i}`} m={t} index={i}/>)}</>}
          {a.gybes.length>0&&<><div style={{fontSize:13,fontWeight:700,color:C.gybe,marginBottom:6,marginTop:14}}>Gybes ({a.gybes.length})</div>{a.gybes.map((g,i)=><ManCard key={`g${i}`} m={g} index={i}/>)}</>}
          {!a.tacks.length&&!a.gybes.length&&<div style={{textAlign:"center",color:C.txM,padding:30}}>No manoeuvres detected. Try adjusting wind direction.</div>}
        </>}

        {/* LEGS */}
        {tab==="legs"&&<>
          {a.legs.length>0?<>
            <div style={{fontSize:10,color:C.txD,textTransform:"uppercase",letterSpacing:1,display:"flex",gap:8,padding:"6px 12px",marginBottom:4}}>
              <div style={{width:60}}>From→To</div>
              <div style={{width:55}}>Type</div>
              <div style={{flex:1}}>Dist</div>
              <div style={{width:50}}>Time</div>
              <div style={{width:50}}>Spd</div>
              <div style={{width:42}}>VMG</div>
              <div style={{width:38}}>Eff</div>
            </div>
            {a.legs.map((l,i)=>{
              const tc=l.type==="upwind"?C.up:l.type==="downwind"?C.dn:C.txM;
              return(<div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:C.card,borderRadius:8,marginBottom:3,border:`1px solid ${C.bdr}`,fontSize:11}}>
                <div style={{width:60,color:C.txt,fontWeight:600,fontSize:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.from}→{l.to}</div>
                <div style={{width:55,color:tc,fontWeight:600,textTransform:"uppercase",fontSize:10}}>{l.type}</div>
                <div style={{flex:1,color:C.txt,fontFamily:"'JetBrains Mono',monospace"}}>{m2nm(l.distance).toFixed(2)}nm</div>
                <div style={{width:50,color:C.txM}}>{fT(l.duration)}</div>
                <div style={{width:50,color:C.acc,fontFamily:"'JetBrains Mono',monospace"}}>{l.avgSpeed.toFixed(1)}</div>
                <div style={{width:42,color:C.gld,fontFamily:"'JetBrains Mono',monospace"}}>{l.avgVMG.toFixed(1)}</div>
                <div style={{width:38,color:C.txM}}>{l.efficiency.toFixed(0)}%</div>
              </div>);
            })}

            <div style={{display:"flex",gap:8,marginTop:14}}>
              {["upwind","downwind","reach"].map(type=>{
                const tl=a.legs.filter(l=>l.type===type);if(!tl.length)return null;
                const as2=tl.reduce((s,l)=>s+l.avgSpeed,0)/tl.length;
                const av=tl.reduce((s,l)=>s+l.avgVMG,0)/tl.length;
                const ae=tl.reduce((s,l)=>s+l.efficiency,0)/tl.length;
                const tc2=type==="upwind"?C.up:type==="downwind"?C.dn:C.txM;
                return(<div key={type} style={{flex:1,background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bdr}`}}>
                  <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:tc2,marginBottom:8}}>{type} ({tl.length})</div>
                  <div style={{fontSize:10,color:C.txM,lineHeight:2}}>
                    Avg: <span style={{color:C.txt,fontFamily:"'JetBrains Mono',monospace"}}>{as2.toFixed(1)}kts</span><br/>
                    VMG: <span style={{color:C.txt,fontFamily:"'JetBrains Mono',monospace"}}>{av.toFixed(1)}kts</span><br/>
                    Eff: <span style={{color:C.txt,fontFamily:"'JetBrains Mono',monospace"}}>{ae.toFixed(0)}%</span>
                  </div>
                </div>);
              })}
            </div>
          </>:<div style={{textAlign:"center",color:C.txM,padding:30}}>{courseLetter?"Mark roundings not detected — try adjusting mark positions.":"Select a course for leg-by-leg breakdown."}<br/><button onClick={()=>setView("course-setup")} style={{...btn(`${C.acc}18`,C.acc,`${C.acc}44`),marginTop:12,padding:"8px 16px",fontSize:12}}>← Course Setup</button></div>}
        </>}

        {/* SPEED */}
        {tab==="speed"&&<>
          <div style={{background:C.card,borderRadius:12,padding:16,border:`1px solid ${C.bdr}`,marginBottom:14}}>
            <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Speed Distribution</div>
            {(()=>{
              const bins=new Array(20).fill(0);
              a.points.forEach(p=>{const k=ms2k(p.ss||0);if(k<0.3)return;bins[Math.min(Math.floor(k*2),19)]++});
              return(<ResponsiveContainer width="100%" height={140}>
                <BarChart data={bins.map((c,i)=>({r:`${(i/2).toFixed(1)}`,c}))}>
                  <CartesianGrid strokeDasharray="3 3" stroke={C.bdr}/><XAxis dataKey="r" tick={{fill:C.txD,fontSize:8}} stroke={C.bdr}/>
                  <YAxis tick={{fill:C.txD,fontSize:9}} stroke={C.bdr}/>
                  <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:8,fontSize:11}}/>
                  <Bar dataKey="c" name="samples" fill={C.blu} radius={[2,2,0,0]}/>
                </BarChart>
              </ResponsiveContainer>);
            })()}
          </div>

          <div style={{background:C.card,borderRadius:12,padding:16,border:`1px solid ${C.bdr}`,marginBottom:14}}>
            <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Speed by Heading (relative to wind)</div>
            {(()=>{
              const ab={};for(let i=0;i<360;i+=15)ab[i]=[];
              a.points.forEach(p=>{const s=ms2k(p.ss||0);if(s<0.5)return;const r=((p.cog-effWind+360)%360);ab[Math.round(r/15)*15%360]?.push(s)});
              const pd=Object.entries(ab).map(([k,v])=>({label:`${k}°`,avg:v.length?v.reduce((a,b)=>a+b,0)/v.length:0,max:v.length?Math.max(...v):0})).sort((a,b)=>parseInt(a.label)-parseInt(b.label));
              return(<ResponsiveContainer width="100%" height={220}>
                <RadarChart data={pd}><PolarGrid stroke={C.bdr}/><PolarAngleAxis dataKey="label" tick={{fill:C.txD,fontSize:8}}/>
                <PolarRadiusAxis tick={{fill:C.txD,fontSize:8}}/>
                <Radar name="Avg" dataKey="avg" stroke={C.acc} fill={C.acc} fillOpacity={0.15} strokeWidth={2}/>
                <Radar name="Max" dataKey="max" stroke={C.gld} fill="none" strokeWidth={1} strokeDasharray="4 4"/>
                <Legend wrapperStyle={{fontSize:10,color:C.txM}}/></RadarChart>
              </ResponsiveContainer>);
            })()}
          </div>

          <div style={{background:C.card,borderRadius:12,padding:16,border:`1px solid ${C.bdr}`}}>
            <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Streak Records</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {Object.entries(a.streaks).map(([k,v])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:`${C.bg}88`,borderRadius:8}}>
                  <span style={{fontSize:11,color:C.txM}}>≥{k}kts</span>
                  <span style={{fontSize:16,fontWeight:700,color:C.acc,fontFamily:"'JetBrains Mono',monospace"}}>{fT(v)}</span>
                </div>
              ))}
            </div>
          </div>
        </>}

      </div>
    </div>);
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
