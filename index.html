/* ═══════════════════════════════════════════════════════════════════
   GEO / MATH
   ═══════════════════════════════════════════════════════════════════ */
const RE=6371000,D=Math.PI/180;
function hav(a1,o1,a2,o2){const dl=(a2-a1)*D,do2=(o2-o1)*D;const a=Math.sin(dl/2)**2+Math.cos(a1*D)*Math.cos(a2*D)*Math.sin(do2/2)**2;return 2*RE*Math.asin(Math.sqrt(a))}
function bear(a1,o1,a2,o2){const dl=(o2-o1)*D;return((Math.atan2(Math.sin(dl)*Math.cos(a2*D),Math.cos(a1*D)*Math.sin(a2*D)-Math.sin(a1*D)*Math.cos(a2*D)*Math.cos(dl))/D)+360)%360}
function adiff(a,b){return((b-a+540)%360)-180}
const ms2k=s=>s*1.94384,m2nm=m=>m/1852;
function fT(s){if(s<0)s=0;const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),c=Math.floor(s%60);return h>0?`${h}:${String(m).padStart(2,"0")}:${String(c).padStart(2,"0")}`:`${m}:${String(c).padStart(2,"0")}`}
function sm(arr,w=5){return arr.map((_,i)=>{const s=Math.max(0,i-Math.floor(w/2)),e=Math.min(arr.length,i+Math.ceil(w/2));const sl=arr.slice(s,e);return sl.reduce((a,b)=>a+b,0)/sl.length})}

/** Trim track: startOffsetSec after first point; durationSec null/0 = to last point. */
function cropTrackPoints(pts,startOffsetSec,durationSec){
  if(!pts||pts.length<2)return pts;
  const s=[...pts].sort((a,b)=>a.time-b.time);
  const t0=s[0].time,t1=s[s.length-1].time;
  const span=Math.max(0,t1-t0);
  const off=Math.max(0,Math.min(Number(startOffsetSec)||0,span));
  const start=t0+off;
  const dur=durationSec==null||durationSec===""||Number(durationSec)<=0?null:Number(durationSec);
  const end=dur==null?t1:Math.min(start+dur,t1);
  if(end<=start)return s.slice(0,Math.min(25,s.length));
  return s.filter(p=>p.time>=start&&p.time<=end);
}

/** HH:MM:SS from seconds (always two-digit hours). */
function formatHMS(totalSec){
  const s=Math.max(0,Math.floor(Number(totalSec)||0));
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}
/** Parse HH:MM:SS, MM:SS, or seconds; invalid → null. */
function parseHMS(str){
  const t=String(str).trim();
  if(t==="")return null;
  const parts=t.split(":").map(p=>p.trim());
  if(parts.length===0||parts.length>3)return null;
  for(const p of parts){ if(p==="")return null; if(!/^\d+$/.test(p))return null; }
  const n=parts.map(p=>parseInt(p,10));
  if(n.length===3)return n[0]*3600+n[1]*60+n[2];
  if(n.length===2)return n[0]*60+n[1];
  return n[0];
}

/* ═══════════════════════════════════════════════════════════════════
   FILE PARSERS
   ═══════════════════════════════════════════════════════════════════ */
function parseGPX(text){
  const doc=new DOMParser().parseFromString(text,"text/xml");
  const pts=[];
  doc.querySelectorAll("trkpt").forEach(pt=>{
    const lat=parseFloat(pt.getAttribute("lat")),lon=parseFloat(pt.getAttribute("lon"));
    const tEl=pt.querySelector("time");
    if(!tEl||isNaN(lat)||isNaN(lon))return;
    pts.push({lat,lon,time:new Date(tEl.textContent).getTime()/1000});
  });
  return pts;
}

function parseFIT(buf){
  const view=new DataView(buf),pts=[];
  const SEMI=180/Math.pow(2,31);
  const headerSize=view.getUint8(0);
  let offset=headerSize;
  const dataSize=view.getUint32(4,true);
  const endOff=headerSize+dataSize;
  const defs={};
  try{
    while(offset<endOff-1){
      const rh=view.getUint8(offset);offset++;
      if(rh&0x80){const def=defs[rh&0x03];if(def)offset+=def.size;continue;}
      const isDef=(rh&0x40)!==0,lt=rh&0x0F;
      if(isDef){
        offset++;const arch=view.getUint8(offset);offset++;
        const gm=arch?view.getUint16(offset):view.getUint16(offset,true);offset+=2;
        const nf=view.getUint8(offset);offset++;let ts=0;const flds=[];
        for(let f=0;f<nf;f++){const fn=view.getUint8(offset);offset++;const fs=view.getUint8(offset);offset++;const bt=view.getUint8(offset);offset++;flds.push({n:fn,s:fs,b:bt});ts+=fs;}
        if(rh&0x20){const nd=view.getUint8(offset);offset++;for(let f=0;f<nd;f++){const fs2=view.getUint8(offset+1);flds.push({n:-1,s:fs2,b:0,d:true});ts+=fs2;offset+=3;}}
        defs[lt]={gm,flds,size:ts,arch};
      }else{
        const def=defs[lt];if(!def)break;
        if(def.gm===0){
          let lat=null,lon=null,ts=null;let fo=offset;
          for(const f of def.flds){
            if(f.d){fo+=f.s;continue;}
            try{
              if(f.n===0&&f.s===4){const v=def.arch?view.getInt32(fo):view.getInt32(fo,true);if(v!==0x7FFFFFFF)lat=v*SEMI;}
              else if(f.n===1&&f.s===4){const v=def.arch?view.getInt32(fo):view.getInt32(fo,true);if(v!==0x7FFFFFFF)lon=v*SEMI;}
              else if(f.n===253&&f.s===4){const v=def.arch?view.getUint32(fo):view.getUint32(fo,true);if(v!==0xFFFFFFFF)ts=v+631065600;}
            }catch(e){}
            fo+=f.s;
          }
          if(lat!==null&&lon!==null&&ts!==null&&Math.abs(lat)<90&&Math.abs(lon)<180)pts.push({lat,lon,time:ts});
        }
        offset+=def.size;
      }
    }
  }catch(e){console.warn("FIT parse:",e)}
  return pts;
}

/* ═══════════════════════════════════════════════════════════════════
   ANALYSIS ENGINE
   ═══════════════════════════════════════════════════════════════════ */
function enrich(pts){
  return pts.map((p,i)=>{
    if(i===0)return{...p,sog:0,cog:0,dist:0};
    const pr=pts[i-1],dt=p.time-pr.time;
    if(dt<=0||dt>30)return{...p,sog:0,cog:0,dist:0};
    const d=hav(pr.lat,pr.lon,p.lat,p.lon),b=bear(pr.lat,pr.lon,p.lat,p.lon);
    return{...p,sog:d/dt,cog:b,dist:d,dt};
  });
}

/** Auto wind (meteorological ° FROM): histogram of COG in 10° bins while moving (1.5–12 kn).
 *  Two dominant headings ~60–140° apart → bisector of the shorter arc (beat angles → wind axis).
 *  Single peak → that heading; low confidence if sparse peaks. */
function estWind(pts){
  const bins=new Array(36).fill(0);let cnt=0;
  for(let i=10;i<pts.length-10;i++){
    const s=ms2k(pts[i].ss||0);if(s<1.5||s>12)continue;
    bins[Math.floor(pts[i].cog/10)%36]++;cnt++;
  }
  if(cnt<20)return{dir:0,conf:0};
  const peaks=[];
  for(let i=0;i<36;i++){if(bins[i]>bins[(i+35)%36]&&bins[i]>bins[(i+1)%36]&&bins[i]>cnt*0.04)peaks.push({a:i*10+5,c:bins[i]})}
  peaks.sort((a,b)=>b.c-a.c);
  if(peaks.length>=2){
    const d=Math.abs(adiff(peaks[0].a,peaks[1].a));
    if(d>60&&d<140){const bis=(peaks[0].a+adiff(peaks[0].a,peaks[1].a)/2+360)%360;return{dir:Math.round(bis)%360,conf:Math.min(peaks[0].c+peaks[1].c,cnt)/cnt}}
  }
  return peaks.length>=1?{dir:peaks[0].a,conf:0.3}:{dir:0,conf:0};
}

/** Port vs starboard tack relative to wind FROM (°), same rule as portS/stbdS in runAnalysis. */
function tackSideFromWind(cog,wd){
  const r=((Number(cog)-Number(wd)+360)%360);
  return r>180?"S":"P";
}

/** Circular mean COG (0–360). */
function meanCogDeg(degs){
  if(!degs||!degs.length)return null;
  let sx=0,sy=0;
  for(const c of degs){
    const r=Number(c)*D;
    sx+=Math.sin(r);sy+=Math.cos(r);
  }
  const L=Math.hypot(sx,sy);
  if(L<1e-9)return Number(degs[0])%360;
  return((Math.atan2(sx,sy)/D)+360)%360;
}
function lowerBoundTime(pts,target){
  let lo=0,hi=pts.length;
  while(lo<hi){const mid=(lo+hi)>>1;if(pts[mid].time<target)lo=mid+1;else hi=mid;}
  return lo;
}
/** Mean COG over [tLo,tHi] (seconds) using points with SOG ≥ minKt kn. */
function meanCogInTimeRange(pts,tLo,tHi,minKt){
  let k=lowerBoundTime(pts,tLo);
  const cogs=[];
  for(;k<pts.length&&pts[k].time<=tHi;k++){
    if(minKt<=0||ms2k(pts[k].ss||0)>=minKt)cogs.push(pts[k].cog);
  }
  if(!cogs.length)return null;
  return meanCogDeg(cogs);
}
function fwdRel(cog,refDeg){
  return((Number(cog)-Number(refDeg)+360)%360);
}

/** Tack / gybe once wind FROM (wd) is known.
 *  Port→starboard tack: mean COG over ~4s at start of a 10–20s window lies in (wd+30°)–(wd+60°),
 *  mean COG over ~4s at end lies in (wd−60°)–(wd−30°) i.e. 300°–330° relative to wd. S→P tack is the mirror.
 *  Gybe: same ±30–60° pattern relative to downwind (wd+180°), both ends sailing downwind (wind-relative 90°–270°).
 *  First matching window length W (10…20s, shortest first) wins; 14s cooldown between events. */
function detectMans(pts,wd){
  const wdN=Number(wd)%360;
  const dRef=(wdN+180)%360;
  const res=[];
  const minKt=1.0;
  let coolT=-Infinity;
  for(let i=0;i<pts.length;i++){
    if(pts[i].time<coolT)continue;
    if(ms2k(pts[i].ss||0)<minKt)continue;
    const te=pts[i].time;
    let hit=null;
    for(let W=10;W<=20&&!hit;W++){
      const ts=te-W;
      const cog0=meanCogInTimeRange(pts,ts,ts+4,minKt);
      const cog1=meanCogInTimeRange(pts,te-4,te,minKt);
      if(cog0==null||cog1==null)continue;
      const f0=fwdRel(cog0,wdN),f1=fwdRel(cog1,wdN);
      let type,crossing;
      if(f0>=30&&f0<=60&&f1>=300&&f1<=330){type="tack";crossing="P→S";}
      else if(f0>=300&&f0<=330&&f1>=30&&f1<=60){type="tack";crossing="S→P";}
      else{
        const g0=fwdRel(cog0,dRef),g1=fwdRel(cog1,dRef);
        const down=f0>90&&f0<270&&f1>90&&f1<270;
        if(down&&g0>=30&&g0<=60&&g1>=300&&g1<=330){type="gybe";crossing="P→S";}
        else if(down&&g0>=300&&g0<=330&&g1>=30&&g1<=60){type="gybe";crossing="S→P";}
        else continue;
      }
      const sB=tackSideFromWind(cog0,wdN),sA=tackSideFromWind(cog1,wdN);
      hit={type,idx:i,time:te,cogB:cog0,cogA:cog1,ch:Math.abs(adiff(cog0,cog1)),crossing,sideBef:sB,sideAft:sA,winSec:W};
    }
    if(hit){res.push(hit);coolT=te+14;}
  }
  return res;
}

function scoreMan(m,pts,wd){
  const i=m.idx;
  const pre=pts.slice(Math.max(0,i-15),i-3),post=pts.slice(i+5,Math.min(pts.length,i+25));
  const vmg=p=>{const r=((p.cog-wd+360)%360),va=r>180?360-r:r;return ms2k(p.ss||0)*Math.cos(va*D)};
  const preV=pre.length?Math.abs(pre.reduce((a,p)=>a+vmg(p),0)/pre.length):0;
  const postV=post.length?Math.abs(post.reduce((a,p)=>a+vmg(p),0)/post.length):0;
  const preS=pre.length?pre.reduce((a,p)=>a+ms2k(p.ss||0),0)/pre.length:0;
  const win=pts.slice(Math.max(0,i-5),Math.min(pts.length,i+15));
  const minS=Math.min(...win.map(p=>ms2k(p.ss||0)));
  const postSp=post.map(p=>ms2k(p.ss||0));
  const tgt=preS*0.9,ri=postSp.findIndex(s=>s>=tgt),rt=ri>=0?ri:postSp.length;
  const prof=pts.slice(Math.max(0,i-10),Math.min(pts.length,i+25)).map((p,j)=>({t:j-(i-Math.max(0,i-10)),speed:parseFloat(ms2k(p.ss||0).toFixed(1))}));
  const sr=preS>0?(minS/preS)*100:0;
  const vr=preV>0?Math.min((postV/preV)*100,100):0;
  const rr=Math.max(0,100-rt*8);
  const q=Math.round(sr*0.3+vr*0.4+rr*0.3);
  const pt=pts[m.idx];
  return{...m,preV,postV,preS,minS,rt,prof,q,lat:pt.lat,lon:pt.lon};
}

/** Full rounding order: optional preamble (once) then lap marks × laps (matches WSC Course Selector). */
function expandCourseMarks(preamble,lapMarks,laps){
  const fullSeq=[];
  let seqIdx=0;
  const pre=preamble||[];
  const lap=lapMarks||[];
  const nLaps=Math.max(1,Number(laps)||1);
  pre.forEach(m=>{fullSeq.push({...m,lap:0,seqIdx:seqIdx++});});
  for(let lapN=0;lapN<nLaps;lapN++){
    lap.forEach(m=>{fullSeq.push({...m,lap:lapN+1,seqIdx:seqIdx++});});
  }
  return fullSeq;
}

function detectLegsFromMarks(pts,markPositions,laps,preamble=null){
  // Detect when the track passes close to each mark in sequence
  const legs=[];
  const fullSeq=expandCourseMarks(preamble,markPositions||[],laps);
  if(fullSeq.length<2)return legs;

  // Find closest approach to each mark in sequence
  const roundings=[];
  let searchFrom=0;
  const ROUNDING_DIST=80; // metres — consider rounded if within this distance

  for(const mark of fullSeq){
    let bestDist=Infinity,bestIdx=-1;
    for(let i=searchFrom;i<pts.length;i++){
      const d=hav(pts[i].lat,pts[i].lon,mark.lat,mark.lon);
      if(d<bestDist){bestDist=d;bestIdx=i;}
      // If we've passed through and are moving away, stop searching
      if(d>bestDist+50&&bestDist<ROUNDING_DIST)break;
    }
    if(bestDist<ROUNDING_DIST*3&&bestIdx>searchFrom){
      roundings.push({mark:mark.name,idx:bestIdx,dist:bestDist,lap:mark.lap});
      searchFrom=bestIdx+5;
    }
  }

  // Create legs between roundings
  for(let i=0;i<roundings.length-1;i++){
    const si=roundings[i].idx,ei=roundings[i+1].idx;
    const legPts=pts.slice(si,ei+1);
    if(legPts.length<5)continue;
    const dist=legPts.reduce((a,p)=>a+(p.dist||0),0);
    const straightDist=hav(legPts[0].lat,legPts[0].lon,legPts[legPts.length-1].lat,legPts[legPts.length-1].lon);
    const speeds=legPts.map(p=>ms2k(p.ss||0)).filter(s=>s>0.3);
    const avgSpd=speeds.length?speeds.reduce((a,b)=>a+b,0)/speeds.length:0;
    const maxSpd=speeds.length?Math.max(...speeds):0;
    const dur=legPts[legPts.length-1].time-legPts[0].time;
    const eff=dist>0?(straightDist/dist*100):100;

    // Determine leg bearing to classify as upwind/downwind/reach
    const legBearing=bear(legPts[0].lat,legPts[0].lon,legPts[legPts.length-1].lat,legPts[legPts.length-1].lon);

    legs.push({
      from:roundings[i].mark,to:roundings[i+1].mark,
      lap:roundings[i].lap,
      startIdx:si,endIdx:ei,
      distance:dist,straightDistance:straightDist,
      duration:dur,avgSpeed:avgSpd,maxSpeed:maxSpd,
      efficiency:eff,legBearing,
      type:"leg", // Will be classified with wind data
    });
  }
  return legs;
}

function classifyLegs(legs,wd){
  return legs.map(l=>{
    const rel=((l.legBearing-wd+360)%360);
    let type;
    if(rel<60||rel>300)type="upwind";
    else if(rel>120&&rel<240)type="downwind";
    else type="reach";

    // Calculate VMG for classified legs using stored indices
    return{...l,type};
  });
}

function runAnalysis(rawPts,userWind=null,markPositions=null,laps=1,preamble=null){
  if(!rawPts||rawPts.length<20)return null;
  const sorted=[...rawPts].sort((a,b)=>a.time-b.time);
  const deduped=sorted.filter((p,i)=>i===0||p.time!==sorted[i-1].time);
  const en=enrich(deduped);
  const sogArr=sm(en.map(p=>p.sog),7);
  en.forEach((p,i)=>{p.ss=sogArr[i]});

  const speeds=en.map(p=>ms2k(p.ss)).filter(s=>s>0.3);
  const maxSpeed=speeds.length?Math.max(...speeds):0;
  const avgSpeed=speeds.length?speeds.reduce((a,b)=>a+b,0)/speeds.length:0;
  const totalDist=en.reduce((a,p)=>a+(p.dist||0),0);
  const duration=en[en.length-1].time-en[0].time;

  const windEst=estWind(en);
  const wd=userWind!==null?userWind:windEst.dir;

  const mans=detectMans(en,wd);
  const tacks=mans.filter(m=>m.type==="tack").map(m=>scoreMan(m,en,wd));
  const gybes=mans.filter(m=>m.type==="gybe").map(m=>scoreMan(m,en,wd));

  // Legs — use mark positions if available, otherwise detect from manoeuvres
  let legs=[];
  if(expandCourseMarks(preamble,markPositions||[],laps).length>=2){
    legs=detectLegsFromMarks(en,markPositions,laps,preamble);
    legs=classifyLegs(legs,wd);
  }

  // Compute VMG for each leg
  legs=legs.map(l=>{
    const legPts=en.slice(l.startIdx,l.endIdx+1);
    const vmgs=legPts.map(p=>{
      const r=((p.cog-wd+360)%360),va=r>180?360-r:r;
      return ms2k(p.ss||0)*Math.cos(va*D);
    });
    const avgVMG=vmgs.length?Math.abs(vmgs.reduce((a,b)=>a+b,0)/vmgs.length):0;
    return{...l,avgVMG};
  });

  const streaks={};
  [2,3,4,5,6].forEach(th=>{let lo=0,cu=0;en.forEach(p=>{if(ms2k(p.ss)>=th){cu++;if(cu>lo)lo=cu}else cu=0});streaks[th]=lo});

  const speedTL=en.filter((_,i)=>i%3===0).map(p=>({time:p.time-en[0].time,speed:parseFloat(ms2k(p.ss).toFixed(2)),cog:Math.round(p.cog)}));

  let portS=0,stbdS=0;
  en.forEach(p=>{if(ms2k(p.ss)<0.5)return;const r=((p.cog-wd+360)%360);if(r>180)stbdS++;else portS++});

  return{points:en,windDir:wd,windEst,stats:{totalDist,duration,maxSpeed,avgSpeed,tackCount:tacks.length,gybeCount:gybes.length},tacks,gybes,legs,streaks,speedTL,portS,stbdS};
}

/** Bar colour: quality tier + crossing (P→S vs S→P), port vs starboard tint. */
function manBarFill(q,crossing,isGybe){
  const ps=crossing==="P→S",sp=crossing==="S→P";
  const hi=q>=70,mid=q>=45;
  if(!ps&&!sp){
    if(hi)return isGybe?C.gybe:C.acc;if(mid)return C.gld;return C.wrn;
  }
  if(isGybe){
    if(ps){if(hi)return"#b06eff";if(mid)return"#c99aff";return C.wrn;}
    if(hi)return C.gybe;if(mid)return"#6bd8f2";return C.wrn;
  }
  if(ps){if(hi)return C.port;if(mid)return"#ff8a7e";return"#ffb3a8";}
  if(hi)return C.stbd;if(mid)return"#7dffc0";return"#b0ffd8";
}

/** Mean COG change (°) for manoeuvre list; null if empty. */
function avgManAngle(arr){
  if(!arr||!arr.length)return null;
  return Math.round(arr.reduce((s,m)=>s+Number(m.ch||0),0)/arr.length);
}

      </div>

/* ═══════════════════════════════════════════════════════════════════
   MAP COMPONENT
   ═══════════════════════════════════════════════════════════════════ */
function CourseMap({marks,trackPoints,courseMarks,onMarkDrag,manoeuvres}){
  const mapContainer=useRef(null);
  const mapRef=useRef(null);
  const markersRef=useRef([]);
  const manMarkersRef=useRef([]);
  const [mapBearing,setMapBearing]=useState(0);
  const [mapLoaded,setMapLoaded]=useState(false);

  useEffect(()=>{
    if(!mapContainer.current||mapRef.current)return;
    mapboxgl.accessToken=CONFIG.MAPBOX_TOKEN;
    const map=new mapboxgl.Map({
      container:mapContainer.current,
      style:"mapbox://styles/mapbox/satellite-streets-v12",
      center:[-1.3050,50.8420],
      zoom:13,
    });
    mapRef.current=map;

    const syncBearing=()=>setMapBearing(map.getBearing());
    map.on("rotate",syncBearing);

    map.on("load",()=>{
      if(trackPoints&&trackPoints.length>1){
        map.addSource("track",{type:"geojson",data:{type:"Feature",geometry:{type:"LineString",coordinates:trackPoints.map(p=>[p.lon,p.lat])}}});
        map.addLayer({id:"track-line",type:"line",source:"track",paint:{"line-color":C.trk,"line-width":3,"line-opacity":0.8}});
        const lats=trackPoints.map(p=>p.lat),lons=trackPoints.map(p=>p.lon);
        map.fitBounds([[Math.min(...lons)-0.005,Math.min(...lats)-0.003],[Math.max(...lons)+0.005,Math.max(...lats)+0.003]],{padding:40});
      }
      if(courseMarks&&courseMarks.length>1){
        map.addSource("course",{type:"geojson",data:{type:"Feature",geometry:{type:"LineString",coordinates:courseMarks.map(m=>[m.lon,m.lat])}}});
        map.addLayer({id:"course-line",type:"line",source:"course",paint:{"line-color":C.course,"line-width":2,"line-opacity":0.6,"line-dasharray":[4,3]}});
      }
      syncBearing();
      setMapLoaded(true);
    });

    return()=>{map.off("rotate",syncBearing);map.remove();mapRef.current=null;setMapLoaded(false)};
  },[]);

  useEffect(()=>{
    const map=mapRef.current;if(!map||!mapLoaded)return;
    markersRef.current.forEach(m=>m.remove());
    markersRef.current=[];
    if(!marks)return;
    Object.entries(marks).forEach(([name,mk])=>{
      const el=document.createElement("div");
      let border,fg,bg;
      if(mk.roundTack==="P"){border=C.port;fg="#fff";bg=`${C.port}38`;}
      else if(mk.roundTack==="S"){border=C.stbd;fg="#061018";bg=`${C.stbd}45`;}
      else{border=mk.fixed?C.blu:C.gld;fg=mk.fixed?C.blu:C.gld;bg="#111d33dd";}
      el.style.cssText=`width:28px;height:28px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;font-size:8px;font-weight:700;font-family:'JetBrains Mono',monospace;cursor:${mk.fixed?"default":"grab"};border:2px solid ${border};background:${bg};color:${fg};`;
      const ab=document.createElement("span");ab.style.fontSize="9px";ab.textContent=name.substring(0,3);el.appendChild(ab);
      if(mk.roundTack){const tb=document.createElement("span");tb.style.fontSize="7px";tb.style.opacity="0.95";tb.textContent=mk.roundTack;el.appendChild(tb);}
      const marker=new mapboxgl.Marker({element:el,draggable:!mk.fixed})
        .setLngLat([mk.lon,mk.lat])
        .setPopup(new mapboxgl.Popup({offset:12}).setHTML(`<strong>${name}</strong>${mk.roundTack?` <span style="color:#8899b0">(${mk.roundTack==="P"?"Port":"Stbd"})</span>`:""}${mk.fixed?"":" (drag to adjust)"}${mk.desc?`<br/><span style="color:#8899b0">${mk.desc}</span>`:""}`))
        .addTo(map);
      if(!mk.fixed){
        marker.on("dragend",()=>{
          const lngLat=marker.getLngLat();
          if(onMarkDrag)onMarkDrag(name,lngLat.lat,lngLat.lng);
        });
      }
      markersRef.current.push(marker);
    });
  },[marks,onMarkDrag,mapLoaded]);

  useEffect(()=>{
    const map=mapRef.current;if(!map||!mapLoaded)return;
    manMarkersRef.current.forEach(m=>m.remove());
    manMarkersRef.current=[];
    if(!manoeuvres)return;
    const add=(m,title,color)=>{
      const lat=m.lat!=null?m.lat:trackPoints?.[m.idx]?.lat;
      const lon=m.lon!=null?m.lon:trackPoints?.[m.idx]?.lon;
      if(lat==null||lon==null)return;
      const el=document.createElement("div");
      el.style.cssText=`display:flex;flex-direction:column;align-items:center;padding:4px 8px 5px;border-radius:8px;font-size:11px;font-weight:800;font-family:'JetBrains Mono',monospace;border:2px solid ${color};background:#0a101fcc;color:${color};box-shadow:0 2px 8px rgba(0,0,0,.45);pointer-events:none;line-height:1.15;`;
      const t1=document.createElement("div");t1.textContent=title;t1.style.whiteSpace="nowrap";
      el.appendChild(t1);
      if(m.crossing){const t2=document.createElement("div");t2.textContent=m.crossing;t2.style.fontSize=9;t2.style.fontWeight=700;t2.style.opacity="0.95";t2.style.marginTop="2px";el.appendChild(t2);}
      manMarkersRef.current.push(new mapboxgl.Marker({element:el,anchor:"bottom"}).setLngLat([lon,lat]).addTo(map));
    };
    manoeuvres.tacks.forEach((m,i)=>add(m,`Tack ${i+1}`,C.tack));
    manoeuvres.gybes.forEach((m,i)=>add(m,`Gybe ${i+1}`,C.gybe));
  },[manoeuvres,trackPoints,mapLoaded]);

  useEffect(()=>{
    const map=mapRef.current;if(!map||!map.isStyleLoaded())return;
    if(trackPoints&&trackPoints.length>1){
      const src=map.getSource("track");
      if(src)src.setData({type:"Feature",geometry:{type:"LineString",coordinates:trackPoints.map(p=>[p.lon,p.lat])}});
    }
    if(courseMarks&&courseMarks.length>1){
      const src=map.getSource("course");
      if(src)src.setData({type:"Feature",geometry:{type:"LineString",coordinates:courseMarks.map(m=>[m.lon,m.lat])}});
    }
  },[trackPoints,courseMarks]);

  const roseSz=84;
  return(
    <div style={{position:"relative",width:"100%",height:"100%",borderRadius:12,overflow:"hidden"}}>
      <div ref={mapContainer} style={{position:"absolute",inset:0,width:"100%",height:"100%"}}/>
      <div style={{position:"absolute",top:10,right:10,width:roseSz,height:roseSz,pointerEvents:"none",zIndex:4,transform:`rotate(${-mapBearing}deg)`,transformOrigin:"50% 50%",transition:"transform 0.08s linear"}} aria-hidden>
        <svg width={roseSz} height={roseSz} viewBox="0 0 100 100" style={{display:"block",filter:"drop-shadow(0 1px 3px rgba(0,0,0,.5))"}}>
          <circle cx="50" cy="50" r="44" fill="#0a101fbb" stroke="#4a6a8a" strokeWidth="1.5"/>
          {[0,90,180,270].map(deg=>{
            const rad=(deg-90)*Math.PI/180,x1=50+38*Math.cos(rad),y1=50+38*Math.sin(rad),x2=50+44*Math.cos(rad),y2=50+44*Math.sin(rad);
            return(<line key={deg} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#8aa4c4" strokeWidth="1.2"/>);
          })}
          <text x="50" y="15" textAnchor="middle" fill="#e8edf5" fontSize="11" fontWeight="800" fontFamily="system-ui,sans-serif">N</text>
          <text x="88" y="54" textAnchor="middle" fill="#a8b8d0" fontSize="10" fontWeight="700" fontFamily="system-ui,sans-serif">E</text>
          <text x="50" y="92" textAnchor="middle" fill="#a8b8d0" fontSize="10" fontWeight="700" fontFamily="system-ui,sans-serif">S</text>
          <text x="12" y="54" textAnchor="middle" fill="#a8b8d0" fontSize="10" fontWeight="700" fontFamily="system-ui,sans-serif">W</text>
          <polygon points="50,22 46,34 54,34" fill="#4a9eff"/>
        </svg>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════════════════════════════ */
function App(){
  const [view,setView]=useState("home");
  /** Worker session: user + Strava link + short-lived Supabase JWT (not persisted). */
  const [session,setSession]=useState(null);
  const [authEmail,setAuthEmail]=useState("");
  const [authPassword,setAuthPassword]=useState("");
  const [authErr,setAuthErr]=useState("");
  const [authBusy,setAuthBusy]=useState(false);
  const [showRegister,setShowRegister]=useState(false);
  const [sAth,setSAth]=useState(null);
  const [acts,setActs]=useState([]);
  const [loadingActs,setLoadingActs]=useState(false);
  const [rawPoints,setRawPoints]=useState(null);
  const [actName,setActName]=useState("");
  const [analysis,setAnalysis]=useState(null);
  const [windOvr,setWindOvr]=useState(null);
  const [processing,setProcessing]=useState(false);
  const [tab,setTab]=useState("overview");
  const [courseLetter,setCourseLetter]=useState("");
  const [laps,setLaps]=useState(1);
  const [markOverrides,setMarkOverrides]=useState({});
  const [actId,setActId]=useState(null);
  const [actDate,setActDate]=useState(null);
  const [cropStartText,setCropStartText]=useState("00:00:00");
  const [cropDurationText,setCropDurationText]=useState("");
  const fileRef=useRef(null);

  const applyWorkerSession=useCallback((d)=>{
    if(!d||!d.ok||!d.supabase_access_token)return false;
    supabaseUserJwt=d.supabase_access_token;
    setSession({
      user:d.user,
      strava:d.strava||{linked:false,athlete:null},
      supabase_access_token:d.supabase_access_token,
    });
    if(d.strava?.athlete){
      const at=d.strava.athlete;
      setSAth({id:at.id,firstname:at.firstname||"",lastname:at.lastname||""});
    }else setSAth(null);
    return true;
  },[]);

  const trackMeta=useMemo(()=>{
    if(!rawPoints||rawPoints.length<2)return null;
    const s=[...rawPoints].sort((a,b)=>a.time-b.time);
    const t0=s[0].time,t1=s[s.length-1].time;
    return{t0,t1,spanSec:t1-t0,n:s.length};
  },[rawPoints]);

  const cropStartSecParsed=useMemo(()=>{
    if(!trackMeta)return 0;
    const p=parseHMS(cropStartText);
    const sec=p==null?0:p;
    return Math.max(0,Math.min(sec,trackMeta.spanSec));
  },[cropStartText,trackMeta]);

  const cropDurationSecParsed=useMemo(()=>{
    const t=cropDurationText.trim();
    if(t==="")return null;
    const p=parseHMS(t);
    if(p==null||p<=0)return null;
    return p;
  },[cropDurationText]);

  const croppedPoints=useMemo(()=>{
    if(!rawPoints||rawPoints.length<2)return rawPoints;
    return cropTrackPoints(rawPoints,cropStartSecParsed,cropDurationSecParsed);
  },[rawPoints,cropStartSecParsed,cropDurationSecParsed]);

  const croppedMeta=useMemo(()=>{
    if(!croppedPoints||croppedPoints.length<2)return null;
    const s=[...croppedPoints].sort((a,b)=>a.time-b.time);
    return{durSec:s[s.length-1].time-s[0].time,n:s.length};
  },[croppedPoints]);

  /** Max duration (seconds) from current start to end of recording. */
  const cropDurMaxSec=useMemo(()=>{
    if(!trackMeta)return 0;
    return Math.max(0,trackMeta.spanSec-cropStartSecParsed);
  },[trackMeta,cropStartSecParsed]);

  /** Effective duration for − / +: empty field = full remaining (to end). */
  const cropDurStepSec=useMemo(()=>{
    const maxD=cropDurMaxSec;
    if(maxD<=0)return 0;
    const t=cropDurationText.trim();
    if(t==="")return maxD;
    const p=parseHMS(t);
    if(p==null||p<=0)return maxD;
    return Math.max(1,Math.min(maxD,p));
  },[cropDurationText,cropDurMaxSec]);

  useEffect(()=>{
    setCropStartText("00:00:00");
    if(!rawPoints||rawPoints.length<2){
      setCropDurationText("");
      return;
    }
    const s=[...rawPoints].sort((a,b)=>a.time-b.time);
    const span=s[s.length-1].time-s[0].time;
    setCropDurationText(formatHMS(span));
  },[rawPoints]);

  // Restore session from HttpOnly cookie; if Strava returned ?code=, exchange only after /session succeeds
  // (avoids racing POST /strava/exchange before the browser attaches the cross-site session cookie).
  useEffect(()=>{
    let cancelled=false;
    (async()=>{
      try{
        const p=new URLSearchParams(window.location.search);
        const code=p.get("code");
        const d=await apiGetSession();
        if(cancelled)return;
        if(d.ok&&d.supabase_access_token)applyWorkerSession(d);
        if(!code)return;
        if(!d.ok||!d.supabase_access_token){
          alert("Sign in to SailStats first, then use “Link Strava”.");
          window.history.replaceState({},"",window.location.pathname);
          return;
        }
        window.history.replaceState({},"",window.location.pathname);
        const ex=await exchangeStravaLinked(code);
        if(cancelled)return;
        if(applyWorkerSession(ex))setView("activities");
        else{
          if(ex.detail)console.error("Strava link error:",ex.error,ex.detail);
          let msg=ex.error==="sign_in_first"?"Sign in to SailStats first, then use “Link Strava”."
            :ex.error==="strava_linked_other_account"?(ex.detail&&ex.detail.message)||"This Strava account is linked to another SailStats login."
            :ex.error==="save_user_failed"?"Could not save your Strava link (see console for details)."
            :(ex.error||"Strava link failed");
          alert(msg);
        }
      }catch(e){console.error(e);alert("Strava link failed")}
    })();
    return()=>{cancelled=true};
  },[applyWorkerSession]);

  const loadActs=useCallback(async()=>{
    if(!session?.strava?.linked)return;
    setLoadingActs(true);
    try{
      const a=await fetchActs(1);
      if(Array.isArray(a))setActs(a);
      else if(a&&a.message)console.warn("Activities:",a);
    }catch(e){console.error(e)}
    setLoadingActs(false);
  },[session]);

  useEffect(()=>{
    if(session?.strava?.linked&&view==="activities"&&acts.length===0)loadActs();
  },[session,view,loadActs,acts.length]);

  const analyseStrava=useCallback(async(act)=>{
    if(!session?.strava?.linked)return;
    setProcessing(true);setActName(act.name);setActId(String(act.id));setActDate(act.start_date||act.start_date_local||"");
    try{
      const streams=await fetchStreams(act.id);
      if(streams.latlng&&streams.time){
        const pts=streams.time.data.map((t,i)=>({time:new Date(act.start_date).getTime()/1000+t,lat:streams.latlng.data[i][0],lon:streams.latlng.data[i][1]}));
        setRawPoints(pts);setCourseLetter("");setLaps(1);setMarkOverrides({});setWindOvr(null);
        setView("course-setup");
      }
    }catch(e){console.error(e);alert("Failed to load activity")}
    setProcessing(false);
  },[session]);

  // Handle file upload
  const handleFile=useCallback(async(file)=>{
    setProcessing(true);setActName(file.name.replace(/\.(gpx|fit)$/i,""));
    try{
      let pts;
      if(file.name.toLowerCase().endsWith(".fit")){pts=parseFIT(await file.arrayBuffer())}
      else{pts=parseGPX(await file.text())}
      if(pts.length<20){alert("Not enough GPS points");setProcessing(false);return}
      const t0=pts[0].time;
      setActId(`file-${Date.now()}`);
      setActDate(new Date(t0>1e12?t0:t0*1000).toISOString());
      setRawPoints(pts);setCourseLetter("");setLaps(1);setMarkOverrides({});setWindOvr(null);
      setView("course-setup");
    }catch(e){console.error(e);alert("Failed to parse: "+e.message)}
    setProcessing(false);
  },[]);

  // Get effective mark positions for selected course
  const effectiveMarks=useMemo(()=>{
    if(!courseLetter||!WSC_COURSES[courseLetter])return{};
    const course=WSC_COURSES[courseLetter];
    const rowsInOrder=[...(course.marksPreamble||[]),...(course.marks||[])].map(parseMarkSpec).filter(r=>r.name);
    const tackFirst={};
    rowsInOrder.forEach(r=>{ if(!Object.prototype.hasOwnProperty.call(tackFirst,r.name)) tackFirst[r.name]=r.tack; });
    const uniqueNames=[...new Set(rowsInOrder.map(r=>r.name))];
    const marks={};
    uniqueNames.forEach(name=>{
      const base=WSC_MARKS[name];
      if(!base)return;
      const ovr=markOverrides[name];
      marks[name]={
        lat:ovr?ovr.lat:base.lat,
        lon:ovr?ovr.lon:base.lon,
        fixed:base.fixed,
        desc:base.desc||"",
        name,
        roundTack:tackFirst[name]||null,
      };
    });
    return marks;
  },[courseLetter,markOverrides]);

  // Per-lap mark sequence (coordinates + tack); preamble handled separately
  const courseMarkSeq=useMemo(()=>{
    if(!courseLetter||!WSC_COURSES[courseLetter])return[];
    return (WSC_COURSES[courseLetter].marks||[]).map(row=>{
      const {name,tack}=parseMarkSpec(row);
      const m=effectiveMarks[name];
      return m?{name,lat:m.lat,lon:m.lon,tack}:null;
    }).filter(Boolean);
  },[courseLetter,effectiveMarks]);

  const coursePreambleSeq=useMemo(()=>{
    if(!courseLetter||!WSC_COURSES[courseLetter])return null;
    const pre=WSC_COURSES[courseLetter].marksPreamble;
    if(!pre||!pre.length)return null;
    const arr=pre.map(row=>{
      const {name,tack}=parseMarkSpec(row);
      const m=effectiveMarks[name];
      return m?{name,lat:m.lat,lon:m.lon,tack}:null;
    }).filter(Boolean);
    return arr.length?arr:null;
  },[courseLetter,effectiveMarks]);

  const courseMapLine=useMemo(()=>{
    if(!courseLetter||!WSC_COURSES[courseLetter])return[];
    return expandCourseMarks(coursePreambleSeq,courseMarkSeq,laps);
  },[courseLetter,coursePreambleSeq,courseMarkSeq,laps]);

  const markOrderLap1=useMemo(()=>expandCourseMarks(coursePreambleSeq,courseMarkSeq,1),[coursePreambleSeq,courseMarkSeq]);

  /** Live tack/gybe positions for course-setup map (same engine as full analysis). */
  const setupMapAnalysis=useMemo(()=>{
    if(!croppedPoints||croppedPoints.length<20)return null;
    const markArr=courseMarkSeq.length>0?courseMarkSeq:null;
    return runAnalysis(croppedPoints,windOvr,markArr,laps,coursePreambleSeq);
  },[croppedPoints,windOvr,courseMarkSeq,coursePreambleSeq,laps]);

  // Run analysis with current settings
  const doAnalysis=useCallback(async()=>{
    if(!rawPoints||!croppedPoints||croppedPoints.length<20){if(rawPoints)alert("Track too short after crop — widen the time window or reset crop.");return;}
    setProcessing(true);
    const markArr=courseMarkSeq.length>0?courseMarkSeq:null;
    const result=runAnalysis(croppedPoints,windOvr,markArr,laps,coursePreambleSeq);
    setAnalysis(result);
    if(result&&windOvr===null)setWindOvr(result.windDir);
    setTab("overview");
    setView("analysis");
    if (sAth?.id && result) {
      try {
        await saveAnalysis(sAth.id, actId, actName, actDate, result, { courseLetter, laps, markOverrides });
      } catch (e) { console.warn("Save failed:", e); }
    }
    setProcessing(false);
  },[rawPoints,croppedPoints,windOvr,courseMarkSeq,coursePreambleSeq,laps,sAth,actId,actName,actDate,courseLetter,markOverrides]);

  // Re-run when wind changes
  const curAnalysis=useMemo(()=>{
    if(!analysis||!croppedPoints)return analysis;
    if(windOvr!==null&&windOvr!==analysis.windDir){
      const markArr=courseMarkSeq.length>0?courseMarkSeq:null;
      return runAnalysis(croppedPoints,windOvr,markArr,laps,coursePreambleSeq);
    }
    return analysis;
  },[analysis,windOvr,croppedPoints,courseMarkSeq,coursePreambleSeq,laps]);

  const effWind=windOvr!==null?windOvr:(view==="course-setup"?(setupMapAnalysis?.windDir??analysis?.windDir??0):(curAnalysis?.windDir??0));

  // Handle mark drag
  const onMarkDrag=useCallback((name,lat,lng)=>{
    setMarkOverrides(prev=>({...prev,[name]:{lat,lon:lng}}));
  },[]);

  const hdr={display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px",borderBottom:`1px solid ${C.bdr}`,background:`${C.bg}ee`,backdropFilter:"blur(12px)",position:"sticky",top:0,zIndex:100};
  const btn=(bg,fg,bdr)=>({background:bg,color:fg,border:bdr?`1px solid ${bdr}`:"none",borderRadius:8,padding:"10px 18px",fontSize:14,fontWeight:600,cursor:"pointer"});

  const signIn=useCallback(async()=>{
    setAuthErr("");setAuthBusy(true);
    try{
      const d=await apiSignIn(authEmail.trim(),authPassword);
      if(applyWorkerSession(d)){
        if(d.strava?.linked)setView("activities");
        else setView("home");
      }else setAuthErr(typeof d.detail==="object"?JSON.stringify(d.detail):String(d.error||d.message||"Sign in failed"));
    }catch(e){setAuthErr(String(e.message||e))}
    finally{setAuthBusy(false)}
  },[authEmail,authPassword,applyWorkerSession]);

  const signUp=useCallback(async()=>{
    setAuthErr("");setAuthBusy(true);
    try{
      const d=await apiSignUp(authEmail.trim(),authPassword);
      if(d.needs_confirmation){setAuthErr("");alert(d.message||"Check your email to confirm, then sign in.");setShowRegister(false);return;}
      if(applyWorkerSession(d))setView("home");
      else setAuthErr(String(d.error||"Sign up failed"));
    }catch(e){setAuthErr(String(e.message||e))}
    finally{setAuthBusy(false)}
  },[authEmail,authPassword,applyWorkerSession]);

  const signOutAll=useCallback(async()=>{
    try{await apiLogout()}catch(e){console.warn(e)}
    supabaseUserJwt=null;
    setSession(null);
    setSAth(null);
    setActs([]);
    setView("home");
  },[]);

  /* ─── HOME ─── */
  if(view==="home"){
    return(<div style={{background:C.bg,minHeight:"100vh"}}>
      <div style={{maxWidth:480,margin:"0 auto",padding:"70px 20px",textAlign:"center"}}>
        <div style={{fontSize:44,fontWeight:800,marginBottom:6,background:`linear-gradient(135deg,${C.acc},${C.blu})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:-1}}>SailStats</div>
        <div style={{fontSize:15,color:C.txM,marginBottom:24,lineHeight:1.6}}>GPS track analysis for dinghy sailors.<br/>Tacks, gybes, VMG, speed — with WSC course support.</div>

        <div style={{background:C.card,borderRadius:12,padding:18,border:`1px solid ${C.bdr}`,marginBottom:20,textAlign:"left"}}>
          <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>SailStats account</div>
          {session?.user?<>
            <div style={{fontSize:13,color:C.txt,marginBottom:10}}>Signed in as <strong style={{color:C.acc}}>{session.user.email}</strong></div>
            {session.strava?.linked?<>
              <button type="button" onClick={()=>setView("activities")} style={{...btn(C.acc,"#0a1628"),width:"100%",padding:"12px",marginBottom:8}}>Your Strava activities</button>
            </>:<>
              <div style={{fontSize:12,color:C.txM,marginBottom:10,lineHeight:1.5}}>Link Strava once. Tokens stay on the server; this device keeps a secure session cookie.</div>
              <a href={stravaAuthURL()} style={{...btn("#fc4c02","#fff"),display:"flex",alignItems:"center",justifyContent:"center",gap:10,width:"100%",textDecoration:"none",padding:"12px 16px",marginBottom:10}}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg>
                Link Strava
              </a>
            </>}
            <button type="button" onClick={signOutAll} style={{...btn("transparent",C.txM,C.bdr),width:"100%",padding:"10px",fontSize:12}}>Sign out</button>
          </>:<>
            <label style={{fontSize:10,color:C.txM,display:"block",marginBottom:4}}>Email</label>
            <input type="email" autoComplete="username" value={authEmail} onChange={e=>setAuthEmail(e.target.value)} placeholder="you@example.com" style={{width:"100%",marginBottom:10,padding:"10px 12px",borderRadius:8,border:`1px solid ${C.bdr}`,background:C.bg,color:C.txt,fontSize:14}}/>
            <label style={{fontSize:10,color:C.txM,display:"block",marginBottom:4}}>Password</label>
            <input type="password" autoComplete={showRegister?"new-password":"current-password"} value={authPassword} onChange={e=>setAuthPassword(e.target.value)} placeholder="••••••••" style={{width:"100%",marginBottom:10,padding:"10px 12px",borderRadius:8,border:`1px solid ${C.bdr}`,background:C.bg,color:C.txt,fontSize:14}}/>
            {authErr&&<div style={{fontSize:12,color:C.wrn,marginBottom:10}}>{authErr}</div>}
            {showRegister?<>
              <button type="button" disabled={authBusy} onClick={signUp} style={{...btn(C.acc,"#0a1628"),width:"100%",padding:"12px",marginBottom:8}}>{authBusy?"…":"Create account"}</button>
              <button type="button" onClick={()=>{setShowRegister(false);setAuthErr("")}} style={{...btn("transparent",C.txM,C.bdr),width:"100%",padding:"10px",fontSize:12}}>Back to sign in</button>
            </>:<>
              <button type="button" disabled={authBusy} onClick={signIn} style={{...btn(C.acc,"#0a1628"),width:"100%",padding:"12px",marginBottom:8}}>{authBusy?"…":"Sign in"}</button>
              <button type="button" onClick={()=>{setShowRegister(true);setAuthErr("")}} style={{...btn("transparent",C.txM,C.bdr),width:"100%",padding:"10px",fontSize:12}}>Create account</button>
            </>}
          </>}
        </div>

        <div style={{fontSize:12,color:C.txD,margin:"16px 0"}}>— or —</div>

        <input ref={fileRef} type="file" accept=".gpx,.fit" style={{display:"none"}} onChange={e=>{if(e.target.files[0])handleFile(e.target.files[0])}}/>
        <button onClick={()=>fileRef.current?.click()} style={{...btn("transparent",C.acc,C.acc),display:"flex",alignItems:"center",justifyContent:"center",gap:10,width:"100%",border:`2px solid ${C.acc}`}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
          Upload GPX or FIT File
        </button>

        {processing&&<div style={{marginTop:20,color:C.acc,fontSize:13}}>Processing...</div>}

        <div style={{marginTop:50,display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,textAlign:"left"}}>
          {[["WSC Courses","2026/27 letters, marks & GPS (Course Selector data)"],["Tack Scoring","Quality score 0-100 with speed profile"],["Leg Analysis","Split by mark roundings with VMG"],["Drag Marks","Adjust laid mark positions on the map"]].map(([t,d])=>(
            <div key={t} style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bdr}`}}>
              <div style={{fontSize:12,fontWeight:600,color:C.txt,marginBottom:3}}>{t}</div>
              <div style={{fontSize:10,color:C.txM,lineHeight:1.5}}>{d}</div>
            </div>
          ))}
        </div>
      </div>
    </div>);
  }

  /* ─── ACTIVITIES ─── */
  if(view==="activities"){
    return(<div style={{background:C.bg,minHeight:"100vh"}}>
      <div style={hdr}>
        <button onClick={signOutAll} style={{background:"none",border:"none",color:C.txM,fontSize:12}}>Sign Out</button>
        <div style={{fontSize:15,fontWeight:700,color:C.acc}}>SailStats</div>
        <div style={{fontSize:11,color:C.txM}}>{sAth?.firstname||session?.user?.email||""}</div>
      </div>
      <div style={{maxWidth:560,margin:"0 auto",padding:"20px 14px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:18,fontWeight:700}}>Your Activities</div>
          <button onClick={()=>fileRef.current?.click()} style={{...btn(`${C.acc}18`,C.acc,`${C.acc}44`),padding:"7px 12px",fontSize:11}}>+ Upload File</button>
          <input ref={fileRef} type="file" accept=".gpx,.fit" style={{display:"none"}} onChange={e=>{if(e.target.files[0])handleFile(e.target.files[0])}}/>
        </div>
        {loadingActs&&<div style={{color:C.txM,padding:30,textAlign:"center"}}>Loading...</div>}
        {processing&&<div style={{color:C.acc,padding:30,textAlign:"center"}}>Processing...</div>}
        {acts.map(act=>(
          <button key={act.id} onClick={()=>analyseStrava(act)} style={{display:"flex",width:"100%",alignItems:"center",gap:12,background:C.card,borderRadius:10,padding:"12px 16px",marginBottom:5,border:`1px solid ${C.bdr}`,textAlign:"left",transition:"border-color 0.15s"}} onMouseOver={e=>e.currentTarget.style.borderColor=C.acc} onMouseOut={e=>e.currentTarget.style.borderColor=C.bdr}>
            <div style={{width:34,height:34,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,background:`${C.blu}22`}}>
              {act.type?.includes("Sail")?"⛵":act.type?.includes("Ride")?"🚴":"📍"}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:600,color:C.txt,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{act.name}</div>
              <div style={{fontSize:10,color:C.txM,marginTop:2}}>{new Date(act.start_date_local).toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})} · {fT(act.elapsed_time)}{act.distance?` · ${m2nm(act.distance).toFixed(1)}nm`:""}</div>
            </div>
            <div style={{color:C.txD,fontSize:16}}>›</div>
          </button>
        ))}
      </div>
    </div>);
  }

  /* ─── COURSE SETUP ─── */
  if(view==="course-setup"){
    return(<div style={{background:C.bg,minHeight:"100vh"}}>
      <div style={hdr}>
        <button onClick={()=>session?.strava?.linked?setView("activities"):setView("home")} style={{background:"none",border:"none",color:C.txM,fontSize:13}}>← Back</button>
        <div style={{fontSize:14,fontWeight:600,color:C.txt}}>{actName}</div>
        <div style={{width:40}}/>
      </div>
      <div style={{maxWidth:700,margin:"0 auto",padding:"20px 14px"}}>
        <div style={{fontSize:18,fontWeight:700,marginBottom:16}}>Course Setup</div>

        {/* Track crop — times relative to first GPS point in this activity */}
        {trackMeta&&<div style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bdr}`,marginBottom:16}}>
          <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Track crop</div>
          <div style={{fontSize:12,color:C.txM,marginBottom:10,lineHeight:1.5}}>
            Full recording: <strong style={{color:C.txt}}>{formatHMS(trackMeta.spanSec)}</strong> ({trackMeta.n} pts)
            {croppedMeta&&<span> · Cropped: <strong style={{color:C.acc}}>{formatHMS(croppedMeta.durSec)}</strong> ({croppedMeta.n} pts)</span>}
          </div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
            <div style={{flex:1,minWidth:200}}>
              <label style={{fontSize:10,color:C.txM,display:"block",marginBottom:4}}>Start after first point (HH:MM:SS)</label>
              <div style={{display:"flex",gap:8,alignItems:"stretch"}}>
                <button type="button" aria-label="Decrease start offset"
                  disabled={cropStartSecParsed<=0}
                  onClick={()=>{
                    const n=Math.max(0,cropStartSecParsed-CROP_TIME_STEP_SEC);
                    setCropStartText(formatHMS(n));
                  }}
                  style={{minWidth:52,minHeight:50,fontSize:26,fontWeight:700,lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center",touchAction:"manipulation",WebkitTapHighlightColor:"transparent",borderRadius:8,border:`1px solid ${C.bdr}`,background:C.card,color:cropStartSecParsed<=0?C.txD:C.txt,flexShrink:0,cursor:cropStartSecParsed<=0?"not-allowed":"pointer",opacity:cropStartSecParsed<=0?0.45:1}}>−</button>
                <input type="text" inputMode="numeric" placeholder="00:00:00" value={cropStartText}
                  onChange={e=>setCropStartText(e.target.value)}
                  onBlur={()=>{
                    const p=parseHMS(cropStartText);
                    if(p==null)setCropStartText("00:00:00");
                    else setCropStartText(formatHMS(Math.min(p,trackMeta.spanSec)));
                  }}
                  style={{flex:1,minWidth:0,padding:"8px 10px",background:C.bg,color:C.txt,border:`1px solid ${C.bdr}`,borderRadius:8,fontSize:14,fontFamily:"'JetBrains Mono',monospace"}}/>
                <button type="button" aria-label="Increase start offset"
                  disabled={cropStartSecParsed>=trackMeta.spanSec}
                  onClick={()=>{
                    const n=Math.min(trackMeta.spanSec,cropStartSecParsed+CROP_TIME_STEP_SEC);
                    setCropStartText(formatHMS(n));
                  }}
                  style={{minWidth:52,minHeight:50,fontSize:26,fontWeight:700,lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center",touchAction:"manipulation",WebkitTapHighlightColor:"transparent",borderRadius:8,border:`1px solid ${C.bdr}`,background:C.card,color:cropStartSecParsed>=trackMeta.spanSec?C.txD:C.txt,flexShrink:0,cursor:cropStartSecParsed>=trackMeta.spanSec?"not-allowed":"pointer",opacity:cropStartSecParsed>=trackMeta.spanSec?0.45:1}}>+</button>
              </div>
            </div>
            <div style={{flex:1,minWidth:200}}>
              <label style={{fontSize:10,color:C.txM,display:"block",marginBottom:4}}>Duration (HH:MM:SS)</label>
              <div style={{display:"flex",gap:8,alignItems:"stretch"}}>
                <button type="button" aria-label="Decrease duration"
                  disabled={cropDurMaxSec<=0||cropDurStepSec<=1}
                  onClick={()=>{
                    if(cropDurMaxSec<=0)return;
                    const n=Math.max(1,cropDurStepSec-CROP_TIME_STEP_SEC);
                    setCropDurationText(formatHMS(n));
                  }}
                  style={{minWidth:52,minHeight:50,fontSize:26,fontWeight:700,lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center",touchAction:"manipulation",WebkitTapHighlightColor:"transparent",borderRadius:8,border:`1px solid ${C.bdr}`,background:C.card,color:cropDurMaxSec<=0||cropDurStepSec<=1?C.txD:C.txt,flexShrink:0,cursor:cropDurMaxSec<=0||cropDurStepSec<=1?"not-allowed":"pointer",opacity:cropDurMaxSec<=0||cropDurStepSec<=1?0.45:1}}>−</button>
                <input type="text" inputMode="numeric" placeholder="empty = to end"
                  value={cropDurationText}
                  onChange={e=>setCropDurationText(e.target.value)}
                  onBlur={()=>{
                    const t=cropDurationText.trim();
                    if(t==="")return;
                    const p=parseHMS(t);
                    if(p==null||p<=0)setCropDurationText("");
                    else setCropDurationText(formatHMS(p));
                  }}
                  style={{flex:1,minWidth:0,padding:"8px 10px",background:C.bg,color:C.txt,border:`1px solid ${C.bdr}`,borderRadius:8,fontSize:14,fontFamily:"'JetBrains Mono',monospace"}}/>
                <button type="button" aria-label="Increase duration"
                  disabled={cropDurMaxSec<=0||cropDurStepSec>=cropDurMaxSec}
                  onClick={()=>{
                    if(cropDurMaxSec<=0)return;
                    const n=Math.min(cropDurMaxSec,cropDurStepSec+CROP_TIME_STEP_SEC);
                    setCropDurationText(formatHMS(n));
                  }}
                  style={{minWidth:52,minHeight:50,fontSize:26,fontWeight:700,lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center",touchAction:"manipulation",WebkitTapHighlightColor:"transparent",borderRadius:8,border:`1px solid ${C.bdr}`,background:C.card,color:cropDurMaxSec<=0||cropDurStepSec>=cropDurMaxSec?C.txD:C.txt,flexShrink:0,cursor:cropDurMaxSec<=0||cropDurStepSec>=cropDurMaxSec?"not-allowed":"pointer",opacity:cropDurMaxSec<=0||cropDurStepSec>=cropDurMaxSec?0.45:1}}>+</button>
              </div>
            </div>
            <button type="button" onClick={()=>{setCropStartText("00:00:00");setCropDurationText(formatHMS(trackMeta.spanSec));}} style={{...btn("transparent",C.txM,C.bdr),padding:"8px 14px",fontSize:12}}>Reset crop</button>
          </div>
          <div style={{fontSize:10,color:C.txD,marginTop:8}}>Times are relative to the first GPS point. Use <strong style={{color:C.txM}}>HH:MM:SS</strong> (e.g. <code style={{color:C.acc}}>00:05:30</code> = 5 min 30 s). <strong style={{color:C.txM}}>− / +</strong> step by {CROP_TIME_STEP_SEC}s. Leave duration empty to run to the end of the file.</div>
        </div>}

        {/* Course & Laps selector */}
        <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
          <div style={{flex:2,minWidth:180}}>
            <label style={{fontSize:11,color:C.txM,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:1}}>Course</label>
            <select value={courseLetter} onChange={e=>setCourseLetter(e.target.value)} style={{width:"100%",padding:"10px 12px",background:C.card,color:C.txt,border:`1px solid ${C.bdr}`,borderRadius:8,fontSize:14,fontFamily:"'Outfit',sans-serif"}}>
              <option value="">— Select course —</option>
              {Object.entries(WSC_COURSES).map(([k,v])=><option key={k} value={k}>{v.name}</option>)}
            </select>
          </div>
          <div style={{flex:1,minWidth:80}}>
            <label style={{fontSize:11,color:C.txM,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:1}}>Laps</label>
            <select value={laps} onChange={e=>setLaps(parseInt(e.target.value))} style={{width:"100%",padding:"10px 12px",background:C.card,color:C.txt,border:`1px solid ${C.bdr}`,borderRadius:8,fontSize:14,fontFamily:"'Outfit',sans-serif"}}>
              {[1,2,3,4,5].map(n=><option key={n} value={n}>{n}</option>)}
            </select>
          </div>
        </div>

        {/* Map + wind dial (wind FROM °, meteorological) */}
        <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:16,alignItems:"stretch",minHeight:380}}>
          <div style={{flex:2,minWidth:280,minHeight:380,borderRadius:12,overflow:"hidden",border:`1px solid ${C.bdr}`}}>
            <CourseMap
              marks={Object.keys(effectiveMarks).length>0?effectiveMarks:null}
              trackPoints={croppedPoints}
              courseMarks={courseMapLine}
              onMarkDrag={onMarkDrag}
              manoeuvres={setupMapAnalysis?{tacks:setupMapAnalysis.tacks,gybes:setupMapAnalysis.gybes}:null}
            />
          </div>
          <div style={{flex:1,minWidth:200,maxWidth:320,minHeight:380}}>
            <WindRose
              wd={effWind}
              onChange={setWindOvr}
              compact
              hint={setupMapAnalysis?.windEst?`Auto ${setupMapAnalysis.windEst.dir}° (${(setupMapAnalysis.windEst.conf*100).toFixed(0)}% conf) — slider overrides`:"Slider sets wind FROM · tacks/gybes update on map"}
            />
          </div>
        </div>

        {/* Mark legend — port (P) red, starboard (S) green */}
        {courseLetter&&<div style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bdr}`,marginBottom:16}}>
          <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Rounding order (lap 1)</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5,alignItems:"center",marginBottom:10}}>
            {markOrderLap1.length===0&&<span style={{fontSize:11,color:C.txM}}>—</span>}
            {markOrderLap1.map((pt,i)=>{
              const st=pt.tack==="P"?{bg:`${C.port}22`,br:C.port,fg:C.port}:pt.tack==="S"?{bg:`${C.stbd}20`,br:C.stbd,fg:C.stbd}:{bg:`${C.blu}14`,br:C.blu,fg:C.txM};
              return(<span key={`${pt.name}-${i}-${pt.lap}`} style={{display:"inline-flex",alignItems:"center",gap:4}}>
                {i>0&&<span style={{color:C.txD,fontSize:11}}>→</span>}
                <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"3px 8px",borderRadius:6,background:st.bg,border:`1px solid ${st.br}55`,color:st.fg,fontSize:11,fontWeight:600}}>
                  {pt.name}<span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,opacity:0.95}}>{pt.tack||"—"}</span>
                </span>
              </span>);
            })}
            {laps>1&&<span style={{fontSize:10,color:C.txM,marginLeft:4}}>· then lap ×{laps}</span>}
          </div>
          <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Marks on map</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {Object.entries(effectiveMarks).map(([name,mk])=>{
              const st=mk.roundTack==="P"?{bg:`${C.port}22`,br:C.port,fg:C.port}:mk.roundTack==="S"?{bg:`${C.stbd}20`,br:C.stbd,fg:C.stbd}:{bg:`${mk.fixed?C.blu:C.gld}15`,br:mk.fixed?C.blu:C.gld,fg:mk.fixed?C.blu:C.gld};
              return(
              <div key={name} style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:6,background:st.bg,border:`1px solid ${st.br}44`}}>
                <div style={{width:6,height:6,borderRadius:3,background:st.br}}/>
                <span style={{fontSize:11,color:st.fg,fontWeight:600}}>{name}</span>
                {mk.roundTack&&<span style={{fontSize:9,fontFamily:"'JetBrains Mono',monospace",color:st.fg}}>{mk.roundTack}</span>}
                {!mk.fixed&&<span style={{fontSize:9,color:C.txD}}>drag</span>}
              </div>);
            })}
          </div>
          {WSC_COURSES[courseLetter]&&(()=>{
            const c=WSC_COURSES[courseLetter];
            const pre=(c.marksPreamble||[]).map(formatCourseRow).join(" → ");
            const body=(c.marks||[]).map(formatCourseRow).join(" → ");
            const seq=pre?`${pre} → ${body}`:body;
            return(<div style={{fontSize:11,color:C.txM,marginTop:8}}>
              Full sequence: {seq||"—"}{laps>1?` · lap ×${laps}`:""}
            </div>);
          })()}
        </div>}

        {/* Analyse button */}
        <div style={{display:"flex",gap:10}}>
          <button onClick={doAnalysis} style={{...btn(C.acc,"#0a1628"),flex:1,padding:"14px",fontSize:16,fontWeight:700,borderRadius:10}}>
            {processing?"Analysing...":"Analyse Track"+(courseLetter?` (Course ${courseLetter})`:" (no course)")}
          </button>
          {courseLetter&&<button onClick={()=>{setCourseLetter("");doAnalysis()}} style={{...btn("transparent",C.txM,C.bdr),padding:"14px 18px",fontSize:13}}>
            Skip Course
          </button>}
        </div>
      </div>
    </div>);
  }

  /* ─── ANALYSIS ─── */
  if(view==="analysis"&&curAnalysis){
    const a=curAnalysis;
    const tabs=["overview","manoeuvres","legs","speed"];

    return(<div style={{background:C.bg,minHeight:"100vh"}}>
      <div style={hdr}>
        <button onClick={()=>setView("course-setup")} style={{background:"none",border:"none",color:C.txM,fontSize:13}}>← Course</button>
        <div style={{fontSize:13,fontWeight:600,color:C.txt,maxWidth:"50%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{actName}{courseLetter?` · Course ${courseLetter}`:""}{laps>1?` · ${laps}L`:""}</div>
        <div style={{width:40}}/>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:0,padding:"0 14px",borderBottom:`1px solid ${C.bdr}`,overflowX:"auto"}}>
        {tabs.map(t=><button key={t} onClick={()=>setTab(t)} style={{background:"none",border:"none",padding:"11px 16px",color:tab===t?C.acc:C.txM,fontWeight:tab===t?700:400,fontSize:12,textTransform:"capitalize",borderBottom:tab===t?`2px solid ${C.acc}`:"2px solid transparent",whiteSpace:"nowrap"}}>{t}</button>)}
      </div>

      <div style={{maxWidth:700,margin:"0 auto",padding:"16px 14px"}}>

        {/* OVERVIEW */}
        {tab==="overview"&&<>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
            <Stat label="Distance" value={m2nm(a.stats.totalDist).toFixed(2)} unit="nm" icon="📏"/>
            <Stat label="Duration" value={fT(a.stats.duration)} icon="⏱"/>
            <Stat label="Max Speed" value={a.stats.maxSpeed.toFixed(1)} unit="kts" color={C.gld} icon="⚡"/>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
            <Stat label="Avg Speed" value={a.stats.avgSpeed.toFixed(1)} unit="kts" color={C.blu} icon="〰"/>
            <Stat label="Tacks" value={a.stats.tackCount} color={C.tack} icon="↗"/>
            <Stat label="Gybes" value={a.stats.gybeCount} color={C.gybe} icon="↘"/>
          </div>

          <div style={{background:C.card,borderRadius:12,padding:16,border:`1px solid ${C.bdr}`,marginBottom:16}}>
            <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Tack split (time on each tack)</div>
            <div style={{display:"flex",gap:3,height:24,borderRadius:6,overflow:"hidden",marginBottom:10}}>
              <div style={{background:C.port,flex:a.portS||1,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#fff"}}>Port</div>
              <div style={{background:C.stbd,flex:a.stbdS||1,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#000"}}>Stbd</div>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.txM}}>
              <span>{Math.round(a.portS/(a.portS+a.stbdS||1)*100)}%</span>
              <span>{Math.round(a.stbdS/(a.portS+a.stbdS||1)*100)}%</span>
            </div>
            <div style={{marginTop:12,fontSize:12,color:C.txt}}>
              Wind from: <strong style={{fontFamily:"'JetBrains Mono',monospace",color:C.acc}}>{effWind}°</strong>
              <span style={{color:C.txD,fontSize:10,marginLeft:8}}>Set on Course &amp; map</span>
            </div>
            {a.windEst&&<div style={{marginTop:8,fontSize:10,color:C.txD,lineHeight:1.6}}>
              Auto estimate: {a.windEst.dir}° ({(a.windEst.conf*100).toFixed(0)}% conf)
            </div>}
          </div>

          <div style={{background:C.card,borderRadius:12,padding:16,border:`1px solid ${C.bdr}`,marginBottom:12}}>
            <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Speed Over Time</div>
            <ResponsiveContainer width="100%" height={160}>
              <AreaChart data={a.speedTL}>
                <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.acc} stopOpacity={0.3}/><stop offset="100%" stopColor={C.acc} stopOpacity={0}/></linearGradient></defs>
                <CartesianGrid strokeDasharray="3 3" stroke={C.bdr}/>
                <XAxis dataKey="time" tick={{fill:C.txD,fontSize:9}} tickFormatter={v=>fT(v)} stroke={C.bdr}/>
                <YAxis tick={{fill:C.txD,fontSize:9}} stroke={C.bdr}/>
                <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:8,fontSize:11}} labelFormatter={v=>fT(v)} formatter={v=>[`${v} kts`,"Speed"]}/>
                <Area type="monotone" dataKey="speed" stroke={C.acc} fill="url(#sg)" strokeWidth={1.5} dot={false}/>
              </AreaChart>
            </ResponsiveContainer>
          </div>

          <div style={{background:C.card,borderRadius:12,padding:16,border:`1px solid ${C.bdr}`}}>
            <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Speed Streaks</div>
            <ResponsiveContainer width="100%" height={100}>
              <BarChart data={Object.entries(a.streaks).map(([k,v])=>({th:`≥${k}kts`,s:v}))}>
                <CartesianGrid strokeDasharray="3 3" stroke={C.bdr}/>
                <XAxis dataKey="th" tick={{fill:C.txM,fontSize:10}} stroke={C.bdr}/>
                <YAxis tick={{fill:C.txD,fontSize:9}} stroke={C.bdr}/>
                <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:8,fontSize:11}}/>
                <Bar dataKey="s" name="seconds" radius={[4,4,0,0]}>{Object.keys(a.streaks).map((k,i)=><Cell key={k} fill={[C.acc,C.blu,C.gld,C.wrn,C.port][i]}/>)}</Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </>}

        {/* MANOEUVRES */}
        {tab==="manoeuvres"&&<>
          <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
            <Stat label="Avg Tack" color={C.tack} value={a.tacks.length?Math.round(a.tacks.reduce((s,t)=>s+t.q,0)/a.tacks.length):"—"} unit="/100"/>
            <Stat label="Avg Gybe" color={C.gybe} value={a.gybes.length?Math.round(a.gybes.reduce((s,g)=>s+g.q,0)/a.gybes.length):"—"} unit="/100"/>
          </div>
          {(()=>{
            const tPS=a.tacks.filter(t=>t.crossing==="P→S"),tSP=a.tacks.filter(t=>t.crossing==="S→P");
            const gPS=a.gybes.filter(g=>g.crossing==="P→S"),gSP=a.gybes.filter(g=>g.crossing==="S→P");
            const cell=(label,val,col)=>(
              <div key={label} style={{background:`${col}10`,border:`1px solid ${col}44`,borderRadius:8,padding:"8px 10px",minWidth:0}}>
                <div style={{fontSize:9,color:C.txM,textTransform:"uppercase",letterSpacing:0.6,marginBottom:3}}>{label}</div>
                <div style={{fontSize:18,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:col}}>{val==null?"—":`${val}°`}</div>
              </div>
            );
            return(
              <div style={{background:C.card,borderRadius:12,padding:14,border:`1px solid ${C.bdr}`,marginBottom:14}}>
                <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Average turn angle (COG change)</div>
                <div style={{fontSize:10,color:C.txD,marginBottom:10,lineHeight:1.45}}>Mean heading change across the detection window. P→S = port tack → starboard tack; S→P = starboard → port.</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(108px, 1fr))",gap:8}}>
                  {cell("All tacks",avgManAngle(a.tacks),C.tack)}
                  {cell("Tacks P→S",avgManAngle(tPS),C.port)}
                  {cell("Tacks S→P",avgManAngle(tSP),C.stbd)}
                  {cell("All gybes",avgManAngle(a.gybes),C.gybe)}
                  {cell("Gybes P→S",avgManAngle(gPS),"#b06eff")}
                  {cell("Gybes S→P",avgManAngle(gSP),"#5ad4ea")}
                </div>
              </div>
            );
          })()}

          {a.tacks.length>0&&<div style={{background:C.card,borderRadius:12,padding:16,border:`1px solid ${C.bdr}`,marginBottom:14}}>
            <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Tack quality</div>
            <div style={{fontSize:9,color:C.txD,marginBottom:10,lineHeight:1.5}}>
              <span style={{color:C.port,fontWeight:700}}>■</span> P→S (port tack → starboard)&nbsp;&nbsp;
              <span style={{color:C.stbd,fontWeight:700}}>■</span> S→P (starboard → port)
            </div>
            <ResponsiveContainer width="100%" height={110}>
              <BarChart data={a.tacks.map((t,i)=>({n:`T${i+1}`,q:t.q,crossing:t.crossing||"—",ch:Math.round(Number(t.ch)||0)}))}>
                <CartesianGrid strokeDasharray="3 3" stroke={C.bdr}/>
                <XAxis dataKey="n" tick={{fill:C.txM,fontSize:9}} stroke={C.bdr}/>
                <YAxis domain={[0,100]} tick={{fill:C.txD,fontSize:9}} stroke={C.bdr}/>
                <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:8,fontSize:11}} formatter={(v)=>[`${v} /100`,"Quality"]} labelFormatter={(lab,pl)=>{const p=pl&&pl[0]&&pl[0].payload;return p?`${p.n} · ${p.crossing} · tack angle ${p.ch}°`:lab;}}/>
                <Bar dataKey="q" name="quality" radius={[4,4,0,0]}>{a.tacks.map((t,i)=><Cell key={`tk${i}`} fill={manBarFill(t.q,t.crossing,false)}/>)}</Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>}
          {a.gybes.length>0&&<div style={{background:C.card,borderRadius:12,padding:16,border:`1px solid ${C.bdr}`,marginBottom:14}}>
            <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Gybe quality</div>
            <div style={{fontSize:9,color:C.txD,marginBottom:10,lineHeight:1.5}}>
              <span style={{color:"#b06eff",fontWeight:700}}>■</span> P→S&nbsp;&nbsp;
              <span style={{color:C.gybe,fontWeight:700}}>■</span> S→P
            </div>
            <ResponsiveContainer width="100%" height={110}>
              <BarChart data={a.gybes.map((g,i)=>({n:`G${i+1}`,q:g.q,crossing:g.crossing||"—",ch:Math.round(Number(g.ch)||0)}))}>
                <CartesianGrid strokeDasharray="3 3" stroke={C.bdr}/>
                <XAxis dataKey="n" tick={{fill:C.txM,fontSize:9}} stroke={C.bdr}/>
                <YAxis domain={[0,100]} tick={{fill:C.txD,fontSize:9}} stroke={C.bdr}/>
                <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:8,fontSize:11}} formatter={(v)=>[`${v} /100`,"Quality"]} labelFormatter={(lab,pl)=>{const p=pl&&pl[0]&&pl[0].payload;return p?`${p.n} · ${p.crossing} · gybe angle ${p.ch}°`:lab;}}/>
                <Bar dataKey="q" name="quality" radius={[4,4,0,0]}>{a.gybes.map((g,i)=><Cell key={`gy${i}`} fill={manBarFill(g.q,g.crossing,true)}/>)}</Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>}

          {a.tacks.length>0&&<><div style={{fontSize:13,fontWeight:700,color:C.tack,marginBottom:6}}>Tacks ({a.tacks.length})</div>{a.tacks.map((t,i)=><ManCard key={`t${i}`} m={t} index={i}/>)}</>}
          {a.gybes.length>0&&<><div style={{fontSize:13,fontWeight:700,color:C.gybe,marginBottom:6,marginTop:14}}>Gybes ({a.gybes.length})</div>{a.gybes.map((g,i)=><ManCard key={`g${i}`} m={g} index={i}/>)}</>}
          {!a.tacks.length&&!a.gybes.length&&<div style={{textAlign:"center",color:C.txM,padding:30}}>No manoeuvres detected. Try adjusting wind direction.</div>}
        </>}

        {/* LEGS */}
        {tab==="legs"&&<>
          {a.legs.length>0?<>
            <div style={{fontSize:10,color:C.txD,textTransform:"uppercase",letterSpacing:1,display:"flex",gap:8,padding:"6px 12px",marginBottom:4}}>
              <div style={{width:60}}>From→To</div>
              <div style={{width:55}}>Type</div>
              <div style={{flex:1}}>Dist</div>
              <div style={{width:50}}>Time</div>
              <div style={{width:50}}>Spd</div>
              <div style={{width:42}}>VMG</div>
              <div style={{width:38}}>Eff</div>
            </div>
            {a.legs.map((l,i)=>{
              const tc=l.type==="upwind"?C.up:l.type==="downwind"?C.dn:C.txM;
              return(<div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:C.card,borderRadius:8,marginBottom:3,border:`1px solid ${C.bdr}`,fontSize:11}}>
                <div style={{width:60,color:C.txt,fontWeight:600,fontSize:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.from}→{l.to}</div>
                <div style={{width:55,color:tc,fontWeight:600,textTransform:"uppercase",fontSize:10}}>{l.type}</div>
                <div style={{flex:1,color:C.txt,fontFamily:"'JetBrains Mono',monospace"}}>{m2nm(l.distance).toFixed(2)}nm</div>
                <div style={{width:50,color:C.txM}}>{fT(l.duration)}</div>
                <div style={{width:50,color:C.acc,fontFamily:"'JetBrains Mono',monospace"}}>{l.avgSpeed.toFixed(1)}</div>
                <div style={{width:42,color:C.gld,fontFamily:"'JetBrains Mono',monospace"}}>{l.avgVMG.toFixed(1)}</div>
                <div style={{width:38,color:C.txM}}>{l.efficiency.toFixed(0)}%</div>
              </div>);
            })}

            <div style={{display:"flex",gap:8,marginTop:14}}>
              {["upwind","downwind","reach"].map(type=>{
                const tl=a.legs.filter(l=>l.type===type);if(!tl.length)return null;
                const as2=tl.reduce((s,l)=>s+l.avgSpeed,0)/tl.length;
                const av=tl.reduce((s,l)=>s+l.avgVMG,0)/tl.length;
                const ae=tl.reduce((s,l)=>s+l.efficiency,0)/tl.length;
                const tc2=type==="upwind"?C.up:type==="downwind"?C.dn:C.txM;
                return(<div key={type} style={{flex:1,background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bdr}`}}>
                  <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:tc2,marginBottom:8}}>{type} ({tl.length})</div>
                  <div style={{fontSize:10,color:C.txM,lineHeight:2}}>
                    Avg: <span style={{color:C.txt,fontFamily:"'JetBrains Mono',monospace"}}>{as2.toFixed(1)}kts</span><br/>
                    VMG: <span style={{color:C.txt,fontFamily:"'JetBrains Mono',monospace"}}>{av.toFixed(1)}kts</span><br/>
                    Eff: <span style={{color:C.txt,fontFamily:"'JetBrains Mono',monospace"}}>{ae.toFixed(0)}%</span>
                  </div>
                </div>);
              })}
            </div>
          </>:<div style={{textAlign:"center",color:C.txM,padding:30}}>{courseLetter?"Mark roundings not detected — try adjusting mark positions.":"Select a course for leg-by-leg breakdown."}<br/><button onClick={()=>setView("course-setup")} style={{...btn(`${C.acc}18`,C.acc,`${C.acc}44`),marginTop:12,padding:"8px 16px",fontSize:12}}>← Course Setup</button></div>}
        </>}

        {/* SPEED */}
        {tab==="speed"&&<>
          <div style={{background:C.card,borderRadius:12,padding:16,border:`1px solid ${C.bdr}`,marginBottom:14}}>
            <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Speed Distribution</div>
            {(()=>{
              const bins=new Array(20).fill(0);
              a.points.forEach(p=>{const k=ms2k(p.ss||0);if(k<0.3)return;bins[Math.min(Math.floor(k*2),19)]++});
              return(<ResponsiveContainer width="100%" height={140}>
                <BarChart data={bins.map((c,i)=>({r:`${(i/2).toFixed(1)}`,c}))}>
                  <CartesianGrid strokeDasharray="3 3" stroke={C.bdr}/><XAxis dataKey="r" tick={{fill:C.txD,fontSize:8}} stroke={C.bdr}/>
                  <YAxis tick={{fill:C.txD,fontSize:9}} stroke={C.bdr}/>
                  <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:8,fontSize:11}}/>
                  <Bar dataKey="c" name="samples" fill={C.blu} radius={[2,2,0,0]}/>
                </BarChart>
              </ResponsiveContainer>);
            })()}
          </div>

          <div style={{background:C.card,borderRadius:12,padding:16,border:`1px solid ${C.bdr}`,marginBottom:14}}>
            <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Speed by Heading (relative to wind)</div>
            {(()=>{
              const ab={};for(let i=0;i<360;i+=15)ab[i]=[];
              a.points.forEach(p=>{const s=ms2k(p.ss||0);if(s<0.5)return;const r=((p.cog-effWind+360)%360);ab[Math.round(r/15)*15%360]?.push(s)});
              const pd=Object.entries(ab).map(([k,v])=>({label:`${k}°`,avg:v.length?v.reduce((a,b)=>a+b,0)/v.length:0,max:v.length?Math.max(...v):0})).sort((a,b)=>parseInt(a.label)-parseInt(b.label));
              return(<ResponsiveContainer width="100%" height={220}>
                <RadarChart data={pd}><PolarGrid stroke={C.bdr}/><PolarAngleAxis dataKey="label" tick={{fill:C.txD,fontSize:8}}/>
                <PolarRadiusAxis tick={{fill:C.txD,fontSize:8}}/>
                <Radar name="Avg" dataKey="avg" stroke={C.acc} fill={C.acc} fillOpacity={0.15} strokeWidth={2}/>
                <Radar name="Max" dataKey="max" stroke={C.gld} fill="none" strokeWidth={1} strokeDasharray="4 4"/>
                <Legend wrapperStyle={{fontSize:10,color:C.txM}}/></RadarChart>
              </ResponsiveContainer>);
            })()}
          </div>

          <div style={{background:C.card,borderRadius:12,padding:16,border:`1px solid ${C.bdr}`}}>
            <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Streak Records</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {Object.entries(a.streaks).map(([k,v])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:`${C.bg}88`,borderRadius:8}}>
                  <span style={{fontSize:11,color:C.txM}}>≥{k}kts</span>
                  <span style={{fontSize:16,fontWeight:700,color:C.acc,fontFamily:"'JetBrains Mono',monospace"}}>{fT(v)}</span>
                </div>
              ))}
            </div>
          </div>
        </>}

      </div>
    </div>);
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
