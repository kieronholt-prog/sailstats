                <div style={{fontSize:12,fontWeight:700,color:col,textTransform:"capitalize",marginBottom:8}}>{type}</div>
                {[["Min turn (deg)","minTurn",20,240,1],["Max turn (deg)","maxTurn",40,280,1],["Min speed (kts)","minSpeed",0.2,8,0.1],["Spacing (sec)","cooldownSec",1,20,1],["Before pts","beforePts",1,20,1],["After pts","afterPts",1,24,1]].map(([label,key,min,max,step])=>(
                  <div key={key} style={{marginBottom:6}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.txM,marginBottom:2}}><span>{label}</span><span style={{color:C.txt,fontFamily:"'JetBrains Mono',monospace"}}>{cfg[key]}</span></div>
                    <input
                      type="range"
                      min={min}
                      max={max}
                      step={step}
                      value={cfg[key]}
                      onChange={e=>{
                        const value=step===1?parseInt(e.target.value,10):parseFloat(e.target.value);
                        setDetSettings(prev=>({...prev,[type]:{...prev[type],[key]:value}}));
                      }}
                      style={{width:"100%"}}
                    />
                  </div>
                ))}
              </div>);
            })}
          </div>
          <div style={{display:"flex",justifyContent:"flex-end",marginTop:8}}>
            <button onClick={()=>{setDetSettings(DETECTION_DEFAULTS);setWindOvr(null);}} style={{...btn("transparent",C.txM,C.bdr),padding:"7px 10px",fontSize:11}}>
              Reset defaults
            </button>
          </div>
          <div style={{fontSize:10,color:C.txD,marginTop:6}}>Defaults: Tack min turn 60°, Gybe min turn 45°. Tack spacing default is 4s to capture close tacks.</div>
        </div>

        {croppedPoints&&croppedPoints.length>=2&&distToStartLine&&<div style={{fontSize:10,color:C.txD,lineHeight:1.5,padding:"8px 10px",background:`${C.bg}aa`,borderRadius:8,border:`1px solid ${C.bdr}`,marginBottom:16}}>
          White dashed line = SFA→SFB. Closest approach on track: <strong style={{fontFamily:"'JetBrains Mono',monospace",color:C.acc}}>{Math.round(distToStartLine.distToMarkM)} m</strong> · along track: <strong style={{fontFamily:"'JetBrains Mono',monospace",color:C.acc}}>{m2nm(distToStartLine.alongM).toFixed(2)} nm</strong>.
        </div>}

        {/* Mark legend — port (P) red, starboard (S) green */}
        {courseLetter&&<div style={{background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bdr}`,marginBottom:16}}>
          <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Rounding order (lap 1)</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5,alignItems:"center",marginBottom:10}}>
            {markOrderLap1.length===0&&<span style={{fontSize:11,color:C.txM}}>—</span>}
            {markOrderLap1.map((pt,i)=>{
              const st=pt.tack==="P"?{bg:`${C.port}22`,br:C.port,fg:C.port}:pt.tack==="S"?{bg:`${C.stbd}20`,br:C.stbd,fg:C.stbd}:{bg:`${C.blu}14`,br:C.blu,fg:C.txM};
              return(<span key={`${pt.name}-${i}-${pt.lap}`} style={{display:"inline-flex",alignItems:"center",gap:4}}>
                {i>0&&<span style={{color:C.txD,fontSize:11}}>→</span>}
                <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"3px 8px",borderRadius:6,background:st.bg,border:`1px solid ${st.br}55`,color:st.fg,fontSize:11,fontWeight:600}}>
                  {pt.name}<span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,opacity:0.95}}>{pt.tack||"—"}</span>
                </span>
              </span>);
            })}
            {laps>1&&<span style={{fontSize:10,color:C.txM,marginLeft:4}}>· then lap ×{laps}</span>}
          </div>
          <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Marks on map</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {Object.entries(effectiveMarks).map(([name,mk])=>{
              const st=mk.roundTack==="P"?{bg:`${C.port}22`,br:C.port,fg:C.port}:mk.roundTack==="S"?{bg:`${C.stbd}20`,br:C.stbd,fg:C.stbd}:{bg:`${C.gld}15`,br:C.gld,fg:C.gld};
              return(
              <div key={name} style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:6,background:st.bg,border:`1px solid ${st.br}44`}}>
                <div style={{width:6,height:6,borderRadius:3,background:st.br}}/>
                <span style={{fontSize:11,color:st.fg,fontWeight:600}}>{name}</span>
                {mk.roundTack&&<span style={{fontSize:9,fontFamily:"'JetBrains Mono',monospace",color:st.fg}}>{mk.roundTack}</span>}
                <span style={{fontSize:9,color:C.txD}}>drag</span>
              </div>);
            })}
          </div>
          {WSC_COURSES[courseLetter]&&(()=>{
            const c=WSC_COURSES[courseLetter];
            const pre=(c.marksPreamble||[]).map(formatCourseRow).join(" → ");
            const body=(c.marks||[]).map(formatCourseRow).join(" → ");
            const seq=pre?`${pre} → ${body}`:body;
            return(<div style={{fontSize:11,color:C.txM,marginTop:8}}>
              Full sequence: {seq||"—"}{laps>1?` · lap ×${laps}`:""}
            </div>);
          })()}
        </div>}

        {/* Analyse button */}
        <div style={{display:"flex",gap:10}}>
          <button onClick={doAnalysis} style={{...btn(C.acc,"#0a1628"),flex:1,padding:"14px",fontSize:16,fontWeight:700,borderRadius:10}}>
            {processing?"Analysing...":"Analyse Track"+(courseLetter?` (Course ${courseLetter})`:" (no course)")}
          </button>
          {courseLetter&&<button type="button" onClick={()=>{setCourseLetter("");setTimeout(()=>doAnalysisRef.current(),0);}} style={{...btn("transparent",C.txM,C.bdr),padding:"14px 18px",fontSize:13}}>
            Skip Course
          </button>}
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:12,alignItems:"center",marginTop:14}}>
          <button
            type="button"
            disabled={
              setupSaveBusy ||
              !(session?.strava?.athlete?.id ?? sAth?.id) ||
              String(actId || "").startsWith("file-")
            }
            onClick={saveCourseSetupOnly}
            style={{
              ...btn("transparent", C.acc, C.acc),
              padding: "10px 16px",
              fontSize: 13,
              opacity:
                setupSaveBusy || !(session?.strava?.athlete?.id ?? sAth?.id) || String(actId || "").startsWith("file-")
                  ? 0.45
                  : 1,
            }}
          >
            {setupSaveBusy ? "Saving…" : "Save course setup"}
          </button>
          {setupSaveMsg && <span style={{ fontSize: 12, color: C.acc }}>{setupSaveMsg}</span>}
          <span style={{ fontSize: 11, color: C.txD, lineHeight: 1.45, maxWidth: 420 }}>
            Saves course, crop, mark positions & wind for this activity (no full analysis required). Reloads when you open the activity again.
          </span>
        </div>
      </div>
    </div>);
  }

  /* ─── ANALYSIS (no computed result — avoid blank screen) ─── */
  if(view==="analysis"&&!curAnalysis){
    return(<div style={{background:C.bg,minHeight:"100vh"}}>
      <div style={hdr}>
        <button type="button" onClick={()=>setView("course-setup")} style={{background:"none",border:"none",color:C.txM,fontSize:13}}>← Setup</button>
        <div style={{fontSize:14,fontWeight:600,color:C.txt}}>{actName||"Activity"}</div>
        <div style={{width:40}}/>
      </div>
      <div style={{maxWidth:560,margin:"0 auto",padding:"32px 20px"}}>
        <div style={{fontSize:18,fontWeight:700,color:C.txt,marginBottom:10}}>Analysis unavailable</div>
        <p style={{fontSize:13,color:C.txM,lineHeight:1.6,marginBottom:16}}>
          There is no valid analysis to show. This usually means there are fewer than 20 GPS points in the cropped window, or the track is still loading. Open the map, check auto-crop, and run <strong style={{color:C.txt}}>Analyse Track</strong> again.
        </p>
        <button type="button" onClick={()=>setView("course-setup")} style={{...btn(C.acc,"#0a1628"),padding:"12px 20px",fontSize:14}}>Back to map</button>
      </div>
    </div>);
  }

  /* ─── ANALYSIS ─── */
  if(view==="analysis"&&curAnalysis){
    const a=curAnalysis;
    const tabs=["overview","manoeuvres","legs","speed"];

    return(<div style={{background:C.bg,minHeight:"100vh"}}>
      <div style={hdr}>
        <button onClick={()=>setView("course-setup")} style={{background:"none",border:"none",color:C.txM,fontSize:13}}>← Course</button>
        <div style={{fontSize:13,fontWeight:600,color:C.txt,maxWidth:"50%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{actName}{courseLetter?` · Course ${courseLetter}`:""}{laps>1?` · ${laps}L`:""}</div>
        <div style={{width:40}}/>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:0,padding:"0 14px",borderBottom:`1px solid ${C.bdr}`,overflowX:"auto"}}>
        {tabs.map(t=><button key={t} onClick={()=>setTab(t)} style={{background:"none",border:"none",padding:"11px 16px",color:tab===t?C.acc:C.txM,fontWeight:tab===t?700:400,fontSize:12,textTransform:"capitalize",borderBottom:tab===t?`2px solid ${C.acc}`:"2px solid transparent",whiteSpace:"nowrap"}}>{t}</button>)}
      </div>

      <div style={{maxWidth:700,margin:"0 auto",padding:"16px 14px"}}>

        {/* OVERVIEW */}
        {tab==="overview"&&<>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
            <Stat label="Distance" value={m2nm(a.stats.totalDist).toFixed(2)} unit="nm" icon="📏"/>
            <Stat label="Duration" value={fT(a.stats.duration)} icon="⏱"/>
            <Stat label="Max Speed" value={a.stats.maxSpeed.toFixed(1)} unit="kts" color={C.gld} icon="⚡"/>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
            <Stat label="Avg Speed" value={a.stats.avgSpeed.toFixed(1)} unit="kts" color={C.blu} icon="〰"/>
            <Stat label="Tacks (racing)" value={a.stats.tackCount} color={C.tack} icon="↗"/>
            <Stat label="Gybes (racing)" value={a.stats.gybeCount} color={C.gybe} icon="↘"/>
          </div>
          {(a.stats.tackCountMarkAdjacent>0||a.stats.gybeCountMarkAdjacent>0)&&<div style={{fontSize:10,color:C.txD,marginTop:-8,marginBottom:12,lineHeight:1.5}}>
            Mark-rounding manoeuvres (turn within <strong>{MARK_MANOEUVRE_AT_MARK_M} m</strong> of a course mark and/or within <strong>{MARK_MANOEUVRE_NEAR_ROUNDING_PTS} GPS points</strong> of a detected rounding): <span style={{color:C.trkRound,fontWeight:700}}>{a.stats.tackCountMarkAdjacent||0}</span> tack{(a.stats.tackCountMarkAdjacent||0)!==1?"s":""}, <span style={{color:C.trkRound,fontWeight:700}}>{a.stats.gybeCountMarkAdjacent||0}</span> gybe{(a.stats.gybeCountMarkAdjacent||0)!==1?"s":""} — excluded from these counts, quality charts, leg VMG averages, and magnitude VMG mode.
          </div>}
          <div style={{fontSize:11,color:C.txM,marginBottom:12}}>
            {a.windStats?.range!=null&&<>Wind range {a.windStats.range.toFixed(1)}° ({a.windStats.trend})</>}
          </div>

          <div style={{background:C.card,borderRadius:12,padding:16,border:`1px solid ${C.bdr}`,marginBottom:16}}>
            <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Speed + wind timeline</div>
            {timelineDomain&&<div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",marginBottom:10}}>
              <span style={{fontSize:10,color:C.txM,textTransform:"uppercase",letterSpacing:0.8}}>Zoom</span>
              {[1,2,4,8].map(z=><button key={`z-${z}`} type="button" onClick={()=>{setTimelineZoom(z);if(z===1)setTimelineScroll(0);}} style={{...btn(timelineZoom===z?`${C.acc}25`:"transparent",timelineZoom===z?C.acc:C.txM,C.bdr),padding:"4px 8px",fontSize:10}}>{z}x</button>)}
              {timelineZoom>1&&<input type="range" min="0" max="1000" value={Math.round(timelineScroll*1000)} onChange={e=>setTimelineScroll(Math.max(0,Math.min(1,Number(e.target.value)/1000)))} style={{flex:1,minWidth:140}}/>}
            </div>}
            <ResponsiveContainer width="100%" height={180}>
              {(()=>{
                const tl=(a.speedTL||[]).map(d=>({...d,wind:windAtTime(a.windTrace||[],(a.points?.[0]?.time||0)+d.time,a.windDir)}));
                const mx=a.maxSpeedMark;
                const deco=buildTimelineDecorations(a);
                const yDataMax=tl.length?Math.max(...tl.map(d=>d.speed),mx?.speed||0):0;
                const yRaw=mx?Math.max(yDataMax*1.08,mx.speed*1.12):yDataMax*1.02||1;
                const yHi=Math.max(12,Math.ceil((Number.isFinite(yRaw)?yRaw:12)/4)*4);
                const yTicks=[0,yHi/4,yHi/2,(3*yHi)/4,yHi].map(v=>Math.round(v*1e6)/1e6);
                const fmtSpdTick=(v)=>{const x=Number(v);if(!Number.isFinite(x))return"";const r=Math.round(x);return Math.abs(x-r)<1e-5?String(r):x.toFixed(1);};
                const xDomain=timelineDomain||["dataMin","dataMax"];
                return(
                  <AreaChart key={`sp-${xDomain[0]}-${xDomain[1]}`} data={tl} margin={{top:24,right:8,left:0,bottom:0}}>
                    <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.acc} stopOpacity={0.3}/><stop offset="100%" stopColor={C.acc} stopOpacity={0}/></linearGradient></defs>
                    {deco.legBands.map((b,i)=><ReferenceArea key={`lb-sp-${i}`} yAxisId="speed" x1={b.x1} x2={b.x2} fill={b.fill} ifOverflow="extendDomain"/>)}
                    <CartesianGrid strokeDasharray="3 3" stroke={C.bdr}/>
                    <XAxis dataKey="time" type="number" allowDataOverflow tick={{fill:C.txD,fontSize:9}} tickFormatter={v=>fT(v)} stroke={C.bdr} domain={xDomain}/>
                    <YAxis yAxisId="speed" tick={{fill:C.txD,fontSize:9}} stroke={C.bdr} domain={[0,yHi]} ticks={yTicks} tickFormatter={fmtSpdTick}/>
                    <YAxis yAxisId="wind" hide domain={["dataMin-20","dataMax+20"]}/>
                    <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:8,fontSize:11}} labelFormatter={v=>fT(v)} formatter={(v,n)=>[n==="speed"?`${Number(v).toFixed(2)} kts`:`${Math.round(v)}°`,n==="speed"?"Speed":"Wind"]}/>
                    <Area yAxisId="speed" type="monotone" dataKey="speed" stroke={C.acc} fill="url(#sg)" strokeWidth={1.5} dot={false} isAnimationActive={false}/>
                    <Line yAxisId="wind" type="monotone" dataKey="wind" stroke={C.gld} strokeWidth={1.4} dot={false} strokeDasharray="5 4" isAnimationActive={false}/>
                    {deco.markers.map((m,i)=><ReferenceLine key={`mk-sp-${i}`} yAxisId="speed" x={m.x} stroke={m.color} strokeWidth={1.2} strokeDasharray="3 3" ifOverflow="extendDomain"/>)}
                    {deco.markers.map((m,i)=><ReferenceDot key={`lbl-sp-${i}`} yAxisId="speed" x={m.x} y={yHi*0.965} r={0} isFront label={{value:m.label,position:"insideTop",fill:m.color,fontSize:9,fontWeight:700}}/>)}
                    {mx&&tl.length>0&&(function(){
                      const yCap=Math.max(...tl.map(d=>d.speed),mx.speed)*1.12;
                      return(<>
                        <ReferenceLine yAxisId="speed" segment={[{x:mx.time,y:yCap},{x:mx.time,y:mx.speed}]} stroke={PEAK_MARK_ORANGE} strokeWidth={2} strokeDasharray="5 5" ifOverflow="visible"/>
                        <ReferenceDot yAxisId="speed" x={mx.time} y={mx.speed} r={6.5} fill="#ffb84a" stroke="#fff" strokeWidth={2} isFront/>
                        <ReferenceDot yAxisId="speed" x={mx.time} y={yCap} r={0} fill="none" stroke="none" isFront shape={PeakLightningRefShape}/>
                      </>);
                    })()}
                  </AreaChart>
                );
              })()}
            </ResponsiveContainer>
            <ResponsiveContainer width="100%" height={110}>
              {(()=>{
                const wtRaw=(a.windTrace||[]).map(w=>({
                  time:w.time-(a.points?.[0]?.time||0),
                  windDir:w.windDir,
                  std:w.std||8,
                  confidence:w.confidence||"low",
                  interpolated:w.interpolated,
                }));
                const windMid=circularMode(wtRaw.map(w=>w.windDir).filter(Number.isFinite),5)??a.windDir;
                const offsets=wtRaw.map(w=>adiff(windMid,w.windDir));
                const minOffset=offsets.length?Math.min(...offsets):0;
                const maxOffset=offsets.length?Math.max(...offsets):0;
                let yMin=minOffset<0?minOffset*1.1:minOffset*0.9;
                let yMax=maxOffset>0?maxOffset*1.1:maxOffset*0.9;
                if(!Number.isFinite(yMin)||!Number.isFinite(yMax)||(Math.abs(yMax-yMin)<0.5)){
                  yMin=-1;yMax=1;
                }
                if(yMin===yMax){yMin-=1;yMax+=1;}
                const wt=wtRaw.map(w=>{
                  const plot=adiff(windMid,w.windDir);
                  const absTime=(a.points?.[0]?.time||0)+w.time;
                  const legType=legTypeAtAbsTime(a,absTime);
                  const isUpwind=legType==="upwind";
                  const solid=isUpwind&&!w.interpolated;
                  const dotted=!solid;
                  return{
                    ...w,
                    windPlot:plot,
                    windKnownRed:solid&&plot<=0?plot:null,
                    windKnownGreen:solid&&plot>0?plot:null,
                    windEstRed:dotted&&plot<=0?plot:null,
                    windEstGreen:dotted&&plot>0?plot:null,
                    windDotted:dotted?plot:null,
                  };
                });
                const deco=buildTimelineDecorations(a);
                const xDomainWind=timelineDomain||["dataMin","dataMax"];
                const yMkLbl=yMax-(yMax-yMin)*0.12;
                return(
                  <LineChart key={`wd-${xDomainWind[0]}-${xDomainWind[1]}`} data={wt} margin={{top:20,right:8,left:0,bottom:0}}>
                    {deco.legBands.map((b,i)=><ReferenceArea key={`lb-wd-${i}`} x1={b.x1} x2={b.x2} fill={b.fill} ifOverflow="extendDomain"/>)}
                    <ReferenceArea y1={yMin} y2={0} fill={`${C.port}22`} ifOverflow="extendDomain"/>
                    <ReferenceArea y1={0} y2={yMax} fill={`${C.stbd}22`} ifOverflow="extendDomain"/>
                    <CartesianGrid strokeDasharray="3 3" stroke={C.bdr}/>
                    <XAxis dataKey="time" type="number" allowDataOverflow tick={{fill:C.txD,fontSize:9}} tickFormatter={v=>fT(v)} stroke={C.bdr} domain={xDomainWind}/>
                    <YAxis reversed tick={{fill:C.txD,fontSize:9}} stroke={C.bdr} domain={[yMin,yMax]} tickFormatter={v=>`${v>0?"+":""}${Math.round(v)}°`}/>
                    <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:8,fontSize:11}} labelFormatter={v=>fT(v)} formatter={(v,n,p)=>{if(n==="std")return[`±${Number(v).toFixed(1)}°`,"Spread"];const raw=p?.payload?.windDir;return[`${Math.round(raw??(windMid+Number(v)))}°`,"Wind"];}}/>
                    <ReferenceLine y={0} stroke={C.txD} strokeDasharray="4 4" label={{value:`Mode ${Math.round(windMid)}°`,position:"right",fill:C.txD,fontSize:9}}/>
                    <Line type="monotone" dataKey="windKnownRed" stroke={C.port} strokeWidth={2} dot={false} isAnimationActive={false}/>
                    <Line type="monotone" dataKey="windKnownGreen" stroke={C.stbd} strokeWidth={2} dot={false} isAnimationActive={false}/>
                    <Line type="monotone" dataKey="windDotted" stroke={C.gld} strokeWidth={2} strokeDasharray="6 4" dot={false} isAnimationActive={false}/>
                    {deco.markers.map((m,i)=><ReferenceLine key={`mk-wd-${i}`} x={m.x} stroke={m.color} strokeWidth={1.2} strokeDasharray="3 3" ifOverflow="extendDomain"/>)}
                    {deco.markers.map((m,i)=><ReferenceDot key={`lbl-wd-${i}`} x={m.x} y={yMkLbl} r={0} isFront label={{value:m.label,position:"insideTop",fill:m.color,fontSize:9,fontWeight:700}}/>)}
                  </LineChart>
                );
              })()}
            </ResponsiveContainer>
            {a.maxSpeedMark&&<div style={{marginTop:12,fontSize:12,color:C.txt,lineHeight:1.55,padding:"10px 12px",background:`${C.bg}aa`,borderRadius:8,border:`1px solid ${C.bdr}`}}>
              <strong style={{color:C.gld,fontFamily:"'JetBrains Mono',monospace"}}>Max Speed {a.maxSpeedMark.speed} kts</strong>
              {a.maxSpeedMark.leg?<>
                <span style={{color:C.txM}}> · </span>{a.maxSpeedMark.legTypeLabel} leg<span style={{color:C.txM}}> · </span>{a.maxSpeedMark.leg.from} → {a.maxSpeedMark.leg.to}
                <span style={{color:C.txM}}> · </span>TWA {Math.round(a.maxSpeedMark.twaSample)}° true
                <span style={{color:C.txM}}> · </span>{a.maxSpeedMark.lapLabel}
              </>:<>
                <span style={{color:C.txM}}> · </span>TWA {Math.round(a.maxSpeedMark.twaSample)}° true
                <span style={{color:C.txD,fontSize:11}}> (outside mark-based legs)</span>
              </>}
            </div>}
          </div>

          <div style={{background:C.card,borderRadius:12,padding:16,border:`1px solid ${C.bdr}`,marginBottom:16}}>
            <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Tack split (time on each tack)</div>
            <div style={{display:"flex",gap:3,height:24,borderRadius:6,overflow:"hidden",marginBottom:10}}>
              <div style={{background:C.port,flex:a.portS||1,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#fff"}}>Port</div>
              <div style={{background:C.stbd,flex:a.stbdS||1,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#000"}}>Stbd</div>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.txM}}>
              <span>{Math.round(a.portS/(a.portS+a.stbdS||1)*100)}%</span>
              <span>{Math.round(a.stbdS/(a.portS+a.stbdS||1)*100)}%</span>
            </div>
            <div style={{marginTop:12,fontSize:12,color:C.txt}}>
              Wind from: <strong style={{fontFamily:"'JetBrains Mono',monospace",color:C.acc}}>{effWind}°</strong>
              <span style={{color:C.txD,fontSize:10,marginLeft:8}}>Set on Course &amp; map</span>
            </div>
            {a.windEst&&<div style={{marginTop:8,fontSize:10,color:C.txD,lineHeight:1.6}}>
              Auto estimate: {a.windEst.dir}° ({(a.windEst.conf*100).toFixed(0)}% conf)
            </div>}
            <div style={{marginTop:8,fontSize:10,color:C.txD,lineHeight:1.6}}>
              Leg VMG mode: <span style={{color:C.txt}}>{a.vmgMode==="magnitude"?"Magnitude (racing manoeuvres present)":"Targeted signed (no racing manoeuvres)"}</span> · per-leg VMG excludes mark-rounding track (orange on map). Timeline: manoeuvre labels match map (port/starboard crossing = red/green); <span style={{color:C.trkRound}}>*</span> = excluded mark-rounding manoeuvre (<span style={{color:C.trkRound}}>orange</span>).
            </div>
          </div>

          {(()=>{
            const uw=a.upwindByTack||{port:{},stbd:{}};
            const row=(title,col,u)=>{
              const mono={fontFamily:"'JetBrains Mono',monospace"};
              const v=(x,d)=>x==null||!Number.isFinite(x)?"—":(d!=null?x.toFixed(d):Math.round(x));
              return(<div key={title} style={{background:`${col}10`,border:`1px solid ${col}44`,borderRadius:10,padding:12}}>
                <div style={{fontSize:11,fontWeight:700,color:col,marginBottom:10}}>{title}</div>
                {!u.n?<div style={{fontSize:11,color:C.txM}}>No upwind samples on this tack.</div>:<>
                  <div style={{fontSize:10,color:C.txM,lineHeight:1.9}}>
                    Speed (avg)<br/><span style={{...mono,color:C.txt,fontSize:14}}>{v(u.avgSpeed,1)} kts</span></div>
                  <div style={{fontSize:10,color:C.txM,lineHeight:1.9,marginTop:8}}>
                    Speed variability<br/><span style={{...mono,color:C.txt,fontSize:14}}>{v(u.speedStd,2)} kts σ</span></div>
                  <div style={{fontSize:10,color:C.txM,lineHeight:1.9,marginTop:8}}>
                    VMG (avg)<br/><span style={{...mono,color:C.txt,fontSize:14}}>{v(u.avgVMG,2)} kts</span></div>
                  <div style={{fontSize:10,color:C.txM,lineHeight:1.9,marginTop:8}}>
                    Angle from wind (mean COG ± vs wind from)<br/><span style={{...mono,color:C.txt,fontSize:12,lineHeight:1.35,display:"block",marginTop:4}}>{u.windRelLabel||"—"}</span></div>
                  <div style={{fontSize:10,color:C.txM,lineHeight:1.9,marginTop:8}}>
                    Course variability (COG σ)<br/><span style={{...mono,color:C.txt,fontSize:14}}>{v(u.courseStd,1)}°</span></div>
                  <div style={{fontSize:9,color:C.txD,marginTop:8}}>{u.n} GPS samples · upwind legs only</div>
                </>}
              </div>);
            };
            return(<div style={{background:C.card,borderRadius:12,padding:16,border:`1px solid ${C.bdr}`}}>
              <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Upwind · port vs starboard</div>
              <div style={{fontSize:10,color:C.txD,lineHeight:1.45,marginBottom:12}}>GPS samples on <strong style={{color:C.txt}}>upwind</strong> legs (mark-based course), split by tack vs wind from <strong style={{fontFamily:"'JetBrains Mono',monospace",color:C.acc}}>{effWind}°</strong>. Samples in <strong style={{color:C.trkRound}}>mark-rounding</strong> segments (same mask as orange track) are excluded. VMG = |speed×cos(TWA)| vs wind. Angle line: mean COG with signed offset from wind (±°) and acute TWA. COG σ = circular spread (°).</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {row("Upwind · port tack",C.port,uw.port)}
                {row("Upwind · starboard tack",C.stbd,uw.stbd)}
              </div>
            </div>);
          })()}
        </>}

        {/* MANOEUVRES */}
        {tab==="manoeuvres"&&<>
          <div style={{fontSize:10,color:C.txD,marginBottom:10,lineHeight:1.5}}>Quality averages and charts use <strong>racing</strong> manoeuvres only (turn centre <strong>&gt; {MARK_MANOEUVRE_AT_MARK_M} m</strong> from any course mark <strong>and</strong> more than <strong>{MARK_MANOEUVRE_NEAR_ROUNDING_PTS} GPS points</strong> from detected mark roundings). Mark manoeuvres still appear in the list below with an orange border.</div>
          <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
            <Stat label="Avg Tack" color={C.tack} value={(()=>{const tr=a.tacks.filter(t=>!t.excludeFromStatsAndVMG&&Number.isFinite(t.q));return tr.length?Math.round(tr.reduce((s,t)=>s+t.q,0)/tr.length):"—";})()} unit="%"/>
            <Stat label="Avg Gybe" color={C.gybe} value={(()=>{const gr=a.gybes.filter(g=>!g.excludeFromStatsAndVMG);return gr.length?Math.round(gr.reduce((s,g)=>s+g.q,0)/gr.length):"—";})()} unit="% vs ref"/>
          </div>
          {a.markRoundingDetails?.length>0&&<div style={{background:C.card,borderRadius:12,padding:14,border:`1px solid ${C.bdr}`,marginBottom:14}}>
            <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Mark roundings</div>
            <div style={{fontSize:9,color:C.txD,marginBottom:10,lineHeight:1.5}}>Zones: track within {MARK_ROUND_ZONE_M} m of the mark and {MARK_ROUND_MAX_SPAN_SEC} s centered on closest approach. Points <strong>&gt;{MARK_ROUND_NORMAL_MIN_DIST_M} m</strong> from the mark with COG within <strong>{MARK_ROUND_SAILING_COG_TOL_DEG}°</strong> of mean port or starboard baseline count as <strong>normal</strong> track (teal), not rounding (orange). Σ|ΔCOG| sums bearing steps in rounding segments. Tack/gybe within <strong>{MARK_MANOEUVRE_AT_MARK_M} m</strong> of any course mark or within <strong>{MARK_MANOEUVRE_NEAR_ROUNDING_PTS} GPS points</strong> of a rounding hit are mark-rounding manoeuvres (excluded from racing stats).</div>
            {a.markRoundingDetails.map((d,i)=><div key={`mr-${i}`} style={{fontSize:11,padding:"8px 10px",borderRadius:8,background:`${C.bg}99`,border:`1px solid ${C.bdr}`,marginBottom:6,lineHeight:1.5}}>
              <strong style={{color:C.gld}}>{d.mark}</strong> · lap {d.lap}{d.roundTack?` · ${d.roundTack} rounding`:""} · closest {d.closestDistM!=null?`${Math.round(d.closestDistM)} m`:"—"} · zone {d.durationSec!=null?`${d.durationSec.toFixed(0)} s`:"—"}<br/>
              <span style={{color:C.txM}}>Σ|ΔCOG| {d.totalTurnInZoneDeg}° · net bearing Δ {d.netBearingChangeDeg}° · manoeuvres in zone: {d.linkedManoeuvres?.length||0}{d.linkedManoeuvres?.length?` (${d.linkedManoeuvres.map(l=>`${l.type} @${l.splitRole?.replace(/_/g," ")||""}`).join("; ")})`:""}</span>
            </div>)}
          </div>}

          {(()=>{
            const tR=a.tacks.filter(t=>!t.excludeFromStatsAndVMG);
            const gR=a.gybes.filter(g=>!g.excludeFromStatsAndVMG);
            const tPS=tR.filter(t=>t.crossing==="P→S"),tSP=tR.filter(t=>t.crossing==="S→P");
            const gPS=gR.filter(g=>g.crossing==="P→S"),gSP=gR.filter(g=>g.crossing==="S→P");
            const cell=(label,val,col)=>(
              <div key={label} style={{background:`${col}10`,border:`1px solid ${col}44`,borderRadius:8,padding:"8px 10px",minWidth:0}}>
                <div style={{fontSize:9,color:C.txM,textTransform:"uppercase",letterSpacing:0.6,marginBottom:3}}>{label}</div>
                <div style={{fontSize:18,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:col}}>{val==null?"—":`${val}°`}</div>
              </div>
            );
            return(
              <div style={{background:C.card,borderRadius:12,padding:14,border:`1px solid ${C.bdr}`,marginBottom:14}}>
                <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Average turn angle (COG change) — racing only</div>
                <div style={{fontSize:10,color:C.txD,marginBottom:10,lineHeight:1.45}}>Mean heading change across the detection window. P→S = port tack → starboard tack; S→P = starboard → port.</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(108px, 1fr))",gap:8}}>
                  {cell("All tacks",avgManAngle(tR),C.tack)}
                  {cell("Tacks P→S",avgManAngle(tPS),C.port)}
                  {cell("Tacks S→P",avgManAngle(tSP),C.stbd)}
                  {cell("All gybes",avgManAngle(gR),C.gybe)}
                  {cell("Gybes P→S",avgManAngle(gPS),C.port)}
                  {cell("Gybes S→P",avgManAngle(gSP),C.stbd)}
                </div>
              </div>
            );
          })()}

          {a.tacks.filter(t=>!t.excludeFromStatsAndVMG).length>0&&<div style={{background:C.card,borderRadius:12,padding:16,border:`1px solid ${C.bdr}`,marginBottom:14}}>
            <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Tack quality (racing)</div>
            <div style={{fontSize:9,color:C.txD,marginBottom:10,lineHeight:1.55}}>
              Score = <strong style={{color:C.txt}}>reference |VMG| ÷ mean |VMG| during the turn × 100%</strong> (reference = average of mean |VMG| in the <strong>10 s before</strong> the turn and <strong>10 s after</strong>; during = mean |VMG| over the detected turn length). <strong>&gt;100%</strong> means you held more |VMG| through the tack than that reference. Bars: <span style={{color:C.port,fontWeight:700}}>red</span> = started on port tack, <span style={{color:C.stbd,fontWeight:700}}>green</span> = started on starboard.
            </div>
            <div style={{fontSize:9,color:C.txM,marginBottom:8,lineHeight:1.45}}>
              <span style={{color:C.port,fontWeight:700}}>■</span> P→S (port → starboard)&nbsp;&nbsp;
              <span style={{color:C.stbd,fontWeight:700}}>■</span> S→P (starboard → port)
            </div>
            <ResponsiveContainer width="100%" height={110}>
              <BarChart data={a.tacks.filter(t=>!t.excludeFromStatsAndVMG).map((t,i)=>({n:`T${i+1}`,q:t.q,crossing:t.crossing||"—",ch:Math.round(Number(t.ch)||0),sideBef:t.sideBef}))}>
                <CartesianGrid strokeDasharray="3 3" stroke={C.bdr}/>
                <XAxis dataKey="n" tick={{fill:C.txM,fontSize:9}} stroke={C.bdr}/>
                <YAxis domain={[0,"auto"]} tick={{fill:C.txD,fontSize:9}} stroke={C.bdr}/>
                <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:8,fontSize:11}} formatter={(v)=>[`${v}% vs ref`,"Score"]} labelFormatter={(lab,pl)=>{const p=pl&&pl[0]&&pl[0].payload;return p?`${p.n} · ${p.crossing} · tack angle ${p.ch}°`:lab;}}/>
                <Bar dataKey="q" name="quality" radius={[4,4,0,0]}>{a.tacks.filter(t=>!t.excludeFromStatsAndVMG).map((t,i)=><Cell key={`tk${i}`} fill={manBarFillByStartTack(t.sideBef)}/>)}</Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>}
          {a.gybes.filter(g=>!g.excludeFromStatsAndVMG).length>0&&<div style={{background:C.card,borderRadius:12,padding:16,border:`1px solid ${C.bdr}`,marginBottom:14}}>
            <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Gybe quality (racing)</div>
            <div style={{fontSize:9,color:C.txD,marginBottom:10,lineHeight:1.55}}>
              Same score as tacks (|VMG| vs wind, 10 s before / after, mean during gybe). Bars: <span style={{color:C.port,fontWeight:700}}>red</span> = port tack before gybe, <span style={{color:C.stbd,fontWeight:700}}>green</span> = starboard tack before gybe.
            </div>
            <div style={{fontSize:9,color:C.txM,marginBottom:8,lineHeight:1.45}}>
              <span style={{color:C.port,fontWeight:700}}>■</span> P→S&nbsp;&nbsp;
              <span style={{color:C.stbd,fontWeight:700}}>■</span> S→P
            </div>
            <ResponsiveContainer width="100%" height={110}>
              <BarChart data={a.gybes.filter(g=>!g.excludeFromStatsAndVMG).map((g,i)=>({n:`G${i+1}`,q:g.q,crossing:g.crossing||"—",ch:Math.round(Number(g.ch)||0),sideBef:g.sideBef}))}>
                <CartesianGrid strokeDasharray="3 3" stroke={C.bdr}/>
                <XAxis dataKey="n" tick={{fill:C.txM,fontSize:9}} stroke={C.bdr}/>
                <YAxis domain={[0,"auto"]} tick={{fill:C.txD,fontSize:9}} stroke={C.bdr}/>
                <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:8,fontSize:11}} formatter={(v)=>[`${v}% vs ref`,"Score"]} labelFormatter={(lab,pl)=>{const p=pl&&pl[0]&&pl[0].payload;return p?`${p.n} · ${p.crossing} · gybe angle ${p.ch}°`:lab;}}/>
                <Bar dataKey="q" name="quality" radius={[4,4,0,0]}>{a.gybes.filter(g=>!g.excludeFromStatsAndVMG).map((g,i)=><Cell key={`gy${i}`} fill={manBarFillByStartTack(g.sideBef)}/>)}</Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>}

          {a.tacks.length>0&&<><div style={{fontSize:13,fontWeight:700,color:C.tack,marginBottom:6}}>Tacks ({a.tacks.length})</div>{a.tacks.map((t,i)=><ManCard key={`t${i}`} m={t} index={i}/>)}</>}
          {a.gybes.length>0&&<><div style={{fontSize:13,fontWeight:700,color:C.gybe,marginBottom:6,marginTop:14}}>Gybes ({a.gybes.length})</div>{a.gybes.map((g,i)=><ManCard key={`g${i}`} m={g} index={i}/>)}</>}
          {!a.tacks.length&&!a.gybes.length&&<div style={{textAlign:"center",color:C.txM,padding:30}}>No manoeuvres detected. Try adjusting wind direction.</div>}
        </>}

        {/* LEGS */}
        {tab==="legs"&&<>
          {a.legs.length>0?<>
            <div style={{fontSize:10,color:C.txD,textTransform:"uppercase",letterSpacing:1,display:"flex",gap:8,padding:"6px 12px",marginBottom:4}}>
              <div style={{width:60}}>From→To</div>
              <div style={{width:55}}>Type</div>
              <div style={{flex:1}}>Dist</div>
              <div style={{width:50}}>Time</div>
              <div style={{width:50}}>Spd</div>
              <div style={{width:42}}>VMG</div>
              <div style={{width:38}}>Eff</div>
            </div>
            {a.legs.map((l,i)=>{
              const tc=l.type==="upwind"?C.up:l.type==="downwind"?C.dn:C.txM;
              return(<div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:C.card,borderRadius:8,marginBottom:3,border:`1px solid ${C.bdr}`,fontSize:11}}>
                <div style={{width:60,color:C.txt,fontWeight:600,fontSize:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.from}→{l.to}</div>
                <div style={{width:55,color:tc,fontWeight:600,textTransform:"uppercase",fontSize:10}}>{l.type}</div>
                <div style={{flex:1,color:C.txt,fontFamily:"'JetBrains Mono',monospace"}}>{l.startLineDistanceM!=null&&Number.isFinite(l.startLineDistanceM)?(<>Distance from line <span style={{color:Math.round(l.startLineDistanceM)<0?C.wrn:C.acc,fontWeight:600}}>{Math.round(l.startLineDistanceM)}m</span> · </>):(l.roundingM!=null&&Number.isFinite(l.roundingM)&&l.roundingM>0.05?<>Rnd <span style={{color:C.acc}}>{Math.round(l.roundingM)}m</span>{l.roundingStraightM!=null&&Number.isFinite(l.roundingStraightM)&&l.roundingStraightM>0.05?<> <span style={{color:C.txM}}>(st {Math.round(l.roundingStraightM)}m)</span></>:null} · </>:null)}Trk {m2nm(l.distance).toFixed(2)}nm</div>
                <div style={{width:50,color:C.txM}}>{fT(l.duration)}</div>
                <div style={{width:50,color:C.acc,fontFamily:"'JetBrains Mono',monospace"}}>{l.avgSpeed.toFixed(1)}</div>
                <div style={{width:42,color:C.gld,fontFamily:"'JetBrains Mono',monospace"}}>{l.avgVMG.toFixed(1)}</div>
                <div style={{width:38,color:C.txM}}>{l.efficiency.toFixed(0)}%</div>
              </div>);
            })}

            <div style={{display:"flex",gap:8,marginTop:14}}>
              {["upwind","downwind","reach"].map(type=>{
                const tl=a.legs.filter(l=>l.type===type);if(!tl.length)return null;
                const as2=tl.reduce((s,l)=>s+l.avgSpeed,0)/tl.length;
                const av=tl.reduce((s,l)=>s+l.avgVMG,0)/tl.length;
                const ae=tl.reduce((s,l)=>s+l.efficiency,0)/tl.length;
                const tc2=type==="upwind"?C.up:type==="downwind"?C.dn:C.txM;
                return(<div key={type} style={{flex:1,background:C.card,borderRadius:10,padding:14,border:`1px solid ${C.bdr}`}}>
                  <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:tc2,marginBottom:8}}>{type} ({tl.length})</div>
                  <div style={{fontSize:10,color:C.txM,lineHeight:2}}>
                    Avg: <span style={{color:C.txt,fontFamily:"'JetBrains Mono',monospace"}}>{as2.toFixed(1)}kts</span><br/>
                    VMG: <span style={{color:C.txt,fontFamily:"'JetBrains Mono',monospace"}}>{av.toFixed(1)}kts</span><br/>
                    Eff: <span style={{color:C.txt,fontFamily:"'JetBrains Mono',monospace"}}>{ae.toFixed(0)}%</span>
                  </div>
                </div>);
              })}
            </div>
          </>:<div style={{textAlign:"center",color:C.txM,padding:30}}>{courseLetter?"Gates not found for the full mark sequence (in/out perpendiculars and P/S). Widen the crop, check the track, or mark positions.":"Select a course for leg-by-leg breakdown."}<br/><button onClick={()=>setView("course-setup")} style={{...btn(`${C.acc}18`,C.acc,`${C.acc}44`),marginTop:12,padding:"8px 16px",fontSize:12}}>← Course Setup</button></div>}
        </>}

        {/* SPEED */}
        {tab==="speed"&&<>
          <div style={{background:C.card,borderRadius:12,padding:16,border:`1px solid ${C.bdr}`,marginBottom:14}}>
            <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Speed Distribution</div>
            {(()=>{
              const bins=new Array(20).fill(0);
              a.points.forEach(p=>{const k=ms2k(p.ss||0);if(k<0.3)return;bins[Math.min(Math.floor(k*2),19)]++});
              return(<ResponsiveContainer width="100%" height={140}>
                <BarChart data={bins.map((c,i)=>({r:`${(i/2).toFixed(1)}`,c}))}>
                  <CartesianGrid strokeDasharray="3 3" stroke={C.bdr}/><XAxis dataKey="r" tick={{fill:C.txD,fontSize:8}} stroke={C.bdr}/>
                  <YAxis tick={{fill:C.txD,fontSize:9}} stroke={C.bdr}/>
                  <Tooltip contentStyle={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:8,fontSize:11}}/>
                  <Bar dataKey="c" name="samples" fill={C.blu} radius={[2,2,0,0]}/>
                </BarChart>
              </ResponsiveContainer>);
            })()}
          </div>

          <div style={{background:C.card,borderRadius:12,padding:16,border:`1px solid ${C.bdr}`,marginBottom:14}}>
            <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Speed by Heading (relative to wind)</div>
            {(()=>{
              const ab={};for(let i=0;i<360;i+=15)ab[i]=[];
              a.points.forEach(p=>{const s=ms2k(p.ss||0);if(s<0.5)return;const r=((p.cog-effWind+360)%360);ab[Math.round(r/15)*15%360]?.push(s)});
              const pd=Object.entries(ab).map(([k,v])=>({label:`${k}°`,avg:v.length?v.reduce((a,b)=>a+b,0)/v.length:0,max:v.length?Math.max(...v):0})).sort((a,b)=>parseInt(a.label)-parseInt(b.label));
              return(<ResponsiveContainer width="100%" height={220}>
                <RadarChart data={pd}><PolarGrid stroke={C.bdr}/><PolarAngleAxis dataKey="label" tick={{fill:C.txD,fontSize:8}}/>
                <PolarRadiusAxis tick={{fill:C.txD,fontSize:8}}/>
                <Radar name="Avg" dataKey="avg" stroke={C.acc} fill={C.acc} fillOpacity={0.15} strokeWidth={2}/>
                <Radar name="Max" dataKey="max" stroke={C.gld} fill="none" strokeWidth={1} strokeDasharray="4 4"/>
                <Legend wrapperStyle={{fontSize:10,color:C.txM}}/></RadarChart>
              </ResponsiveContainer>);
            })()}
          </div>

          <div style={{background:C.card,borderRadius:12,padding:16,border:`1px solid ${C.bdr}`}}>
            <div style={{fontSize:11,color:C.txM,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Streak Records</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {Object.entries(a.streaks).map(([k,v])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:`${C.bg}88`,borderRadius:8}}>
                  <span style={{fontSize:11,color:C.txM}}>≥{k}kts</span>
                  <span style={{fontSize:16,fontWeight:700,color:C.acc,fontFamily:"'JetBrains Mono',monospace"}}>{fT(v)}</span>
                </div>
              ))}
            </div>
          </div>
        </>}

      </div>
    </div>);
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
