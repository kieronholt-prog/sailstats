# Deploy: cd to this directory, then: npx wrangler deploy
# Change `name` if your Worker in Cloudflare uses a different name.
name = "sailstats-auth"
main = "worker.js"
compatibility_date = "2024-11-01"

# Keep Variables set in the Cloudflare Dashboard when deploying from the CLI.
# Without this, Wrangler can replace dashboard "Text" vars with an empty local set.
# Secrets (Encrypt) are not deleted by deploy; see Cloudflare "Source of truth" docs.
keep_vars = true
